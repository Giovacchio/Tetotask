function contextualGreeting() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return pick(TETO.greetMorning);
  if (h >= 12 && h < 18) return pick(TETO.greetAfternoon);
  if (h >= 18 && h < 23) return pick(TETO.greetEvening);
  return pick(TETO.greetNight);
}

const pick = a => a[Math.floor(Math.random()*a.length)];

/* ═══════════════════════════════════════════════════════════════
   🧠 PREFERENCES — Teto's contextual memory (#6)
   ═══════════════════════════════════════════════════════════════ */
const Prefs = {
  // load from localStorage on boot, sync to Firebase whenever changed
  load() {
    try {
      const raw = localStorage.getItem("teto_prefs");
      state.preferences = raw ? JSON.parse(raw) : {};
    } catch(e) { state.preferences = {}; }
  },
  async save() {
    try { localStorage.setItem("teto_prefs", JSON.stringify(state.preferences)); } catch(e) {}
    if (state.uid && db) {
      try {
        await db.collection("users").doc(state.uid)
          .set({ preferences: state.preferences }, { merge: true });
      } catch(e) { console.warn("Prefs sync failed:", e); }
    }
  },
  async pull() {
    if (!state.uid || !db) return;
    try {
      const doc = await db.collection("users").doc(state.uid).get();
      if (doc.exists && doc.data().preferences) {
        state.preferences = { ...state.preferences, ...doc.data().preferences };
        try { localStorage.setItem("teto_prefs", JSON.stringify(state.preferences)); } catch(e) {}
      }
    } catch(e) { console.warn("Prefs pull failed:", e); }
  },
  set(key, value) {
    state.preferences[key] = { value, ts: Date.now() };
    this.save();
  },
  get(key) {
    return state.preferences[key]?.value;
  },
  remove(key) {
    delete state.preferences[key];
    this.save();
  },
  list() {
    return Object.entries(state.preferences).map(([k, v]) => ({
      key: k, value: v.value, ts: v.ts
    }));
  },
  clear() {
    state.preferences = {};
    this.save();
  },
  /* ─── Active personalization helpers (memory phase 2) ─── */
  // Return the user's first name from preferences or Google account, if known
  firstName() {
    // Check explicit preference first
    const explicit = this.list().find(p => /(?:mi\s+chiamo|sono|nome)/i.test(p.value));
    if (explicit) {
      const m = explicit.value.match(/(?:mi\s+chiamo|sono|nome\s+è)\s+([a-zàèéìòù]+)/i);
      if (m) return m[1].charAt(0).toUpperCase() + m[1].slice(1);
    }
    // Fall back to Google account display name (first word only)
    if (Account.displayName && !Account.isAnonymous) {
      return Account.displayName.split(/\s+/)[0];
    }
    return null;
  },
  // Find a stored memory whose value matches one of the given keywords
  findByTopic(keywords) {
    const list = this.list();
    if (list.length === 0) return null;
    const kws = keywords.map(k => k.toLowerCase());
    return list.find(p => {
      const v = p.value.toLowerCase();
      return kws.some(k => v.includes(k));
    });
  },
  // Pick one memory at random — used for rare conversational sprinkles
  random() {
    const list = this.list();
    return list.length > 0 ? pick(list) : null;
  },
  // Naive auto-key extraction from "ricordati che X" — try to derive a short label
  deriveKey(text) {
    const t = text.toLowerCase().trim();
    // Patterns: "il mio X è Y", "mi piace X", "non mi piace X", "ho un X"
    let m;
    if ((m = t.match(/^(?:il |la |lo |i |le |gli )?(?:mio|mia|miei|mie)\s+([a-zàèéìòù\s]{2,30}?)\s+(?:è|si chiama|sono)\b/i))) return m[1].trim();
    if ((m = t.match(/^(?:non\s+)?mi\s+piac[ce]\s+([a-zàèéìòù\s]{2,40}?)(?:\s+e\b|$)/i))) return (t.startsWith("non") ? "non_piace_" : "piace_") + m[1].trim().replace(/\s+/g,"_");
    if ((m = t.match(/^ho\s+(?:un|una|uno)\s+([a-zàèéìòù]+)/i))) return "ha_" + m[1];
    if ((m = t.match(/^abito\s+(?:a|in)\s+([a-zàèéìòù\s]+)/i))) return "abita";
    if ((m = t.match(/^lavoro\s+(?:come|da|in)\s+([a-zàèéìòù\s]+)/i))) return "lavoro";
    // Fallback: take first 2-4 words as key
    const words = t.split(/\s+/).slice(0, 4).join("_").replace(/[^a-zàèéìòù_]/gi,"");
    return words.slice(0, 40) || ("nota_" + Date.now().toString(36));
  },
};

/* ═══════════════════════════════════════════════════════════════
   ☀️ MORNING BRIEFING (#4)
   ═══════════════════════════════════════════════════════════════ */
const Briefing = {
  async build() {
    const lines = [];
    const sod = startOfDay(Date.now());
    const eod = sod + 86400000;

    // Greeting
    const greet = heroGreet();
    const name = Prefs.firstName();
    lines.push(`${greet}${name?" "+name:""}~! Ecco il tuo briefing 🍞`);

    // Weather (if location available)
    try {
      const loc = await this.getLocation();
      if (loc) {
        const w = await fetchWeather(loc.lat, loc.lon);
        if (w && w.daily) {
          const tMax = Math.round(w.daily.temperature_2m_max[0]);
          const tMin = Math.round(w.daily.temperature_2m_min[0]);
          const desc = WMO_CODES[w.daily.weather_code[0]] || "tempo misterioso";
          lines.push(`Meteo oggi: ${desc}, ${tMin}°/${tMax}°.`);
        }
      }
    } catch(e) { /* no weather, skip silently */ }

    // Today's tasks
    const todayTasks = state.tasks.filter(t => !t.done && t.reminderAt && t.reminderAt >= sod && t.reminderAt < eod);
    const overdue   = state.tasks.filter(t => !t.done && t.reminderAt && t.reminderAt < sod);
    const inboxNum  = state.tasks.filter(t => !t.done && !t.reminderAt).length;

    if (overdue.length > 0) {
      lines.push(`⚠️ ${overdue.length} ${overdue.length===1?"task in ritardo":"task in ritardo"}.`);
    }
    if (todayTasks.length > 0) {
      lines.push(`Oggi hai ${todayTasks.length} ${todayTasks.length===1?"impegno":"impegni"} programmat${todayTasks.length===1?"o":"i"}.`);
    } else if (inboxNum > 0) {
      lines.push(`Niente in agenda — ${inboxNum} task in attesa quando vuoi.`);
    } else {
      lines.push("Niente all'orizzonte. Goditi la giornata~ ♪");
    }

    // Next event from calendar
    if (typeof Calendar !== "undefined" && Calendar.events) {
      const todayKey = dateKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
      const todayEvts = Calendar.eventsOnDay(todayKey);
      if (todayEvts.length > 0) {
        const next = todayEvts[0];
        lines.push(`Prossimo evento: ${next.title} alle ${next.time || "?"}.`);
      }
    }

    return lines.join("\n");
  },
  async getLocation() {
    return new Promise(resolve => {
      if (!navigator.geolocation) return resolve(null);
      const cached = Prefs.get("location_home");
      if (cached) return resolve(cached);
      navigator.geolocation.getCurrentPosition(
        p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude }),
        () => resolve(null),
        { timeout: 4000, maximumAge: 3600000 }
      );
    });
  },
  shouldShowToday() {
    const today = new Date().toISOString().slice(0,10);
    const last = localStorage.getItem("teto_last_briefing");
    return last !== today && new Date().getHours() >= 5 && new Date().getHours() < 12;
  },
  markShown() {
    const today = new Date().toISOString().slice(0,10);
    try { localStorage.setItem("teto_last_briefing", today); } catch(e) {}
    state.briefingShownToday = today;
  },
  async show(force = false) {
    if (!force && !this.shouldShowToday()) return;
    const text = await this.build();
    showBubble(text);
    if (TTS.enabled) TTS.speak(text);
    this.markShown();
  },
};

/* ═══════════════════════════════════════════════════════════════
   📅 SMART DAY PLANNER (#1)
   ═══════════════════════════════════════════════════════════════ */
const Planner = {
  // Default working windows; can be overridden by Prefs
  defaultSlots() {
    return [
      { start: 9,  end: 12, label: "mattina" },
      { start: 14, end: 18, label: "pomeriggio" },
      { start: 19, end: 22, label: "sera" },
    ];
  },
  build() {
    const sod = startOfDay(Date.now());
    const eod = sod + 86400000;
    const now = Date.now();

    // Tasks to plan: today's reminders + active inbox (limit inbox to top 5)
    const todayTasks = state.tasks.filter(t => !t.done && t.reminderAt && t.reminderAt >= sod && t.reminderAt < eod);
    const inbox = state.tasks.filter(t => !t.done && !t.reminderAt).slice(0, 5);
    const all = [...todayTasks, ...inbox];

    // Calendar events as occupied blocks
    const todayKey = dateKey(new Date().getFullYear(), new Date().getMonth(), new Date().getDate());
    const events = (typeof Calendar !== "undefined" ? Calendar.eventsOnDay(todayKey) : [])
      .map(e => {
        const [h, m] = (e.time || "00:00").split(":").map(Number);
        return { hour: h, min: m, title: e.title };
      })
      .sort((a,b) => (a.hour*60+a.min) - (b.hour*60+b.min));

    // Build candidate hourly slots, skipping past hours and busy ranges
    const nowH = new Date().getHours();
    const slots = [];
    for (const win of this.defaultSlots()) {
      for (let h = Math.max(win.start, nowH+1); h < win.end; h++) {
        const busy = events.some(ev => ev.hour === h);
        if (!busy) slots.push({ hour: h, label: `${h}:00`, period: win.label });
      }
    }

    // Distribute: spread tasks across slots, prefer scheduled ones first
    const plan = [];
    let i = 0;
    for (const task of all) {
      if (i >= slots.length) break;
      // If task already has a reminder time, keep it
      if (task.reminderAt) {
        const d = new Date(task.reminderAt);
        plan.push({ task, hour: d.getHours(), min: d.getMinutes(), kept: true });
      } else {
        const slot = slots[i++];
        plan.push({ task, hour: slot.hour, min: 0, kept: false });
      }
    }

    return { plan, events, hasItems: plan.length > 0, totalActive: all.length };
  },
  async apply(plan) {
    let count = 0;
    for (const item of plan) {
      if (item.kept) continue;
      const d = new Date();
      d.setHours(item.hour, item.min, 0, 0);
      try {
        await updateTaskInDb(item.task.id, { reminderAt: d.getTime() });
        count++;
      } catch(e) { console.error(e); }
    }
    showBubble(`Pianificate ${count} task per oggi! ♪`);
    state.planSuggestion = null;
    render();
  },
};

/* ═══════════════════════════════════════════════════════════════
   🌙 FOCUS MODE — minimal lock-screen UI (#7)
   ═══════════════════════════════════════════════════════════════ */
const Focus = {
  wakeLock: null,
  async enter() {
    state.focusMode = true;
    render();
    // Try to keep screen on while in focus mode
    try {
      if ("wakeLock" in navigator) {
        this.wakeLock = await navigator.wakeLock.request("screen");
      }
    } catch(e) { /* not supported, fine */ }
  },
  exit() {
    state.focusMode = false;
    if (this.wakeLock) { try { this.wakeLock.release(); } catch(e) {} this.wakeLock = null; }
    render();
  },
  // Tick the clock every second while in focus
  startTicker() {
    if (this._tick) return;
    this._tick = setInterval(() => {
      if (!state.focusMode) { clearInterval(this._tick); this._tick = null; return; }
      const el = document.getElementById("focus-clock");
      if (el) el.textContent = new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
    }, 1000);
  },
};

/* ═══════════════════════════════════════════════════════════════
   🪟 MODAL — in-theme replacement for prompt/confirm/choice
   ═══════════════════════════════════════════════════════════════ */
const Modal = {
  _activeKeydown: null,

  // Generic show: opts = { title, body, fields?, actions, dismissible? }
  // fields: [{ id, label, type, value, placeholder, options? }]
  // actions: [{ label, value, primary?, danger? }]
  // Returns Promise<resultValue or null>
  show(opts) {
    return new Promise(resolve => {
      const overlay = document.createElement("div");
      overlay.className = "modal-overlay teto-modal-overlay";
      const fieldsHTML = (opts.fields || []).map(f => {
        const id = "modal-f-" + f.id;
        if (f.type === "textarea") {
          return `<label class="modal-label">${esc(f.label || "")}</label>
            <textarea id="${id}" class="modal-input" rows="3" placeholder="${esc(f.placeholder||"")}">${esc(f.value||"")}</textarea>`;
        }
        if (f.type === "select") {
          const opts = (f.options || []).map(o => `<option value="${esc(o.value)}" ${o.value===f.value?'selected':''}>${esc(o.label)}</option>`).join("");
          return `<label class="modal-label">${esc(f.label || "")}</label>
            <select id="${id}" class="modal-input">${opts}</select>`;
        }
        if (f.type === "checkbox") {
          return `<label class="modal-checkbox-label">
            <input id="${id}" type="checkbox" class="modal-checkbox" ${f.value?'checked':''}>
            ${esc(f.label || "")}
          </label>`;
        }
        if (f.type === "emoji-picker") {
          const list = (f.options || []);
          const cells = list.map(e => `<button type="button" class="modal-emoji-cell ${e===f.value?'on':''}" data-val="${esc(e)}">${e}</button>`).join("");
          return `<label class="modal-label">${esc(f.label || "")}</label>
            <div class="modal-emoji-grid" data-field-id="${id}" data-current="${esc(f.value||"")}">${cells}</div>`;
        }
        // default: text
        return `<label class="modal-label">${esc(f.label || "")}</label>
          <input id="${id}" type="text" class="modal-input" value="${esc(f.value||"")}" placeholder="${esc(f.placeholder||"")}" autocomplete="off">`;
      }).join("");

      const actionsArr = opts.actions || [{label:"OK", value:true, primary:true}];
      const actionsHTML = actionsArr.map((a, idx) => {
        const cls = a.primary ? "modal-btn-primary" : a.danger ? "modal-btn-danger" : "modal-btn-cancel";
        return `<button class="modal-btn ${cls}" data-idx="${idx}">${esc(a.label)}</button>`;
      }).join("");

      overlay.innerHTML = `
        <div class="modal-panel" role="dialog" aria-modal="true">
          ${opts.title ? `<div class="modal-title">${esc(opts.title)}</div>` : ""}
          ${opts.body ? `<div class="modal-body">${esc(opts.body)}</div>` : ""}
          ${fieldsHTML ? `<div class="modal-fields">${fieldsHTML}</div>` : ""}
          <div class="modal-actions">${actionsHTML}</div>
        </div>`;

      const close = (result) => {
        try { overlay.remove(); } catch(e) {}
        if (Modal._activeKeydown) { document.removeEventListener("keydown", Modal._activeKeydown); Modal._activeKeydown = null; }
        resolve(result);
      };

      // Cancel on overlay click (only if dismissible !== false)
      if (opts.dismissible !== false) {
        overlay.addEventListener("click", e => { if (e.target === overlay) close(null); });
      }

      // Wire action buttons
      overlay.querySelectorAll(".modal-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const idx = parseInt(btn.dataset.idx, 10);
          const action = actionsArr[idx];
          // Collect field values for primary/non-cancel actions
          if (action.value === null || action.value === false) { close(action.value); return; }
          const values = {};
          (opts.fields || []).forEach(f => {
            const el = overlay.querySelector("#modal-f-" + f.id);
            if (!el) return;
            if (f.type === "checkbox") values[f.id] = el.checked;
            else if (f.type === "emoji-picker") {
              const grid = overlay.querySelector(`.modal-emoji-grid[data-field-id="modal-f-${f.id}"]`);
              values[f.id] = grid ? grid.dataset.current : f.value;
            }
            else values[f.id] = el.value;
          });
          close({ action: action.value, values });
        });
      });

      // Wire emoji picker selection
      overlay.querySelectorAll(".modal-emoji-grid").forEach(grid => {
        grid.querySelectorAll(".modal-emoji-cell").forEach(cell => {
          cell.addEventListener("click", () => {
            grid.dataset.current = cell.dataset.val;
            grid.querySelectorAll(".modal-emoji-cell").forEach(c => c.classList.toggle("on", c.dataset.val === cell.dataset.val));
          });
        });
      });

      // Keyboard: Esc to cancel, Enter to confirm primary
      Modal._activeKeydown = (e) => {
        if (e.key === "Escape" && opts.dismissible !== false) { e.preventDefault(); close(null); }
        if (e.key === "Enter" && !e.shiftKey) {
          // Don't trigger inside textarea
          if (e.target.tagName === "TEXTAREA") return;
          const primary = overlay.querySelector(".modal-btn-primary");
          if (primary) { e.preventDefault(); primary.click(); }
        }
      };
      document.addEventListener("keydown", Modal._activeKeydown);

      document.body.appendChild(overlay);

      // Focus first input/textarea
      setTimeout(() => {
        const first = overlay.querySelector(".modal-input");
        if (first) { first.focus(); if (first.select) try { first.select(); } catch(e) {} }
      }, 50);
    });
  },

  // Convenience: confirm dialog. Returns true/false.
  async confirm(message, opts = {}) {
    const result = await this.show({
      title: opts.title || null,
      body: message,
      actions: [
        { label: opts.cancelLabel || "Annulla", value: false },
        { label: opts.okLabel || "Conferma", value: true, primary: !opts.danger, danger: !!opts.danger },
      ],
    });
    return result && result.action === true;
  },

  // Convenience: prompt dialog. Returns string or null.
  async prompt(label, defaultValue = "", opts = {}) {
    const result = await this.show({
      title: opts.title || null,
      body: opts.body || null,
      fields: [{ id: "v", label, type: "text", value: defaultValue, placeholder: opts.placeholder || "" }],
      actions: [
        { label: "Annulla", value: false },
        { label: opts.okLabel || "OK", value: true, primary: true },
      ],
    });
    if (!result || result.action !== true) return null;
    const v = (result.values?.v || "").trim();
    return v || null;
  },
};

/* ═══════════════════════════════════════════════════════════════
   📍 GEOFENCE — location-based reminders (#3)
   ═══════════════════════════════════════════════════════════════ */
const Geofence = {
  HOME_RADIUS_M: 80,         // within 80m → considered "at home"
  POLL_INTERVAL_MS: 60000,   // check every minute
  watchId: null,
  _lastInside: null,
  _pollTimer: null,

  // Get pending geofence triggers from localStorage (persistent across reloads)
  load() {
    try {
      const raw = localStorage.getItem("teto_geofence_pending");
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  },
  save(arr) {
    try { localStorage.setItem("teto_geofence_pending", JSON.stringify(arr)); } catch(e) {}
  },
  add(text, trigger) {
    const arr = this.load();
    arr.push({ id: "gf_" + Date.now().toString(36), text, trigger, ts: Date.now() });
    this.save(arr);
    this.start();
  },
  remove(id) {
    this.save(this.load().filter(x => x.id !== id));
  },

  // Haversine distance in meters
  distance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.sqrt(a));
  },

  // Save current GPS as "home"
  async saveHome() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) return reject(new Error("Geolocation non supportata"));
      navigator.geolocation.getCurrentPosition(
        p => {
          const home = { lat: p.coords.latitude, lon: p.coords.longitude, savedAt: Date.now() };
          Prefs.set("location_home", home);
          resolve(home);
        },
        err => reject(err),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });
  },

  start() {
    const pending = this.load();
    if (pending.length === 0) return;
    if (!Prefs.get("location_home")) return;
    if (!navigator.geolocation || this._pollTimer) return;
    // Use polling (more battery-friendly than watchPosition for sparse triggers)
    this._pollTimer = setInterval(() => this.check(), this.POLL_INTERVAL_MS);
    this.check();   // immediate check
  },

  stop() {
    if (this._pollTimer) { clearInterval(this._pollTimer); this._pollTimer = null; }
  },

  check() {
    const pending = this.load();
    if (pending.length === 0) { this.stop(); return; }
    const home = Prefs.get("location_home");
    if (!home) return;

    navigator.geolocation.getCurrentPosition(p => {
      const dist = this.distance(p.coords.latitude, p.coords.longitude, home.lat, home.lon);
      const inside = dist <= this.HOME_RADIUS_M;
      const wasInside = this._lastInside;
      this._lastInside = inside;
      if (wasInside === null) return;   // first reading, no transition yet

      let fired = false;
      const remaining = pending.filter(g => {
        if (g.trigger === "leave_home" && wasInside && !inside) { this.fire(g); fired = true; return false; }
        if (g.trigger === "arrive_home" && !wasInside && inside) { this.fire(g); fired = true; return false; }
        return true;
      });
      if (fired) this.save(remaining);
    }, () => {}, { enableHighAccuracy: false, timeout: 8000, maximumAge: 30000 });
  },

  fire(g) {
    const label = g.trigger === "leave_home" ? "(uscendo di casa)" : "(arrivando a casa)";
    showBubble(`📍 ${g.text} ${label}`);
    if (TTS.enabled) TTS.speak(g.text);
    haptic([20, 60, 20]);
    if (window.Notification && Notification.permission === "granted") {
      new Notification("TetoTask 🍞", { body: `${g.text} ${label}`, tag: g.id });
    }
  },
};

// Italian number words 0–100 (subset covering common cases)
const NUMS_IT = {
  "zero":0,"uno":1,"un":1,"una":1,"due":2,"tre":3,"quattro":4,"cinque":5,
  "sei":6,"sette":7,"otto":8,"nove":9,"dieci":10,
  "undici":11,"dodici":12,"tredici":13,"quattordici":14,"quindici":15,
  "sedici":16,"diciassette":17,"diciotto":18,"diciannove":19,
  "venti":20,"ventuno":21,"ventidue":22,"trenta":30,"quaranta":40,
  "cinquanta":50,"sessanta":60,"settanta":70,"ottanta":80,"novanta":90,"cento":100,
};
function parseItNum(w) {
  if (!w) return null;
  w = String(w).toLowerCase().trim();
  if (/^\d+(?:[,.]\d+)?$/.test(w)) return parseFloat(w.replace(",","."));
  return NUMS_IT[w] ?? null;
}

/* ─── Safe math evaluator (Italian-aware) ─────────────────────── */
function computeMath(exprRaw) {
  let s = String(exprRaw || "").toLowerCase().trim();
  if (!s) return null;
  // Pad with spaces so "più" / "è" (non-ASCII word chars break \b) match via " X "
  s = " " + s + " ";

  // 0. Normalize common OCR/ASR variations
  s = s.replace(/×/g, "*").replace(/÷/g, "/").replace(/−/g, "-").replace(/,/g, ".");

  // 1. Convert Italian word numbers to digits (longest first)
  const wordNums = [
    ["centouno",101],["centodue",102],["centodieci",110],["duecento",200],["trecento",300],
    ["quattrocento",400],["cinquecento",500],["seicento",600],["settecento",700],["ottocento",800],
    ["novecento",900],["mille",1000],["duemila",2000],
    ["diciannove",19],["diciotto",18],["diciassette",17],["sedici",16],["quindici",15],
    ["quattordici",14],["tredici",13],["dodici",12],["undici",11],
    ["ventuno",21],["ventidue",22],["ventitre",23],["ventiquattro",24],["venticinque",25],
    ["trentuno",31],["trentadue",32],
    ["novanta",90],["ottanta",80],["settanta",70],["sessanta",60],["cinquanta",50],
    ["quaranta",40],["trenta",30],["venti",20],["dieci",10],
    ["nove",9],["otto",8],["sette",7],["sei",6],["cinque",5],["quattro",4],
    ["tre",3],["due",2],["zero",0],
    ["uno",1],["un",1],
  ];
  for (const [w, n] of wordNums) {
    s = s.replace(new RegExp(`\\b${w}\\b`, "g"), ` ${n} `);
  }

  // 2. Unary operators (before binary ones, so "radice di 4" becomes "Math.sqrt(4)")
  //    radice (quadrata) di X → Math.sqrt(X)
  s = s.replace(/\bradice\s+(?:quadrata\s+)?di\s+/g, " Math.sqrt(");
  s = s.replace(/\b(?:valore\s+assoluto|modulo)\s+di\s+/g, " Math.abs(");
  //    X al quadrato → (X)**2;  X al cubo → (X)**3
  s = s.replace(/(\d+(?:\.\d+)?)\s+al\s+quadrato\b/g, "($1)**2");
  s = s.replace(/(\d+(?:\.\d+)?)\s+al\s+cubo\b/g, "($1)**3");

  // 3. Binary operators — Italian words → symbols (space-delimited)
  s = s.replace(/\s+più\s+/g, " + ");
  s = s.replace(/^\s*più\s+/g, " + ");
  s = s.replace(/\bpiu\b/g, " + ");                // ASR "piu" without accent
  s = s.replace(/\bsommato\s+a\s+/g, " + ");
  s = s.replace(/\bsomma\s+(?:di|tra|fra)\s+/g, " ");
  s = s.replace(/\bmeno\b/g, " - ");
  s = s.replace(/\b(?:sottratto|sottrai)\s+(?:a|da)\s+/g, " - ");
  s = s.replace(/\b(?:moltiplicato\s+(?:per|con)|moltiplicato|per|volte|times|x)\b/g, " * ");
  s = s.replace(/\bprodotto\s+(?:di|tra|fra)\s+/g, " ");
  s = s.replace(/\b(?:diviso\s+(?:per|con)|diviso|fratto|su|in)\b/g, " / ");
  s = s.replace(/\belevato\s+alla?\s+/g, " ** ");
  s = s.replace(/\belevato\s+/g, " ** ");
  s = s.replace(/\balla\s+(\d)/g, " ** $1");         // "2 alla 10" after "elevato" stripped
  s = s.replace(/\^/g, "**");                         // common math symbol

  // 4. Percentage: "20% di 150" → "(20/100)*150"  |  "X% di Y" | "il X percento di Y"
  s = s.replace(/(\d+(?:\.\d+)?)\s*%\s*di\s+/g, "($1/100)*");
  s = s.replace(/(\d+(?:\.\d+)?)\s*(?:percento|per\s+cento)\s+(?:di|sul?|sulla|sul)\s+/g, "($1/100)*");

  // 5. "N e M" as addition (only between numbers)
  s = s.replace(/(\d+)\s+e\s+(\d+)/g, "$1 + $2");

  // 6. Strip filler: di/il/la/i/gli/le/fa/sono/uguale and the isolated "è"
  s = s.replace(/\s+è\s+/g, " ");
  s = s.replace(/\b(?:di|il|la|i|gli|le|fa|sono|uguale|uguali|quanto|quant|risultato|risultato\s+di)\b/g, " ");

  // 7. Close any open Math.sqrt(...) / Math.abs(...) that didn't get a closing paren.
  //    Simple heuristic: count '(' and ')' and append missing ')'.
  const openParens  = (s.match(/\(/g) || []).length;
  const closeParens = (s.match(/\)/g) || []).length;
  if (openParens > closeParens) s += ")".repeat(openParens - closeParens);

  // 8. Collapse whitespace
  s = s.replace(/\s+/g, " ").trim();

  // 9. Safety: only allow a restricted alphabet — digits, operators, parens,
  //    dot, space, and the literal "Math.sqrt" / "Math.abs" / "**".
  //    We check by stripping those whitelisted tokens first.
  let check = s.replace(/Math\.(?:sqrt|abs)/g, "").replace(/\*\*/g, "");
  if (!/^[\d+\-*/().\s]+$/.test(check)) return null;
  if (/[+\-*/]\s*$/.test(s)) return null;

  try {
    // eslint-disable-next-line no-new-func
    const fn = new Function("return (" + s + ");");
    const result = fn();
    if (typeof result !== "number" || !isFinite(result)) return null;
    return result;
  } catch (e) { return null; }
}
function formatMathResult(n) {
  if (Number.isInteger(n)) return n.toString();
  // Round to 4 decimal places, strip trailing zeros
  return parseFloat(n.toFixed(4)).toString();
}

/* ─── Duration parsing ("5 minuti", "mezz'ora", "un quarto d'ora") ─ */
function parseDuration(s) {
  s = String(s || "").toLowerCase().trim();
  if (!s) return null;
  if (/\bmezz'?\s*ora\b/.test(s)) return 30 * 60 * 1000;
  if (/\b(?:un\s+)?quarto\s+d'?\s*ora\b/.test(s)) return 15 * 60 * 1000;
  if (/\bun'?\s*ora\b/.test(s)) return 60 * 60 * 1000;
  if (/\bdue\s+ore\b/.test(s)) return 2 * 60 * 60 * 1000;
  if (/\bun\s+minuto\b/.test(s)) return 60 * 1000;
  let m;
  if ((m = s.match(/(\d+(?:[,.]\d+)?)\s*(secondi?|sec|minuti?|min|ore|ora|h)\b/))) {
    const n = parseFloat(m[1].replace(",","."));
    const unit = m[2];
    if (/^sec/.test(unit)) return n * 1000;
    if (/^min/.test(unit)) return n * 60 * 1000;
    if (/^or|^h/.test(unit)) return n * 3600 * 1000;
  }
  // Italian word form (es. "cinque minuti")
  for (const [w, n] of Object.entries(NUMS_IT)) {
    const rx = new RegExp(`\\b${w}\\s+(secondi?|sec|minuti?|min|ore|ora|h)\\b`);
    const mm = s.match(rx);
    if (mm) {
      const unit = mm[1];
      if (/^sec/.test(unit)) return n * 1000;
      if (/^min/.test(unit)) return n * 60 * 1000;
      if (/^or|^h/.test(unit)) return n * 3600 * 1000;
    }
  }
  return null;
}
function formatDuration(ms) {
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  if (h && m) return `${h}h ${m}m`;
  if (h) return `${h} or${h===1?"a":"e"}`;
  if (m && s && m < 5) return `${m}m ${s}s`;
  if (m) return `${m} minut${m===1?"o":"i"}`;
  return `${s} second${s===1?"o":"i"}`;
}

/* ─── Timer manager ──────────────────────────────────────────── */
const Timers = {
  active: [],
  start(ms, label) {
    const id = "t" + Date.now() + Math.random().toString(36).slice(2,6);
    const endAt = Date.now() + ms;
    const handle = setTimeout(() => this.fire(id), ms);
    const t = { id, label: label || "timer", endAt, handle };
    this.active.push(t);
    return t;
  },
  fire(id) {
    const i = this.active.findIndex(t => t.id === id);
    if (i < 0) return;
    const t = this.active[i];
    this.active.splice(i, 1);
    try { showBubble(`⏰ Timer ${t.label} finito!`); } catch(e){}
    try { TTS.speak(`Timer ${t.label} finito!`); } catch(e){}
    try { haptic(300); } catch(e){}
    try {
      if ("Notification" in window && Notification.permission === "granted") {
        new Notification("Teto", { body: `⏰ Timer ${t.label} finito!`, icon: typeof TETO_IMG !== "undefined" ? TETO_IMG : undefined });
      }
    } catch(e){}
  },
  cancelAll() {
    this.active.forEach(t => clearTimeout(t.handle));
    this.active = [];
  },
};

/* ─── Unit conversion (length, mass, volume, time) ────────────── */
const UNITS = {

  // time (base sec)
  sec: { type:"time", f:1, aliases:["s","sec","secondo","secondi"] },
  minu:{ type:"time", f:60, aliases:["min","minuto","minuti"] },
  ora: { type:"time", f:3600, aliases:["h","ora","ore"] },
  gior:{ type:"time", f:86400, aliases:["giorno","giorni"] },
};
function findUnit(name) {
  if (!name) return null;
  const n = String(name).toLowerCase().trim();
  for (const [k, u] of Object.entries(UNITS)) {
    if (u.aliases.includes(n)) return { key:k, type:u.type, f:u.f };
  }
  return null;
}
function convertUnit(value, fromName, toName) {
  const from = findUnit(fromName);
  const to   = findUnit(toName);
  if (!from || !to || from.type !== to.type) return null;
  return value * from.f / to.f;
}

const WMO_CODES = {
  0:"sereno ☀️", 1:"quasi sereno 🌤", 2:"parzialmente nuvoloso ⛅", 3:"nuvoloso ☁️",
  45:"nebbia 🌫", 48:"nebbia con brina 🌫",

  61:"pioggia leggera 🌧", 63:"pioggia 🌧", 65:"pioggia forte 🌧",
  66:"pioggia ghiacciata 🥶", 67:"pioggia ghiacciata forte 🥶",
  71:"nevicata leggera 🌨", 73:"nevicata 🌨", 75:"nevicata forte 🌨",
  77:"granelli di neve ❄️",
  80:"rovesci 🌦", 81:"rovesci 🌧", 82:"rovesci violenti ⛈",
  85:"rovesci di neve 🌨", 86:"rovesci di neve forti 🌨",
  95:"temporale ⛈", 96:"temporale con grandine ⛈", 99:"temporale forte con grandine ⛈",
};
function getUserLocation() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("no-geo"));
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      err => reject(err),
      { timeout: 8000, maximumAge: 30 * 60 * 1000 }
    );
  });
}
async function geocodeCity(name) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=it&format=json`;
  const res = await fetch(url);
  if (!res.ok) return null;
  const data = await res.json();
  return data?.results?.[0] || null;
}
async function fetchWeather(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature` +
    `&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_probability_max` +
    `&timezone=auto&forecast_days=3`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("meteo-" + res.status);
  return res.json();
}
function formatWeatherCurrent(data, cityLabel) {
  const c = data.current;
  const desc = WMO_CODES[c.weather_code] || "cielo misterioso";
  const temp = Math.round(c.temperature_2m);
  const feels = Math.round(c.apparent_temperature);
  return `A ${cityLabel} ora: ${desc}, ${temp}°C (percepiti ${feels}°). Vento ${Math.round(c.wind_speed_10m)} km/h, umidità ${c.relative_humidity_2m}%`;
}
function formatWeatherDay(data, dayIndex, cityLabel, dayLabel) {
  const d = data.daily;
  const code = d.weather_code[dayIndex];
  const desc = WMO_CODES[code] || "boh";
  const tmax = Math.round(d.temperature_2m_max[dayIndex]);
  const tmin = Math.round(d.temperature_2m_min[dayIndex]);
  const rain = d.precipitation_probability_max ? d.precipitation_probability_max[dayIndex] : 0;
  let s = `${dayLabel} a ${cityLabel}: ${desc}, min ${tmin}° max ${tmax}°`;
  if (rain >= 30) s += `, pioggia probabile (${rain}%)`;
  return s;
}

/* ─── Festività / countdown ──────────────────────────────────── */
function nextHoliday(month, day) {
  // month is 0-indexed (Jan=0)
  const now = new Date();
  const thisYear = new Date(now.getFullYear(), month, day, 0, 0, 0, 0);
  // If today is the holiday itself, return today (not next year)
  const today0 = new Date(); today0.setHours(0,0,0,0);
  if (thisYear.getTime() >= today0.getTime()) return thisYear;
  return new Date(now.getFullYear() + 1, month, day, 0, 0, 0, 0);
}
function findHoliday(q) {
  const n = String(q || "").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .replace(/[^a-z\s]/g, "").trim();
  if (/natal/.test(n))                       return { date: nextHoliday(11, 25), name: "Natale 🎄" };
  if (/capodanno|san\s*silvestro/.test(n))   return { date: nextHoliday(0, 1),   name: "Capodanno 🎆" };
  if (/epifania|befana/.test(n))             return { date: nextHoliday(0, 6),   name: "Epifania 🧙" };
  if (/san\s*valentino|valentino/.test(n))   return { date: nextHoliday(1, 14),  name: "San Valentino 💝" };
  if (/festa.*donna|otto\s*marzo/.test(n))   return { date: nextHoliday(2, 8),   name: "Festa della Donna 🌸" };
  if (/liberazione|venticinque.*aprile/.test(n)) return { date: nextHoliday(3, 25), name: "Festa della Liberazione" };
  if (/primo\s*maggio|festa.*lavor/.test(n)) return { date: nextHoliday(4, 1),   name: "Festa dei Lavoratori" };
  if (/repubblica|due\s*giugno/.test(n))     return { date: nextHoliday(5, 2),   name: "Festa della Repubblica 🇮🇹" };
  if (/ferragosto/.test(n))                  return { date: nextHoliday(7, 15),  name: "Ferragosto 🏖" };
  if (/ogniss|tutti\s*i\s*santi/.test(n))    return { date: nextHoliday(9, 1),   name: "Ognissanti" };
  if (/halloween/.test(n))                   return { date: nextHoliday(9, 31),  name: "Halloween 🎃" };
  if (/immacolata/.test(n))                  return { date: nextHoliday(11, 8),  name: "Immacolata" };
  if (/santo\s*stefano/.test(n))             return { date: nextHoliday(11, 26), name: "Santo Stefano" };
  return null;
}
function daysBetween(futureDate) {
  const now = new Date();
  const d0 = new Date(); d0.setHours(0,0,0,0);
  return Math.ceil((futureDate.getTime() - d0.getTime()) / 86400000);
}


/* ─── Text-to-Speech (voce italiana di sistema) ─── */
const TTS = {
  enabled: localStorage.getItem("teto-tts") === "1",
  voice: null,
  availableVoices: [],
  // User-configurable settings — defaults calibrated from acoustic analysis
  // of real Teto voice samples (F0 median ~344 Hz, rate ~7.2 onsets/sec).
  // Browser TTS cannot fully replicate Vocaloid timbre, but these values
  // push as close as the Web Speech API allows.
  settings: {
    voiceName: localStorage.getItem("teto-voice-name") || "",
    pitch:     parseFloat(localStorage.getItem("teto-voice-pitch"))  || 1.9,
    rate:      parseFloat(localStorage.getItem("teto-voice-rate"))   || 1.3,
    volume:    parseFloat(localStorage.getItem("teto-voice-volume")) || 0.95,
  },
  defaults: { pitch: 1.9, rate: 1.3, volume: 0.95 },
  init() {
    if (!window.speechSynthesis) return;
    const refresh = () => {
      const all = speechSynthesis.getVoices();
      // Italian voices first, then everything else
      this.availableVoices = all.filter(v => v.lang.startsWith("it"))
        .concat(all.filter(v => !v.lang.startsWith("it")));
      this.pickVoice();
    };
    refresh();
    speechSynthesis.onvoiceschanged = refresh;
  },
  /**
   * Picks the "most Teto-like" voice available on the device.
   * Priority order (highest first):
   *  1. User's saved choice (if it still exists)
   *  2. Italian female voices by known name (iOS/macOS/Windows/Samsung)
   *  3. Italian neural/wavenet/natural voices (Google TTS newer models)
   *  4. Any Italian voice flagged "female"
   *  5. Google italiano / any Italian voice
   *  6. Fallback to any available voice
   */
  pickVoice() {
    const voices = this.availableVoices;
    if (!voices.length) { this.voice = null; return; }

    // 1. Saved preference wins
    if (this.settings.voiceName) {
      const v = voices.find(x => x.name === this.settings.voiceName);
      if (v) { this.voice = v; return; }
    }

    // Utility: score italian-only candidates
    const italian = voices.filter(v => v.lang.startsWith("it"));

    // 2. Known female Italian voices across platforms — most Teto-friendly
    // iOS/macOS: Alice, Federica, Paolina. Windows: Elsa. Samsung/Google: various Italian female names.
    const femaleNames = [
      "Alice", "Federica", "Paolina", "Elsa", "Carla", "Chiara",
      "Giorgia", "Morgana", "Sofia", "Bianca", "Martina", "Giulia",
    ];
    for (const name of femaleNames) {
      const v = italian.find(x => x.name.includes(name));
      if (v) { this.voice = v; return; }
    }

    // 3. Google Neural/WaveNet/Natural — newest high-quality Italian voices
    const highQualityKeywords = ["Neural", "WaveNet", "Natural", "Studio", "Premium"];
    for (const kw of highQualityKeywords) {
      const v = italian.find(x => x.name.includes(kw));
      if (v) { this.voice = v; return; }
    }

    // 4. Any voice flagged as female
    const femaleFlag = italian.find(x =>
      /female|donna|feminile|F\b/i.test(x.name)
    );
    if (femaleFlag) { this.voice = femaleFlag; return; }

    // 5. Google italiano (Android default) — typically female by default
    const google = italian.find(x => /google/i.test(x.name));
    if (google) { this.voice = google; return; }

    // 6. Any Italian, then anything
    this.voice = italian[0] || voices[0];
  },
  speak(text, opts = {}) {
    if ((!this.enabled && !opts.force) || !window.speechSynthesis) return;
    // Strip anything TTS would read aloud awkwardly: emojis, tildes, markdown chars.
    // Keep sentence-ending punctuation so prosody stays natural.
    const cleaned = String(text)
      .replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/gu, "")  // most emoji ranges
      .replace(/[🍞♪♫✨🌟⚡🎵💼🥖🎤😢⚠️🌅☕💧🌸☀️🔔⏰📝📋♡★🌙☺🎶🥖]/gu, "")
      .replace(/[~〜∼]/g, "")        // tildes
      .replace(/[*_`#<>|]/g, "")      // markdown-ish
      .replace(/\s+/g, " ")
      .trim();
    if (!cleaned) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(cleaned);
    u.lang   = "it-IT";
    u.rate   = this.settings.rate;
    u.pitch  = this.settings.pitch;
    u.volume = this.settings.volume;
    if (this.voice) u.voice = this.voice;
    // Pause wake listener during speech so Teto can't trigger her own name.
    // WAKE may not be defined yet when TTS.init() runs on first load.
    const wakeOn = (typeof WAKE !== "undefined") && WAKE.enabled && !WAKE.paused;
    if (wakeOn) WAKE.pause();
    u.onend   = () => { if (wakeOn) WAKE.resume(); };
    u.onerror = () => { if (wakeOn) WAKE.resume(); };
    speechSynthesis.speak(u);
  },
  stop() { speechSynthesis?.cancel(); },
  toggle() {
    this.enabled = !this.enabled;
    localStorage.setItem("teto-tts", this.enabled ? "1" : "0");
    if (!this.enabled) this.stop();
    else this.speak("Voce attivata~ 🍞");
  },
  setVoice(name) {
    this.settings.voiceName = name;
    localStorage.setItem("teto-voice-name", name);
    this.pickVoice();
  },
  setSetting(key, value) {
    this.settings[key] = value;
    localStorage.setItem("teto-voice-" + key, String(value));
  },
  resetDefaults() {
    this.settings.pitch  = this.defaults.pitch;
    this.settings.rate   = this.defaults.rate;
    this.settings.volume = this.defaults.volume;
    this.settings.voiceName = "";
    localStorage.removeItem("teto-voice-pitch");
    localStorage.removeItem("teto-voice-rate");
    localStorage.removeItem("teto-voice-volume");
    localStorage.removeItem("teto-voice-name");
    this.pickVoice();
  },
  applyTetoPreset() {
    // Calibrated from real Teto voice analysis:
    // F0 ~344 Hz → pitch 1.9 (near TTS max)
    // ~7 onsets/sec → rate 1.3
    this.settings.pitch = 1.9;
    this.settings.rate = 1.3;
    this.settings.volume = 0.95;
    localStorage.setItem("teto-voice-pitch", "1.9");
    localStorage.setItem("teto-voice-rate", "1.3");
    localStorage.setItem("teto-voice-volume", "0.95");
  },
  preview() {
    this.speak("Ciao~! Sono Teto e questa è la mia voce! 🍞", { force: true });
  },
};
TTS.init();

/* ─── Wake word listener ("Ehy Teto") ─────────────────────────────
   Continuously listens in the background; when it hears the wake
   phrase it opens the normal command microphone. Only ONE recognizer
   can run at a time in a given tab, so we pause the wake listener
   whenever:
     • the command mic (toggleMic) is active
     • Teto is speaking via TTS (so she doesn't trigger herself)
   We auto-restart on onend because continuous recognition on Chromium
   silently dies after ~60s of silence.                               */
const WAKE = {
  enabled: localStorage.getItem("teto-wake") === "1",
  rec: null,
  paused: false,
  // Italian ASR transcribes "hey teto" in many ways — match broadly
  patterns: [
    /\beh?y\s*teto\b/i,        // "ehy teto", "ey teto"
    /\bhey\s*teto\b/i,         // "hey teto"
    /\behi\s*teto\b/i,         // "ehi teto" (most common Italian form)
    /\bei\s*teto\b/i,          // "ei teto"
    /\beh\s*teto\b/i,          // "eh teto"
    /\bhei\s*teto\b/i,         // "hei teto"
    /\bai\s*teto\b/i,          // "ei" sometimes heard as "ai"
    /\beh?y\s*tetto\b/i,       // "teto" → "tetto" (roof) is a common miss
    /\behi\s*tetto\b/i,
    /\bhey\s*tetto\b/i,
  ],
  supported() {
    return !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  },
  matches(text) {
    const t = String(text || "").toLowerCase();
    if (!/teto|tetto/.test(t)) return false;
    return this.patterns.some(re => re.test(t));
  },
  start() {
    if (!this.enabled) return;
    if (!this.supported()) return;
    if (this.paused) return;
    if (this.rec) return;            // already running
    if (state.listening) return;     // command mic has priority
    // Defer if TTS is still speaking
    if (window.speechSynthesis && speechSynthesis.speaking) {
      setTimeout(() => this.start(), 400);
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    try {
      const r = new SR();
      r.lang = "it-IT";
      r.continuous = true;
      r.interimResults = true;  // faster detection
      r.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const transcript = e.results[i][0].transcript;
          if (this.matches(transcript)) {
            this.trigger();
            return;
          }
        }
      };
      r.onerror = (ev) => {
        // If permission denied, turn off the feature silently
        if (ev.error === "not-allowed" || ev.error === "service-not-allowed") {
          this.enabled = false;
          localStorage.setItem("teto-wake", "0");
          showBubble("Microfono negato — disattivo l'ascolto 😢", {silent:true});
          render();
        }
        // "no-speech" / "aborted" are normal — let onend handle restart
      };
      r.onend = () => {
        this.rec = null;
        // Auto-restart if still supposed to be running, but with a LONG delay.
        // Chromium's continuous recognizer ends on every silence gap; a short
        // restart causes the OS mic-indicator and "mic open" chime to fire
        // repeatedly. 4 seconds is long enough that the chime isn't
        // perceptible as flickering, short enough that wake latency stays
        // under ~5s after the user speaks.
        if (this.enabled && !this.paused && !state.listening) {
          clearTimeout(this._restartT);
          this._restartT = setTimeout(() => this.start(), 4000);
        }
      };
      r.start();
      this.rec = r;
    } catch (err) {
      // .start() throws if already started, or without user gesture on first
      // run. Either way — clear the ref so a later attempt can retry.
      console.warn("Wake start failed:", err);
      this.rec = null;
    }
  },
  stop() {
    if (this.rec) {
      try { this.rec.onend = null; } catch(e) {}
      try { this.rec.stop(); } catch(e) {}
      try { this.rec.abort(); } catch(e) {}
      this.rec = null;
    }
  },
  pause() {
    this.paused = true;
    this.stop();
  },
  resume() {
    this.paused = false;
    if (this.enabled) setTimeout(() => this.start(), 300);
  },
  trigger() {
    // Wake heard — release mic, then open command recognizer
    this.pause();
    haptic(20);
    setTimeout(() => { toggleMic(); }, 200);
  },
  toggle() {
    if (!this.supported()) {
      showBubble(TETO.noVoice);
      return;
    }
    this.enabled = !this.enabled;
    localStorage.setItem("teto-wake", this.enabled ? "1" : "0");
    if (this.enabled) {
      showBubble("Dì \"Ehy Teto\" per parlarmi a mani libere~ ♪");
      this.start();
    } else {
      this.stop();
      showBubble("Parola di attivazione disattivata");
    }
  },
};

const Theme = {
  mode: localStorage.getItem("teto-theme") || "auto",  // "light" | "dark" | "auto"
  apply() {
    const mql = window.matchMedia("(prefers-color-scheme: dark)");
    const resolved = this.mode === "auto" ? (mql.matches ? "dark" : "light") : this.mode;
    document.documentElement.setAttribute("data-theme", resolved);
    // Update meta theme-color for status bar
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = resolved === "dark" ? "#2d1b24" : "#ff2f5e";
  },
  set(mode) {
    this.mode = mode;
    localStorage.setItem("teto-theme", mode);
    this.apply();
  },
  init() {
    this.apply();
    // React to system theme change when in auto mode
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
      if (this.mode === "auto") this.apply();
    });
  },
};
