<style>
/* ────────────────────────── RESET & VARS ────────────────────────── */
:root {
  --red: #ff2f5e;
  --red-bright: #ff4271;
  --pink: #ffb0c1;
  --deep: #a31540;
  --deep-wine: #7a0d28;
  --blush: #e85c7f;
  --dark: #2a1a22;
  --muted: #b09099;
  --soft: #e8c8d0;
  --cream: #fff1f3;
  --bg: linear-gradient(160deg, #fff5f6 0%, #ffe3ea 45%, #ffd1dc 100%);
  --card: #fffdfd;
  --card-border: #ffd6de;
  --accent-gold: #ffb84d;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* Dark mode: warm dark red-wine palette */
[data-theme="dark"] {
  --red: #ff6b8e;
  --red-bright: #ff4271;
  --pink: #c25a73;
  --deep: #ff8fa8;
  --deep-wine: #5a0820;
  --blush: #ff8fa8;
  --dark: #fff0f3;
  --muted: #a78c92;
  --soft: #5a3a45;
  --cream: #2d1b24;
  --bg: linear-gradient(160deg, #1a0e14 0%, #2d1820 45%, #3a1a26 100%);
  --card: #2d1b24;
  --card-border: #4a2a36;
  --accent-gold: #ffc77a;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400"><g font-family="sans-serif" opacity="0.055"><text x="40" y="60" font-size="32" fill="%23c22a4a">♪</text><text x="320" y="90" font-size="26" fill="%23e85c7f">♫</text><text x="180" y="140" font-size="22" fill="%23c22a4a">✨</text><text x="80" y="220" font-size="28" fill="%23e85c7f">🍞</text><text x="280" y="260" font-size="30" fill="%23c22a4a">♪</text><text x="150" y="320" font-size="24" fill="%23e85c7f">♡</text><text x="360" y="360" font-size="26" fill="%23c22a4a">♫</text><text x="30" y="350" font-size="22" fill="%23e85c7f">✨</text><text x="210" y="50" font-size="20" fill="%23c22a4a">♡</text></g></svg>");
  background-repeat: repeat;
  background-size: 400px 400px;
  z-index: 0;
}
#app { position: relative; z-index: 1; }
button { cursor:pointer; border:none; background:none; font-family:inherit; }
button:active { transform:scale(0.96); }
input, textarea { font-family:inherit; }
input:focus, textarea:focus { outline:none; border-color:var(--red) !important; }

/* ────────────────────────── ANIMATIONS ────────────────────────── */
@keyframes pulse { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.6)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes bubbleIn { 0%{opacity:0;transform:translateY(8px) scale(.92)} 100%{opacity:1;transform:translateY(0) scale(1)} }
@keyframes fadeUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes glow { 0%{box-shadow:0 0 0 0 rgba(255,66,113,.35)} 70%{box-shadow:0 0 0 8px rgba(255,66,113,0)} 100%{box-shadow:0 0 0 0 rgba(255,66,113,0)} }
@keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
@keyframes cardIn { 0%{opacity:0;transform:translateX(-12px)} 100%{opacity:1;transform:translateX(0)} }

/* ────────────────────────── LAYOUT ────────────────────────── */
#app {
  max-width: 480px;
  margin: 0 auto;
  padding: calc(18px + var(--safe-top)) 12px calc(24px + var(--safe-bottom));
  min-height: 100vh;
}

/* ────────────────────────── LOADING ────────────────────────── */
#loader {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:80vh; gap:16px;
}
#loader .spinner {
  width:36px; height:36px; border:3px solid #f0e0e6;
  border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite;
}
#loader p { color:var(--muted); font-weight:700; font-size:.88rem; }

/* ────────────────────────── HEADER ────────────────────────── */
.header { display:flex; align-items:center; gap:14px; margin-bottom:6px; }
.header h1 {
  font-family: 'Fredoka', 'Nunito', sans-serif;
  font-size:1.9rem; font-weight:700; color:var(--red);
  letter-spacing:-.025em; line-height:1;
  text-shadow: 0 2px 0 rgba(163,21,64,.12);
  white-space:nowrap;
}
.header h1 span { color:var(--dark); font-weight:500; margin-left:0; }
.header .sub { font-size:.85rem; color:var(--deep); font-weight:700; margin-top:4px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.mascot { animation:float 3s ease-in-out infinite; flex-shrink:0; }
.avatar {
  position:relative; width:82px; height:82px; border-radius:50%; overflow:hidden;
  border:3.5px solid var(--red); background:#fff;
  box-shadow:
    0 4px 18px rgba(255,47,94,.35),
    0 0 0 2px #fff,
    0 0 0 5.5px var(--red);
}
.avatar img { width:100%; height:100%; object-fit:cover; display:block; user-select:none; }
.avatar-speak { animation:glow 1.2s ease infinite; }
.avatar-ring { position:absolute; inset:-8px; border-radius:50%;
  border:2.5px solid var(--red); animation:pulse 1.2s ease-out infinite; pointer-events:none; }
.speaker-toggle { padding:6px 12px; border-radius:10px; font-size:.74rem; font-weight:800;
  color:var(--deep); background:rgba(255,47,94,.12); transition:all .15s; margin-left:0; min-height:30px;
  display:inline-flex; align-items:center; gap:4px; border:1.5px solid rgba(255,47,94,.15); }
.speaker-toggle.on { background:var(--red); color:#fff; box-shadow:0 2px 8px rgba(255,47,94,.3); border-color:var(--red); }
.speak-btn { padding:6px; color:var(--soft); transition:color .15s; }
.speak-btn:hover { color:var(--red); }
.speak-btn.playing { color:var(--red); animation:glow 1.2s ease infinite; border-radius:6px; }

/* Reminder chip & task states */
.reminder-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:10px; font-size:.7rem;
  font-weight:700; margin-left:6px; white-space:nowrap;
}
.reminder-chip.future { background:#e8f5f1; color:#2d8a76; }
.reminder-chip.today { background:#fff0d6; color:#b8731a; }
.reminder-chip.overdue { background:#ffdce3; color:#c22a4a; animation:glow 1.5s ease infinite; }
.task-card.overdue { border-left-color:#c22a4a; }
.task-card.today { border-left-color:#e8a73d; }

/* Reminder picker */
.reminder-btn {
  padding:8px 14px; border-radius:16px; font-size:.76rem; font-weight:800;
  color:var(--deep); background:rgba(255,47,94,.1); transition:all .2s;
  display:inline-flex; align-items:center; gap:4px; white-space:nowrap;
  border:1.5px solid rgba(255,47,94,.25); min-height:36px;
}
.reminder-btn:hover { background:rgba(255,47,94,.2); }
.reminder-btn.set { background:var(--red); color:#fff; border-color:var(--red); box-shadow:0 2px 8px rgba(255,47,94,.3); }
.reminder-picker {
  display:flex; flex-direction:column; gap:8px;
  padding:10px; background:var(--cream); border-radius:12px; margin-top:8px;
  border:1.5px solid #f0e0e6;
}
.reminder-presets {
  display:flex; flex-wrap:wrap; gap:6px;
}
.preset-chip {
  padding:8px 14px; border-radius:12px; font-size:.78rem; font-weight:700;
  background:#fff; color:var(--blush); border:1.5px solid rgba(255,66,113,.2);
  transition:all .15s; min-height:36px;
}
.preset-chip:hover { background:var(--red); color:#fff; border-color:var(--red); }
.preset-chip:active { transform:scale(.95); }
.reminder-custom-label {
  font-size:.74rem; font-weight:700; color:var(--deep);
  padding:6px 0 2px 4px;
}
.reminder-custom { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.reminder-custom input {
  flex:1; min-width:140px;
  border:1.5px solid #e5d8de; background:#fff; padding:10px 12px;
  border-radius:10px; font-size:.88rem;
  font-weight:600; color:var(--dark); font-family:inherit; min-height:42px;
}
.reminder-clear {
  padding:10px 14px; border-radius:10px; background:#fff; font-size:.78rem;
  font-weight:700; color:var(--muted); border:1.5px solid #f0e0e6; min-height:42px;
}
.reminder-clear.primary { background:var(--red); color:#fff; border-color:var(--red); box-shadow:0 2px 8px rgba(255,47,94,.25); }

/* Undo snackbar */
.undo-snack {
  position:fixed; left:50%; bottom:calc(20px + var(--safe-bottom));
  transform:translateX(-50%); background:var(--dark); color:#fff;
  padding:12px 8px 12px 18px; border-radius:14px;
  display:flex; align-items:center; gap:10px;
  box-shadow:0 6px 24px rgba(0,0,0,.2); z-index:1000;
  font-size:.88rem; font-weight:600; animation:slideUpCentered .3s ease;
  max-width:92vw;
}
.undo-snack button {
  background:var(--red); color:#fff; padding:8px 16px; border-radius:10px;
  font-size:.82rem; font-weight:800; min-height:36px;
}
@keyframes slideUpCentered { 0%{opacity:0;transform:translate(-50%,20px)} 100%{opacity:1;transform:translate(-50%,0)} }
@keyframes panelIn { 0%{opacity:0;transform:translateY(16px) scale(.98)} 100%{opacity:1;transform:translateY(0) scale(1)} }

/* Panel animations only play on first appearance, not on every re-render.
   We achieve this by adding .no-animate class to the panel after first frame
   via JS (see applyPanelAnimationOnce). */
.cal-panel.no-animate,
.cal-form.no-animate,
.help-panel.no-animate { animation: none !important; }

/* ────────────────────────── HELP PANEL ────────────────────────── */
.help-panel {
  max-width: 500px;
}
.help-intro {
  background: var(--cream); color: var(--deep);
  padding: 12px 14px; border-radius: 12px;
  font-size: .88rem; font-weight: 600;
  line-height: 1.5; margin-bottom: 14px;
  border-left: 3px solid var(--red);
}
.help-group {
  margin-bottom: 16px;
}
.help-group-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.05rem; font-weight: 600; color: var(--red);
  margin-bottom: 8px; padding-bottom: 6px;
  border-bottom: 1.5px dashed var(--card-border);
}
.help-cmd {
  padding: 9px 0;
  border-bottom: 1px solid var(--card-border);
}
.help-cmd:last-child { border-bottom: none; }
.help-cmd-say {
  font-size: .9rem; font-weight: 700; color: var(--dark);
  margin-bottom: 2px;
  font-style: italic;
}
.help-cmd-does {
  font-size: .78rem; color: var(--muted); font-weight: 600;
  line-height: 1.35;
}
.help-footer {
  background: rgba(255,47,94,.08);
  padding: 12px 14px; border-radius: 12px;
  font-size: .82rem; font-weight: 600;
  color: var(--deep); line-height: 1.5;
  margin-top: 8px;
}
.help-footer b { color: var(--red); font-weight: 800; }

[data-theme="dark"] .help-cmd-say { color: var(--dark); }
[data-theme="dark"] .help-intro, [data-theme="dark"] .help-footer { color: var(--dark); }

/* Inline text editing */
.task-edit-input {
  flex:1; border:1.5px solid var(--red); border-radius:10px;
  padding:8px 12px; font-size:.92rem; font-weight:600;
  color:var(--dark); background:#fff; font-family:inherit;
  min-height:38px;
}
.edit-text-link {
  font-size:.78rem; font-weight:700; color:var(--blush);
  padding:4px 0; margin-bottom:8px; background:none;
  display:inline-flex; align-items:center; gap:4px;
}
.edit-text-link:hover { color:var(--red); }

/* Today section header */
.section-label {
  font-size:.72rem; font-weight:800; color:var(--blush);
  text-transform:uppercase; letter-spacing:.08em;
  margin:14px 0 6px 4px; display:flex; align-items:center; gap:6px;
}
.section-label .count {
  background:var(--red); color:#fff; padding:1px 7px; border-radius:8px;
  font-size:.68rem; font-weight:800;
}

/* Settings panel */
.settings-btn {
  padding:6px; color:var(--muted); transition:color .15s; margin-left:6px;
}
.settings-btn:hover { color:var(--red); }
.settings-panel {
  background:var(--card); border-radius:16px; padding:14px;
  margin-bottom:14px; box-shadow:0 3px 18px rgba(212,106,131,.1);
  border:1.5px solid rgba(255,66,113,.08);
  animation:fadeUp .25s ease;
}
.settings-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid #f8eef2;
}
.settings-row:last-child { border-bottom:none; }
.settings-label { font-size:.86rem; font-weight:700; color:var(--dark); }
.settings-hint { font-size:.72rem; color:var(--muted); font-weight:600; margin-top:2px; }
.toggle {
  position:relative; width:44px; height:24px; border-radius:14px;
  background:#e5d8de; transition:background .2s; flex-shrink:0;
}
.toggle.on { background:var(--red); }
.toggle::after {
  content:''; position:absolute; left:2px; top:2px; width:20px; height:20px;
  border-radius:50%; background:#fff; transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.toggle.on::after { transform:translateX(20px); }

/* Voice controls */
.settings-section-title {
  font-size:.78rem; font-weight:800; color:var(--red);
  text-transform:uppercase; letter-spacing:.06em;
  margin-bottom:10px; display:flex; align-items:center; gap:6px;
}
.voice-controls { display:flex; flex-direction:column; gap:14px; padding-bottom:10px; border-bottom:1px solid #f8eef2; margin-bottom:6px; }
.voice-field { display:flex; flex-direction:column; gap:4px; }
.voice-label {
  font-size:.8rem; font-weight:700; color:var(--dark);
  display:flex; justify-content:space-between; align-items:center;
}
.voice-value {
  font-size:.78rem; color:var(--red); font-weight:800;
  background:rgba(255,47,94,.08); padding:2px 8px; border-radius:8px;
  min-width:46px; text-align:center;
}
.voice-select {
  width:100%; padding:10px 12px; border-radius:10px;
  border:1.5px solid var(--card-border); background:var(--cream);
  font-size:.85rem; font-weight:600; color:var(--dark);
  font-family:inherit; min-height:40px;
}
.voice-field input[type=range] {
  width:100%; height:6px; border-radius:3px;
  background:linear-gradient(to right, var(--red) 0%, var(--pink) 100%);
  appearance:none; -webkit-appearance:none; outline:none;
  cursor:pointer;
}
.voice-field input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:22px; height:22px; border-radius:50%;
  background:#fff; border:3px solid var(--red);
  box-shadow:0 2px 6px rgba(255,47,94,.4);
  cursor:pointer;
}
.voice-field input[type=range]::-moz-range-thumb {
  width:22px; height:22px; border-radius:50%;
  background:#fff; border:3px solid var(--red);
  box-shadow:0 2px 6px rgba(255,47,94,.4);
  cursor:pointer; border:3px solid var(--red);
}
.slider-ends { font-size:.68rem; color:var(--muted); font-weight:600; display:flex; justify-content:space-between; margin-top:-2px; }
.voice-actions { display:flex; gap:8px; margin-top:4px; }
.voice-preview-btn {
  flex:1; padding:10px; border-radius:12px;
  background:linear-gradient(135deg, var(--red), var(--blush)); color:#fff;
  font-size:.85rem; font-weight:800;
  box-shadow:0 3px 10px rgba(255,47,94,.3);
  min-height:42px;
}
.voice-preview-btn:hover { transform:translateY(-1px); }
.voice-reset-btn {
  padding:10px 16px; border-radius:12px; background:#fff;
  border:1.5px solid var(--card-border); color:var(--muted);
  font-size:.85rem; font-weight:700; min-height:42px;
}
.voice-reset-btn:hover { color:var(--red); border-color:var(--red); }
.voice-teto-btn {
  padding:10px 14px; border-radius:12px;
  background:#fff;
  border:2px solid var(--red); color:var(--red);
  font-size:.85rem; font-weight:800; min-height:42px;
  display:flex; align-items:center; gap:4px;
}
.voice-teto-btn:hover { background:var(--red); color:#fff; }
.voice-note {
  font-size:.72rem; color:var(--muted); font-weight:600;
  line-height:1.4; padding:8px 10px; background:var(--cream);
  border-radius:10px; margin-top:6px;
}

/* ────────────────────────── BUBBLE ────────────────────────── */
.bubble {
  position:relative; background:var(--card); border-radius:18px 18px 18px 4px;
  padding:12px 18px; font-size:.92rem; font-weight:700; color:var(--dark);
  box-shadow:0 3px 16px rgba(255,47,94,.15);
  border:2px solid var(--red);
  margin:0 0 18px 18px;
  max-width:85%; animation:bubbleIn .35s ease forwards; line-height:1.4;
}
.bubble::before {
  content:''; position:absolute; left:-9px; bottom:8px; width:0; height:0;
  border-right:10px solid var(--red); border-top:7px solid transparent; border-bottom:7px solid transparent;
}
.bubble::after {
  content:''; position:absolute; left:-6px; bottom:10px; width:0; height:0;
  border-right:8px solid var(--card); border-top:5px solid transparent; border-bottom:5px solid transparent;
}

/* ────────────────────────── INPUT CARD ────────────────────────── */
.input-card {
  background:var(--card); border-radius:22px; padding:12px;
  box-shadow:0 4px 24px rgba(255,47,94,.12);
  margin-bottom:16px;
  border:2px solid var(--card-border);
  position:relative;
  overflow:visible;
}
.input-card::before {
  content: "♪";
  position: absolute; top: -12px; right: 18px;
  font-size: 22px; color: var(--red); opacity: .5;
  font-family: 'Fredoka', sans-serif; font-weight: 600;
  background: var(--bg); padding: 0 4px; border-radius: 50%;
  line-height: 1;
}
.input-row { display:flex; gap:8px; align-items:center; }
.mic-btn {
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,var(--red) 0%, var(--blush) 100%); color:#fff;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  position:relative;
  box-shadow:0 4px 14px rgba(255,47,94,.4), inset 0 2px 4px rgba(255,255,255,.25);
  transition:all .2s;
}
.mic-btn:active { transform:scale(.92); }
.mic-btn.active { background:linear-gradient(135deg,var(--deep-wine),var(--red)); animation:glow 1.2s ease infinite; }
.mic-btn .pulse-ring {
  position:absolute; inset:-6px; border-radius:50%;
  border:2.5px solid var(--red); animation:pulse 1.2s ease-out infinite;
}
.text-input {
  flex:1; min-width:0;
  border:2px solid var(--card-border); border-radius:14px;
  padding:13px 12px; font-size:.95rem; font-weight:600; min-height:48px;
  color:var(--dark); background:var(--cream); transition:all .2s;
}
.text-input:focus { border-color:var(--red) !important; background:#fff; box-shadow:0 0 0 3px rgba(255,47,94,.12); }
.send-btn {
  width:48px; height:48px; border-radius:14px;
  background:linear-gradient(135deg, var(--dark) 0%, var(--deep-wine) 100%); color:#fff;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  box-shadow:0 3px 10px rgba(122,13,40,.3);
  transition:all .15s;
}
.send-btn:not(:disabled):hover { transform:translateY(-1px); box-shadow:0 5px 14px rgba(122,13,40,.4); }
.send-btn:disabled { opacity:.35; background:var(--soft); box-shadow:none; }
.cat-row { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; }
.cat-btn {
  padding:9px 16px; border-radius:22px; font-size:.82rem;
  font-weight:700; transition:all .2s; white-space:nowrap; min-height:38px;
  border:2px solid transparent;
}
.cat-btn.on { background:var(--red); color:#fff; box-shadow:0 3px 10px rgba(255,47,94,.35); border-color:var(--red); }
.cat-btn.off { background:rgba(255,47,94,.08); color:var(--deep); border-color:rgba(255,47,94,.15); }
.cat-btn.off:hover { background:rgba(255,47,94,.15); }

/* ────────────────────────── FILTERS ────────────────────────── */
.filter-row { display:flex; gap:6px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
.filter-btn {
  padding:8px 14px; border-radius:10px; font-size:.82rem;
  font-weight:700; color:var(--muted); transition:all .15s; min-height:36px;
}
.filter-btn:hover { background:rgba(255,47,94,.08); }
.filter-btn.on { background:var(--red); color:#fff; box-shadow:0 2px 8px rgba(255,47,94,.3); }

/* ────────────────────────── TASK CARDS ────────────────────────── */
.task-list { display:flex; flex-direction:column; gap:10px; }
.task-card {
  background:var(--card); border-radius:var(--radius); padding:14px 12px;
  box-shadow:0 2px 10px rgba(255,47,94,.08);
  transition:all .2s;
  border-left:4px solid var(--red);
  border-top:1px solid var(--card-border);
  border-right:1px solid var(--card-border);
  border-bottom:1px solid var(--card-border);
  animation:cardIn .3s ease;
}
.task-card:hover { box-shadow:0 5px 20px rgba(255,47,94,.14); transform:translateY(-1px); }
.task-card.done { opacity:.55; border-left-color:var(--soft); }
.task-main { display:flex; align-items:center; gap:6px; }
.check-btn {
  width:34px; height:34px; border-radius:10px; border:2.5px solid var(--soft);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .2s; padding:0; background:#fff;
}
.check-btn:hover { border-color:var(--red); }
.check-btn.checked { background:var(--red); border-color:var(--red); box-shadow:0 2px 8px rgba(255,47,94,.35); }
.task-text {
  flex:1; font-size:.95rem; font-weight:600; line-height:1.4;
  overflow:hidden; text-overflow:ellipsis; min-width:0; cursor:pointer;
  padding:6px 0; color:var(--dark);
}
.task-text.done-text { text-decoration:line-through; color:var(--muted); }
.icon-btn { padding:10px; color:var(--soft); transition:color .15s;
  display:flex; align-items:center; justify-content:center; min-width:36px; min-height:36px; }
.icon-btn.del:hover { color:var(--red); }

/* ────────────────────────── EXPANDED ────────────────────────── */
.expand-area {
  margin:10px 0 0 32px; padding-top:10px; border-top:1px solid #f8eef2;
}
.meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.meta-cat { font-size:.72rem; font-weight:700; color:var(--blush); text-transform:uppercase; letter-spacing:.04em; }
.meta-date { font-size:.7rem; color:var(--soft); font-weight:600; }
.note-box {
  padding:8px 10px; border-radius:10px; background:var(--cream);
  cursor:pointer; min-height:32px; transition:background .2s;
}
.note-box p { margin:0; font-size:.84rem; font-weight:600; line-height:1.45; }
.note-box .text { color:#6b5060; white-space:pre-wrap; }
.note-box .placeholder { color:var(--soft); }
.note-area {
  width:100%; border:1.5px solid #f0e0e6; border-radius:12px;
  padding:10px 12px; font-size:.84rem; font-weight:600;
  color:var(--dark); resize:vertical; background:var(--cream);
}
.note-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
.note-cancel {
  padding:6px 14px; border-radius:10px; border:1.5px solid #f0e0e6;
  background:#fff; font-size:.76rem; font-weight:700; color:var(--muted);
}
.note-save {
  padding:6px 16px; border-radius:10px; background:var(--red);
  color:#fff; font-size:.76rem; font-weight:700;
}

/* ────────────────────────── EMPTY ────────────────────────── */
.empty-state { text-align:center; padding:44px 20px 24px; }
.empty-state .bread-icon { display:flex; justify-content:center; margin-bottom:10px; opacity:.85; }
.empty-state p { color:var(--deep); font-size:.95rem; font-weight:700; margin-top:4px; }

/* ────────────────────────── FOOTER ────────────────────────── */
/* ────────────────────────── LISTS ────────────────────────── */
.mini-lists-btn {
  width: 38px; height: 38px; border-radius: 10px;
  background: #fff; border: 2px solid var(--red);
  color: var(--red);
  font-size: 1.1rem; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(255,47,94,.25);
  transition: all .15s;
  margin-left: 2px;
}
.mini-lists-btn:hover { transform: translateY(-1px); background: var(--red); color: #fff; }
.mini-lists-btn:active { transform: scale(.92); }

.lists-back {
  padding: 8px 14px; border-radius: 10px;
  background: var(--cream); color: var(--red);
  font-weight: 800; font-size: .88rem;
  border: 1.5px solid var(--card-border);
}
.lists-back:hover { background: var(--red); color: #fff; }

.lists-title-row {
  display: flex; justify-content: space-between; align-items: flex-end;
  padding: 8px 4px 10px; border-bottom: 1px dashed var(--card-border);
  margin-bottom: 12px; gap: 8px; flex-wrap: wrap;
}
.lists-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.5rem; font-weight: 700; color: var(--red);
  line-height: 1.1;
  text-shadow: 0 2px 0 rgba(163,21,64,.1);
}
.lists-title-meta {
  font-size: .78rem; font-weight: 700; color: var(--deep);
  background: var(--cream); padding: 4px 10px; border-radius: 10px;
}

.lists-actions-row {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.lists-action-btn {
  padding: 8px 12px; border-radius: 10px;
  background: var(--cream); color: var(--deep);
  font-size: .78rem; font-weight: 700;
  border: 1px solid var(--card-border);
  min-height: 36px;
}
.lists-action-btn:hover { background: var(--red); color: #fff; }
.lists-action-btn.danger { color: var(--red); }
.lists-action-btn.danger:hover { background: var(--red); color: #fff; }

.lists-add-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.lists-add-input {
  flex: 1;
  padding: 12px 14px; border-radius: 12px;
  border: 2px solid var(--card-border);
  background: var(--cream); color: var(--dark);
  font-family: 'Nunito', sans-serif;
  font-size: .95rem; font-weight: 600;
  outline: none; min-height: 44px;
  box-sizing: border-box;
}
.lists-add-input:focus {
  border-color: var(--red); background: #fff;
  box-shadow: 0 0 0 3px rgba(255,47,94,.12);
}
.lists-add-btn {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--red), var(--blush));
  color: #fff;
  font-size: 1.4rem; font-weight: 700; line-height: 1;
  box-shadow: 0 3px 10px rgba(255,47,94,.3);
  flex-shrink: 0;
}

.lists-items {
  display: flex; flex-direction: column; gap: 6px;
}
.list-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--cream); border-radius: 12px;
  padding: 10px 12px;
  border-left: 3px solid var(--red);
  transition: all .15s;
  animation: cardIn .25s ease;
}
.list-item:hover { box-shadow: 0 3px 10px rgba(255,47,94,.1); }
.list-item.done { opacity: .5; border-left-color: var(--soft); }
.list-bullet {
  width: 24px; text-align: center;
  color: var(--red); font-size: 1.3rem; font-weight: 900; line-height: 1;
}
.list-item-text {
  flex: 1; min-width: 0;
  font-size: .95rem; font-weight: 600; color: var(--dark);
  word-wrap: break-word; line-height: 1.4;
}
.list-item-text.done-text { text-decoration: line-through; color: var(--muted); }

.lists-done-divider {
  font-size: .72rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 14px 4px 4px;
}

.lists-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; margin-top: 14px;
}
.list-card {
  padding: 14px; border-radius: 16px;
  background: var(--cream);
  border: 2px solid var(--card-border);
  display: flex; align-items: center; gap: 10px; text-align: left;
  transition: all .15s;
  min-height: 72px;
}
.list-card:hover { transform: translateY(-2px); border-color: var(--red);
  box-shadow: 0 5px 14px rgba(255,47,94,.18); }
.list-card-emoji { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
.list-card-body { flex: 1; min-width: 0; }
.list-card-name {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.02rem; font-weight: 600; color: var(--dark);
  line-height: 1.2;
  overflow: hidden; text-overflow: ellipsis;
}
.list-card-meta {
  font-size: .72rem; font-weight: 700; color: var(--muted);
  margin-top: 2px;
}

/* Dark mode for lists */
[data-theme="dark"] .list-item-text { color: var(--dark); }
[data-theme="dark"] .list-card-name { color: var(--dark); }
[data-theme="dark"] .lists-add-input { color: var(--dark); color-scheme: dark; }
[data-theme="dark"] .mini-lists-btn { background: var(--cream); }

/* ────────────────────────── LISTS UPGRADES ────────────────────────── */
/* F-G: Responsive grid */
@media (max-width: 360px) {
  .lists-grid { grid-template-columns: 1fr; }
}
@media (min-width: 600px) {
  .lists-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

/* U-3: List card category accent (left bar) */
.list-card {
  position: relative;
  border-left: 4px solid var(--list-cat-color, var(--card-border));
}

/* N-1: card progress bar */
.list-card-progress {
  height: 4px; border-radius: 2px;
  background: rgba(0,0,0,.06);
  margin-top: 6px; overflow: hidden;
}
.list-card-progress-bar {
  height: 100%; border-radius: 2px;
  background: var(--red);
  transition: width .4s cubic-bezier(.3,.9,.4,1);
}

/* Detail view category-tinted left border on items via inline style; also overall progress bar */
.list-progress {
  height: 6px; border-radius: 3px;
  background: rgba(255,47,94,.08);
  overflow: hidden;
  margin: -4px 0 12px;
}
.list-progress-bar {
  height: 100%; border-radius: 3px;
  background: var(--red);
  transition: width .5s cubic-bezier(.3,.9,.4,1);
  box-shadow: 0 0 8px currentColor;
}

/* U-1: inline edit input */
.list-item.editing {
  background: #fff;
  border: 2px solid var(--red);
  border-left-width: 4px;
  padding: 6px 10px;
  box-shadow: 0 0 0 3px rgba(255,47,94,.1);
}
.list-item-edit-input {
  flex: 1; min-width: 0;
  padding: 6px 8px; border-radius: 8px;
  border: none; outline: none;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  font-size: .95rem; font-weight: 600; color: var(--dark);
}
.list-item-text { cursor: text; }
.list-item-text:hover { color: var(--red); }
[data-theme="dark"] .list-item.editing { background: var(--card); }
[data-theme="dark"] .list-item-edit-input { color: var(--dark); }

/* U-2: reorder & duplicate icon buttons */
.icon-btn.move,
.icon-btn.dup {
  width: 28px; height: 28px; border-radius: 8px;
  background: transparent; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; flex-shrink: 0;
  transition: all .12s;
}
.icon-btn.move:not(.disabled):hover,
.icon-btn.dup:hover {
  background: rgba(255,47,94,.1);
  color: var(--red);
}
.icon-btn.move.disabled { opacity: .25; cursor: default; }

/* U-6: search input */
.list-search {
  width: 100%; box-sizing: border-box;
  padding: 10px 14px; margin-bottom: 10px;
  border-radius: 12px;
  border: 1.5px solid var(--card-border);
  background: var(--cream); color: var(--dark);
  font-family: 'Nunito', sans-serif;
  font-size: .9rem; font-weight: 600;
  outline: none; transition: all .15s;
}
.list-search:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,47,94,.12); }
[data-theme="dark"] .list-search { color: var(--dark); color-scheme: dark; }

/* F-D: undo banner */
.list-undo-banner {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; margin-bottom: 10px;
  border-radius: 12px;
  background: rgba(255,184,77,.18);
  border: 1px solid rgba(255,184,77,.3);
  font-size: .85rem; font-weight: 600;
  color: var(--deep);
  animation: cardIn .25s ease;
}
.list-undo-banner em {
  font-style: italic; color: var(--red);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.list-undo-btn {
  background: var(--red); color: #fff;
  padding: 5px 12px; border-radius: 8px;
  font-size: .78rem; font-weight: 800;
  flex-shrink: 0; cursor: pointer;
  border: none;
}
[data-theme="dark"] .list-undo-banner { color: var(--dark); background: rgba(255,184,77,.15); }

/* Compact action buttons (icons only) */
.lists-action-btn {
  min-width: 38px;
  padding: 8px 10px;
}

/* N-2: smooth check animation */
@keyframes listCheckPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4) rotate(8deg); }
  70%  { transform: scale(.9) rotate(-4deg); }
  100% { transform: scale(1); }
}
.list-item .check-btn.checked {
  animation: listCheckPop .4s cubic-bezier(.3,1.4,.6,1);
}
.list-item-text {
  transition: color .25s, opacity .25s;
}

/* ────────────────────────── END LISTS UPGRADES ────────────────────────── */

/* ────────────────────────── MINI CALENDAR BUTTON ────────────────────────── */
.mini-cal-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 10px; padding: 0;
  background: #fff; border: 2px solid var(--red);
  box-shadow: 0 2px 8px rgba(255,47,94,.25);
  transition: all .15s;
  margin-left: 2px;
}
.mini-cal-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(255,47,94,.4); }
.mini-cal-btn:active { transform: scale(.92); }
.mini-cal-month {
  font-size: .55rem; font-weight: 800; color: var(--red);
  text-transform: uppercase; letter-spacing: .05em;
  line-height: 1; padding: 3px 0 2px; width: 100%;
  border-bottom: 1.5px solid var(--red);
  background: rgba(255,47,94,.08);
}
.mini-cal-day {
  font-family: 'Fredoka', sans-serif; font-weight: 700;
  font-size: 1.1rem; color: var(--dark); line-height: 1;
  padding-top: 3px;
}

/* ────────────────────────── CALENDAR OVERLAY ────────────────────────── */
.cal-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(42,26,34,.55);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 12px;
  animation: fadeUp .25s ease;
  /* F3: scroll lives on the panel only — single scroll container */
}
.cal-panel {
  background: var(--card); border: 2px solid var(--red);
  border-radius: 22px;
  box-shadow: 0 10px 40px rgba(163,21,64,.35);
  width: 100%; max-width: 460px;
  max-height: 92vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 18px 16px;
  animation: panelIn .3s ease;
  position: relative;
}
.cal-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px; margin-bottom: 12px;
}
.cal-title-small {
  font-size: .78rem; font-weight: 700; color: var(--deep);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px;
}
.cal-month-label {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.6rem; font-weight: 700;
  color: var(--red); line-height: 1;
  text-transform: capitalize;
  text-shadow: 0 2px 0 rgba(163,21,64,.12);
}
.cal-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--cream); color: var(--red);
  font-size: 1rem; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid var(--card-border);
  flex-shrink: 0;
}
.cal-close:hover { background: var(--red); color: #fff; }

.cal-nav {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px; gap: 8px;
}
.cal-nav-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--cream); color: var(--red);
  font-size: 1.5rem; font-weight: 700;
  font-family: 'Fredoka', sans-serif;
  border: 1.5px solid var(--card-border);
  display: flex; align-items: center; justify-content: center; line-height: 1;
}
.cal-nav-btn:hover { background: var(--red); color: #fff; }
.cal-today-btn {
  flex: 1; padding: 10px;
  background: var(--red); color: #fff;
  border-radius: 12px; font-weight: 800;
  font-size: .88rem;
  box-shadow: 0 2px 8px rgba(255,47,94,.3);
}
.cal-today-btn:hover { transform: translateY(-1px); }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
  margin-bottom: 10px;
}
.cal-day-name {
  text-align: center;
  font-size: .72rem; font-weight: 800;
  color: var(--muted);
  padding: 4px 0;
  text-transform: uppercase; letter-spacing: .04em;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  padding-top: 6px;
  border: 2px solid transparent;
  border-radius: 10px;
  background: transparent;
  transition: all .12s;
  position: relative;
  cursor: pointer;
  min-height: 40px;
}
.cal-cell:not(.cal-empty):hover {
  background: var(--cream);
  border-color: var(--card-border);
}
.cal-cell.cal-empty { cursor: default; }
.cal-cell-num {
  font-family: 'Fredoka', sans-serif;
  font-size: 1rem; font-weight: 600; color: var(--dark);
  line-height: 1;
}
.cal-cell.weekend .cal-cell-num { color: var(--blush); }
.cal-cell.holiday .cal-cell-num { color: var(--red); font-weight: 700; }
.cal-cell.today {
  background: rgba(255,47,94,.12);
  border-color: var(--red);
}
.cal-cell.today .cal-cell-num { color: var(--red); font-weight: 800; }
.cal-cell.selected {
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 3px 10px rgba(255,47,94,.4);
  transform: scale(1.05);
}
.cal-cell.selected .cal-cell-num { color: #fff; }
.cal-dots {
  display: flex; gap: 3px; margin-top: auto; padding-bottom: 4px;
  align-items: center;
}
.cal-dot {
  width: 5px; height: 5px; border-radius: 50%;
  display: inline-block;
}
.cal-dot.event   { background: var(--red); }
.cal-dot.task    { background: var(--accent-gold); }
.cal-dot.holiday {
  /* F4: distinctive shape — small star outline instead of plain dot */
  width: 8px; height: 8px;
  background: transparent;
  color: var(--deep-wine);
  font-size: 10px; line-height: 8px;
  border-radius: 0;
  text-align: center;
}
.cal-dot.holiday::before { content: "★"; }
.cal-cell.selected .cal-dot { background: #fff !important; }
.cal-cell.selected .cal-dot.holiday { background: transparent !important; color: #fff !important; }

.cal-legend {
  display: flex; justify-content: center; gap: 12px;
  font-size: .72rem; font-weight: 700; color: var(--muted);
  padding: 8px 0 12px; border-bottom: 1px dashed var(--card-border);
  margin-bottom: 12px;
}
.cal-legend > span { display: inline-flex; align-items: center; gap: 4px; }

.cal-day-detail {
  margin-top: 6px;
}
.cal-day-header {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  margin-bottom: 10px; flex-wrap: wrap;
}
.cal-day-label {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.1rem; font-weight: 600; color: var(--dark);
  text-transform: capitalize;
}
.cal-holiday-badge {
  background: var(--deep-wine); color: #fff;
  padding: 4px 10px; border-radius: 12px;
  font-size: .72rem; font-weight: 800;
  letter-spacing: .02em;
}
.cal-subsection { margin-bottom: 12px; }
.cal-subsection-title {
  font-size: .76rem; font-weight: 800; color: var(--deep);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 6px;
}
.cal-empty-msg {
  color: var(--muted); font-size: .85rem; font-weight: 600;
  padding: 10px 12px; background: var(--cream);
  border-radius: 10px; text-align: center;
}
.cal-task-item, .cal-event-item {
  background: var(--cream); border-radius: 12px;
  padding: 10px 12px; margin-bottom: 6px;
  border-left: 3px solid var(--red);
  display: flex; align-items: center; gap: 10px;
  font-weight: 600;
}
.cal-task-item { border-left-color: var(--accent-gold); }
.cal-task-time, .cal-event-time {
  background: var(--red); color: #fff;
  padding: 4px 10px; border-radius: 8px;
  font-size: .78rem; font-weight: 800;
  flex-shrink: 0; white-space: nowrap;
}
.cal-task-time { background: var(--accent-gold); color: var(--dark); }
.cal-task-text { font-size: .9rem; color: var(--dark); flex: 1; min-width: 0; }
.cal-event-main { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.cal-event-body { flex: 1; min-width: 0; }
.cal-event-title { font-size: .92rem; color: var(--dark); font-weight: 700; }
.cal-event-note { font-size: .78rem; color: var(--muted); font-weight: 500; margin-top: 2px; line-height: 1.3; }
.cal-event-actions { display: flex; gap: 4px; flex-shrink: 0; }
.cal-event-actions button {
  width: 32px; height: 32px; border-radius: 8px;
  background: transparent; font-size: .9rem;
}
.cal-event-actions button:hover { background: rgba(255,47,94,.1); }
.cal-add-btn {
  width: 100%; padding: 12px; margin-top: 6px;
  background: linear-gradient(135deg, var(--red), var(--blush));
  color: #fff; border-radius: 14px;
  font-family: 'Fredoka', sans-serif;
  font-size: 1rem; font-weight: 700;
  box-shadow: 0 3px 10px rgba(255,47,94,.3);
}
.cal-add-btn:hover { transform: translateY(-1px); }

/* Calendar form (new/edit event) */
.cal-form-overlay {
  position: fixed; inset: 0; z-index: 2100;
  background: rgba(42,26,34,.6);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  overflow-y: auto;
}
.cal-form {
  background: var(--card); border: 2px solid var(--red);
  border-radius: 20px; padding: 18px;
  width: 100%; max-width: 400px;
  max-height: 92vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  box-shadow: 0 10px 40px rgba(163,21,64,.4);
  animation: panelIn .25s ease;
}
.cal-form-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.3rem; font-weight: 700; color: var(--red);
  margin-bottom: 14px;
}
.cal-form-label {
  display: block;
  font-size: .78rem; font-weight: 800; color: var(--deep);
  text-transform: uppercase; letter-spacing: .04em;
  margin: 10px 0 6px;
}
.cal-form-input {
  width: 100%;
  padding: 12px; border-radius: 12px;
  border: 2px solid var(--card-border);
  background: var(--cream); color: var(--dark);
  font-family: 'Nunito', sans-serif;
  font-size: .95rem; font-weight: 600;
  outline: none;
  transition: all .15s;
  box-sizing: border-box;
}
.cal-form-input:focus { border-color: var(--red); background: #fff; box-shadow: 0 0 0 3px rgba(255,47,94,.12); }
textarea.cal-form-input { resize: vertical; min-height: 60px; }
.cal-form-time {
  display: flex; align-items: center; gap: 6px;
}
.cal-form-time select {
  flex: 1;
  padding: 10px; border-radius: 10px;
  border: 2px solid var(--card-border);
  background: var(--cream); color: var(--dark);
  font-family: 'Fredoka', sans-serif;
  font-size: 1rem; font-weight: 600;
  text-align: center;
}
.cal-form-time span { font-size: 1.2rem; font-weight: 700; color: var(--red); }
.cal-form-actions {
  display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end;
}
.cal-form-cancel, .cal-form-save {
  padding: 10px 18px; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: .88rem; min-height: 42px;
}
.cal-form-cancel {
  background: #fff; color: var(--muted);
  border: 1.5px solid var(--card-border);
}
.cal-form-save {
  background: linear-gradient(135deg, var(--red), var(--blush));
  color: #fff; box-shadow: 0 3px 10px rgba(255,47,94,.3);
}

/* ─── View tabs (U1) ─── */
.cal-view-tabs {
  display: flex; gap: 6px; margin-bottom: 12px;
  background: rgba(255,47,94,.06);
  padding: 4px; border-radius: 12px;
}
.cal-view-tab {
  flex: 1; padding: 8px 12px;
  background: transparent;
  border-radius: 9px;
  font-family: 'Nunito', sans-serif;
  font-size: .85rem; font-weight: 700;
  color: var(--muted); border: none;
  transition: all .15s;
  cursor: pointer;
}
.cal-view-tab.on {
  background: linear-gradient(135deg, var(--red), var(--blush));
  color: #fff;
  box-shadow: 0 2px 8px rgba(255,47,94,.3);
}

/* ─── Category color bars on month cells (U4) ─── */
.cal-cat-bars {
  display: flex; gap: 2px; margin-top: 2px;
  width: 100%; padding: 0 4px;
  justify-content: center;
}
.cal-cat-bar {
  flex: 1; max-width: 14px; height: 3px;
  border-radius: 2px;
  display: inline-block;
}

/* ─── Agenda view (U1) ─── */
.cal-agenda-day {
  display: flex; gap: 12px;
  margin-bottom: 14px;
  align-items: stretch;
}
.cal-agenda-date {
  flex-shrink: 0;
  width: 56px;
  background: var(--cream);
  border: 1.5px solid var(--card-border);
  border-radius: 14px;
  padding: 8px 6px;
  text-align: center;
  display: flex; flex-direction: column; justify-content: center;
}
.cal-agenda-date.today {
  background: linear-gradient(135deg, var(--red), var(--blush));
  border-color: var(--red);
  color: #fff;
  box-shadow: 0 3px 10px rgba(255,47,94,.3);
}
.cal-agenda-date.today .cal-agenda-dow,
.cal-agenda-date.today .cal-agenda-mon { color: rgba(255,255,255,.85); }
.cal-agenda-date.today .cal-agenda-num { color: #fff; }
.cal-agenda-dow {
  font-size: .7rem; font-weight: 800; color: var(--blush);
  text-transform: uppercase; letter-spacing: .04em;
}
.cal-agenda-num {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.5rem; font-weight: 700; color: var(--deep);
  line-height: 1; margin: 2px 0;
}
.cal-agenda-mon {
  font-size: .65rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase;
}
.cal-agenda-events { flex: 1; min-width: 0; }

/* ─── Category picker buttons in form (U4) ─── */
.cal-cat-row {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px;
}
.cal-cat-btn {
  flex: 1 1 calc(33% - 4px);
  min-width: 0;
  padding: 8px 8px; border-radius: 10px;
  background: var(--cream);
  border: 2px solid var(--card-border);
  font-family: 'Nunito', sans-serif;
  font-size: .78rem; font-weight: 700;
  color: var(--dark);
  cursor: pointer; transition: all .15s;
  text-align: center;
}
.cal-cat-btn.on {
  background: var(--cat-color, var(--red));
  border-color: var(--cat-color, var(--red));
  color: #fff;
}

/* ─── Allday + recurrence + reminder badges (U2/U3/N3) ─── */
.cal-checkbox {
  margin-right: 6px; vertical-align: middle;
  width: 16px; height: 16px; accent-color: var(--red);
}
.cal-event-time.allday {
  background: linear-gradient(135deg, var(--accent-gold), #ffa500) !important;
  color: var(--dark) !important;
  font-size: .68rem !important;
}
.cal-event-recur, .cal-event-reminder {
  display: inline-block;
  font-size: .68rem; font-weight: 800;
  padding: 1px 6px; border-radius: 6px;
  background: rgba(255,47,94,.12); color: var(--red);
  margin-left: 4px;
  vertical-align: middle;
}
.cal-event-reminder { background: rgba(255,184,77,.2); color: #a35500; }
.cal-event-date {
  font-size: .72rem; color: var(--muted); font-weight: 700;
  margin-top: 3px; text-transform: capitalize;
}

/* Dark mode adjustments for calendar */
[data-theme="dark"] .cal-overlay { background: rgba(0,0,0,.7); }
[data-theme="dark"] .cal-form-overlay { background: rgba(0,0,0,.75); }
[data-theme="dark"] .cal-cell-num { color: var(--dark); }
[data-theme="dark"] .cal-cell.today .cal-cell-num { color: var(--red); }
[data-theme="dark"] .cal-cell.selected .cal-cell-num { color: #fff; }
[data-theme="dark"] .cal-task-text, [data-theme="dark"] .cal-event-title { color: var(--dark); }
[data-theme="dark"] .cal-day-label { color: var(--dark); }
[data-theme="dark"] .mini-cal-btn { background: var(--cream); }
[data-theme="dark"] .mini-cal-day { color: var(--dark); }
[data-theme="dark"] .cal-form-input { color: var(--dark); color-scheme: dark; }
[data-theme="dark"] .cal-form-time select { color: var(--dark); }
[data-theme="dark"] .cal-view-tabs { background: rgba(255,107,142,.1); }
[data-theme="dark"] .cal-view-tab { color: var(--dark); }
[data-theme="dark"] .cal-agenda-date { background: rgba(255,107,142,.1); }
[data-theme="dark"] .cal-agenda-num { color: var(--dark); }
[data-theme="dark"] .cal-cat-btn { background: rgba(255,107,142,.08); color: var(--dark); }
[data-theme="dark"] .cal-event-recur { background: rgba(255,107,142,.15); color: var(--dark); }
[data-theme="dark"] .cal-event-reminder { background: rgba(255,184,77,.2); color: var(--accent-gold); }

.footer { text-align:center; font-size:.78rem; color:var(--blush); margin-top:32px; font-weight:700; letter-spacing:.04em;
  font-family:'Fredoka', 'Nunito', sans-serif;
  padding:8px; }

/* ────────────────────────── CONFETTI ────────────────────────── */
.confetti-piece {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  animation: confettiFly 1.2s cubic-bezier(.25,.8,.4,1) forwards;
  will-change: transform, opacity;
  user-select: none;
}
@keyframes confettiFly {
  0%   { transform: translate(0,0) rotate(0deg) scale(.6); opacity: 1; }
  15%  { transform: translate(calc(var(--dx)*.3), calc(var(--dy)*.3)) rotate(calc(var(--rot)*.3)) scale(1.1); opacity: 1; }
  100% { transform: translate(var(--dx), calc(var(--dy) + 180px)) rotate(var(--rot)) scale(.7); opacity: 0; }
}

/* ────────────────────────── THEME SELECTOR ────────────────────────── */
.theme-selector {
  display: flex; gap: 4px; background: var(--cream); padding: 4px;
  border-radius: 12px; border: 1px solid var(--card-border);
}
.theme-opt {
  padding: 6px 10px; border-radius: 8px; background: transparent;
  color: var(--muted); font-size: .78rem; font-weight: 700;
  min-height: 30px; transition: all .15s;
}
.theme-opt.on {
  background: var(--red); color: #fff;
  box-shadow: 0 2px 6px rgba(255,47,94,.3);
}

/* Task card ready for swipe transforms */
.task-card {
  touch-action: pan-y;  /* allow vertical scroll but we handle horizontal manually */
}

/* ────────────────────────── HERO CARD (#1) ────────────────────────── */
.hero-card {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  margin: 14px 0 14px;
  border-radius: 20px;
  background: linear-gradient(135deg, #ffffff 0%, var(--cream) 100%);
  border: 1.5px solid var(--card-border);
  box-shadow: 0 4px 18px rgba(255,47,94,.1);
  animation: fadeUp .35s ease;
  overflow: hidden;
}
.hero-card::before {
  content: "";
  position: absolute;
  right: -40px; top: -50px;
  width: 140px; height: 140px; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,47,94,.14) 0%, rgba(255,47,94,0) 70%);
  pointer-events: none;
}
.hero-text { flex: 1; min-width: 0; position: relative; z-index: 1; }
.hero-greet {
  font-family: 'Fredoka', 'Nunito', sans-serif;
  font-size: 1.25rem; font-weight: 700;
  color: var(--deep); line-height: 1.15;
  text-shadow: 0 1px 0 rgba(163,21,64,.08);
}
.hero-date {
  font-size: .78rem; font-weight: 700;
  color: var(--blush);
  margin-top: 3px; text-transform: capitalize;
  letter-spacing: .01em;
}
.hero-stats {
  display: flex; gap: 6px; margin-top: 9px; flex-wrap: wrap;
}
.hero-stat {
  background: rgba(255,47,94,.1);
  color: var(--deep);
  padding: 3px 9px; border-radius: 10px;
  font-size: .72rem; font-weight: 800;
  display: inline-flex; align-items: center; gap: 4px;
  border: 1px solid rgba(255,47,94,.12);
}
.hero-stat.fire { background: rgba(255,184,77,.18); color: #a35500; border-color: rgba(255,184,77,.3); }
.hero-ring {
  position: relative;
  width: 66px; height: 66px; flex-shrink: 0;
  z-index: 1;
}
.hero-ring svg { transform: rotate(-90deg); display: block; }
.hero-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
.hero-ring .track { stroke: rgba(255,47,94,.14); }
.hero-ring .fill  { stroke: var(--red); transition: stroke-dashoffset .7s cubic-bezier(.3,.9,.4,1); }
.hero-ring-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
}
.hero-ring-pct {
  font-size: 1rem; color: var(--deep); line-height: 1;
}
.hero-ring-label {
  font-size: .52rem; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .08em;
  margin-top: 1px;
}

[data-theme="dark"] .hero-card {
  background: linear-gradient(135deg, var(--card) 0%, #3a1f2a 100%);
  border-color: var(--card-border);
}
[data-theme="dark"] .hero-greet { color: var(--dark); }
[data-theme="dark"] .hero-stat { background: rgba(255,107,142,.15); color: var(--dark); border-color: rgba(255,107,142,.22); }
[data-theme="dark"] .hero-ring-pct { color: var(--dark); }
[data-theme="dark"] .hero-ring .track { stroke: rgba(255,107,142,.2); }

/* ────────────────────────── MASCOT MOOD BADGE (#3) ────────────────────────── */
.mascot { position: relative; }
.avatar:not(.avatar-speak) { animation: breathe 4.5s ease-in-out infinite; }
@keyframes breathe {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.035); }
}
.mascot-mood {
  position: absolute;
  right: -4px; bottom: -4px;
  width: 28px; height: 28px; border-radius: 50%;
  background: #fff; border: 2.5px solid var(--red);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; line-height: 1;
  box-shadow: 0 2px 7px rgba(255,47,94,.35);
  animation: moodPop .45s cubic-bezier(.3,1.4,.5,1);
  z-index: 3;
  user-select: none;
}
@keyframes moodPop {
  0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
  60%  { transform: scale(1.2) rotate(8deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}
[data-theme="dark"] .mascot-mood { background: var(--card); border-color: var(--red); }

/* ────────────────────────── CHIPS REDESIGN (#4) ────────────────────────── */
.cat-btn.on {
  background: linear-gradient(135deg, var(--red) 0%, var(--blush) 100%);
  color: #fff;
  box-shadow: 0 4px 14px rgba(255,47,94,.4), inset 0 1px 0 rgba(255,255,255,.28);
  border-color: var(--red);
  transform: translateY(-1px);
}
.cat-btn.off {
  background: linear-gradient(135deg, rgba(255,47,94,.05) 0%, rgba(255,47,94,.13) 100%);
  color: var(--deep);
  border-color: rgba(255,47,94,.18);
}
.cat-btn.off:hover {
  background: linear-gradient(135deg, rgba(255,47,94,.13) 0%, rgba(255,47,94,.22) 100%);
  transform: translateY(-1px);
  border-color: rgba(255,47,94,.3);
}

.filter-btn {
  background: rgba(255,47,94,.05);
  border: 1.5px solid transparent;
  border-radius: 14px;
}
.filter-btn:hover { background: rgba(255,47,94,.14); color: var(--deep); }
.filter-btn.on {
  background: linear-gradient(135deg, var(--red) 0%, var(--blush) 100%);
  color: #fff;
  box-shadow: 0 3px 11px rgba(255,47,94,.38), inset 0 1px 0 rgba(255,255,255,.22);
  border-color: var(--red);
}

[data-theme="dark"] .filter-btn { background: rgba(255,107,142,.08); }
[data-theme="dark"] .filter-btn:hover { background: rgba(255,107,142,.18); color: var(--dark); }

/* ────────────────────────── CELEBRATE ON COMPLETION (#5) ────────────────────────── */
@keyframes taskCelebrate {
  0%   { box-shadow: 0 2px 10px rgba(255,47,94,.08); transform: translateX(0); }
  30%  { box-shadow: 0 0 0 5px rgba(255,184,77,.35), 0 5px 22px rgba(255,47,94,.4); transform: translateX(2px) scale(1.012); }
  60%  { box-shadow: 0 0 0 3px rgba(255,47,94,.25), 0 4px 18px rgba(255,47,94,.3); transform: translateX(-2px) scale(1.008); }
  100% { box-shadow: 0 2px 10px rgba(255,47,94,.08); transform: translateX(0); }
}
.task-card.celebrate { animation: taskCelebrate .85s cubic-bezier(.25,.8,.4,1); border-left-color: var(--accent-gold); }

@keyframes checkPop {
  0%   { transform: scale(1) rotate(0); }
  40%  { transform: scale(1.4) rotate(8deg); }
  70%  { transform: scale(.9) rotate(-4deg); }
  100% { transform: scale(1) rotate(0); }
}
.task-card.celebrate .check-btn.checked { animation: checkPop .5s cubic-bezier(.3,1.4,.6,1); }

/* Smooth line-through fade rather than instant cut */
.task-text {
  transition: color .3s ease;
  position: relative;
}
.task-text.done-text { text-decoration-thickness: 2px; text-decoration-color: var(--muted); }

/* Section label tweak (#2) — emoji a bit larger, softer dividing line */
.section-label {
  padding-top: 4px;
}
.section-label:not(:first-child) {
  margin-top: 18px;
  border-top: 1px dashed rgba(255,47,94,.15);
  padding-top: 12px;
}
.section-label.done-label { color: var(--muted); }
.section-label.done-label .count { background: var(--muted); }

/* ────────────────────────── MEMORY PANEL (#6) ────────────────────────── */
.memory-panel {
  background: rgba(255,47,94,.05);
  border: 1px solid rgba(255,47,94,.12);
  border-radius: 14px;
  padding: 12px;
  margin-top: 8px;
  animation: fadeUp .25s ease;
}
.memory-empty {
  font-size: .82rem; color: var(--muted);
  line-height: 1.6;
  text-align: center;
  padding: 10px 4px;
}
.memory-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--card);
  border-radius: 10px;
  padding: 8px 10px;
  margin-bottom: 6px;
  font-size: .85rem;
  color: var(--deep);
  border: 1px solid var(--card-border);
}
.memory-text { flex: 1; word-break: break-word; }
.memory-del {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(255,47,94,.1);
  color: var(--red); font-size: 1.2rem; line-height: 1;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}
.memory-del:hover { background: var(--red); color: #fff; transform: rotate(90deg); }

[data-theme="dark"] .memory-panel { background: rgba(255,107,142,.08); border-color: rgba(255,107,142,.18); }
[data-theme="dark"] .memory-item { background: var(--card-soft, var(--card)); }

/* ────────────────────────── PLAN MODAL (#1) ────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(45,15,30,.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn .2s ease;
}

.teto-modal-overlay { z-index: 3000; }
.teto-modal-overlay .modal-panel {

}
.teto-modal-overlay .modal-title {
  font-family: 'Fredoka', sans-serif;

}
.teto-modal-overlay .modal-body {
  font-size: .95rem; color: var(--dark); line-height: 1.5;

}
.teto-modal-overlay .modal-input:focus {
  border-color: var(--red); background: #fff;

}
.teto-modal-overlay textarea.modal-input { resize: vertical; min-height: 60px; }
.teto-modal-overlay select.modal-input {
  font-family: 'Fredoka', sans-serif;
}
.teto-modal-overlay .modal-checkbox-label {
  display: flex; align-items: center; gap: 8px;

}
.teto-modal-overlay .modal-checkbox {
  width: 18px; height: 18px; accent-color: var(--red);
}
.teto-modal-overlay .modal-emoji-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));

  background: rgba(255,47,94,.05);
  padding: 8px; border-radius: 12px;
  border: 1.5px solid var(--card-border);
}
.teto-modal-overlay .modal-emoji-cell {
  width: 100%; aspect-ratio: 1;
  border: none; border-radius: 8px;
  background: transparent;
  font-size: 1.4rem; line-height: 1;
  cursor: pointer; transition: all .12s;
  display: flex; align-items: center; justify-content: center;
}
.teto-modal-overlay .modal-emoji-cell:hover { background: var(--cream); transform: scale(1.1); }
.teto-modal-overlay .modal-emoji-cell.on {
  background: linear-gradient(135deg, var(--red), var(--blush));
  box-shadow: 0 2px 8px rgba(255,47,94,.4);
  transform: scale(1.05);
}
.teto-modal-overlay .modal-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  flex-wrap: wrap;
}
.teto-modal-overlay .modal-btn {
  padding: 10px 18px; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-weight: 800;
  font-size: .88rem; min-height: 42px;
  cursor: pointer; transition: transform .12s;
  border: 1.5px solid transparent;
}
.teto-modal-overlay .modal-btn:hover { transform: translateY(-1px); }
.teto-modal-overlay .modal-btn-cancel {
  background: #fff; color: var(--muted);
  border-color: var(--card-border);
}
.teto-modal-overlay .modal-btn-primary {
  background: linear-gradient(135deg, var(--red), var(--blush));
  color: #fff;
  box-shadow: 0 3px 10px rgba(255,47,94,.3);
}
.teto-modal-overlay .modal-btn-danger {
  background: linear-gradient(135deg, #d33, #b22);
  color: #fff;
  box-shadow: 0 3px 10px rgba(180,30,30,.3);
}

[data-theme="dark"] .teto-modal-overlay .modal-panel { background: var(--card); }
[data-theme="dark"] .teto-modal-overlay .modal-input,
[data-theme="dark"] .teto-modal-overlay select.modal-input { color: var(--dark); color-scheme: dark; }
[data-theme="dark"] .teto-modal-overlay .modal-body,
[data-theme="dark"] .teto-modal-overlay .modal-checkbox-label { color: var(--dark); }
[data-theme="dark"] .teto-modal-overlay .modal-emoji-grid { background: rgba(255,107,142,.08); }

/* ────────────────────────── PLAN MODAL CONT ────────────────────────── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.plan-modal {
  background: var(--card);
  border-radius: 22px;
  width: 100%; max-width: 460px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 12px 48px rgba(255,47,94,.32);
  animation: fadeUp .28s cubic-bezier(.3,1,.5,1);
  overflow: hidden;
}
.plan-modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 18px 12px;
  background: linear-gradient(135deg, var(--red) 0%, var(--blush) 100%);
  color: #fff;
}
.plan-modal-header h2 {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.15rem; font-weight: 700; margin: 0;
}
.plan-close {
  background: rgba(255,255,255,.2); color: #fff;
  width: 32px; height: 32px; border-radius: 50%;

  cursor: pointer; transition: background .15s;
}
.plan-close:hover { background: rgba(255,255,255,.35); }
.plan-modal-body {
  padding: 14px 18px;
  overflow-y: auto;
  flex: 1;
}
.plan-section-label {
  font-size: .7rem; font-weight: 800;
  color: var(--blush); text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 6px;
}
.plan-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px;
  margin-bottom: 6px;
  background: rgba(255,47,94,.05);
  border-radius: 12px;
  font-size: .9rem;
}
.plan-item.event { background: rgba(255,184,77,.12); }

}

.plan-tag {
  font-size: .65rem; font-weight: 800; padding: 2px 7px;
  border-radius: 8px; text-transform: uppercase;
  letter-spacing: .05em;
}
.plan-tag.new { background: var(--red); color: #fff; }
.plan-tag.kept { background: rgba(0,0,0,.08); color: var(--muted); }
.plan-modal-actions {
  display: flex; gap: 8px; padding: 12px 18px 16px;
  border-top: 1px solid var(--card-border);
}
.plan-modal-actions button { flex: 1; }

[data-theme="dark"] .plan-item { background: rgba(255,107,142,.1); }

/* ────────────────────────── FOCUS MODE (#7) ────────────────────────── */
.focus-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: linear-gradient(180deg, #1a0810 0%, #2d0f1e 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;

  animation: fadeIn .35s ease;
  padding: 24px;
  text-align: center;
}

  position: absolute; top: 18px; right: 18px;
  width: 40px; height: 40px;
  background: rgba(255,255,255,.08);
  color: rgba(255,255,255,.55);
  border: none; border-radius: 50%;
  font-size: 1.5rem; line-height: 1;
  cursor: pointer;
  transition: all .2s;
}
.focus-exit:hover { background: rgba(255,255,255,.18); color: #fff; transform: rotate(90deg); }
.focus-clock {
  font-family: 'Fredoka', sans-serif;
  font-size: 5.5rem; font-weight: 600;
  letter-spacing: .02em;
  background: linear-gradient(180deg, #fff 0%, var(--blush) 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 6px;
}
.focus-date {
  font-size: .95rem; color: rgba(255,255,255,.55);
  text-transform: capitalize; margin-bottom: 38px;
  letter-spacing: .01em;
}
.focus-next, .focus-empty {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  padding: 14px 18px;
  margin-bottom: 36px;
  width: 100%; max-width: 320px;
}
.focus-empty { color: rgba(255,255,255,.5); font-size: .9rem; }
.focus-next.overdue { border-color: rgba(255,71,71,.4); background: rgba(255,71,71,.1); }
.focus-next-label {
  font-size: .65rem; font-weight: 800; color: var(--blush);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 6px;
}
.focus-next-text {
  font-size: 1.05rem; font-weight: 700; color: #fff;
  margin-bottom: 4px;
  word-break: break-word;
}
.focus-next-time {
  font-size: .8rem; color: rgba(255,255,255,.6);
}
.focus-mic {
  width: 110px; height: 110px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--red) 0%, var(--blush) 100%);
  border: none;
  cursor: pointer;
  position: relative;
  box-shadow: 0 12px 36px rgba(255,47,94,.45);
  transition: transform .15s;
  display: flex; align-items: center; justify-content: center;
}
.focus-mic:hover { transform: scale(1.05); }
.focus-mic:active { transform: scale(.95); }
.focus-mic svg { width: 50px; height: 50px; color: #fff; }
.focus-mic.listening { animation: focusMicPulse 1.2s ease-in-out infinite; }
@keyframes focusMicPulse {
  0%,100% { box-shadow: 0 12px 36px rgba(255,47,94,.45); }
  50%     { box-shadow: 0 12px 50px rgba(255,47,94,.85), 0 0 0 14px rgba(255,47,94,.18); }
}
.focus-mic-pulse {
  position: absolute; inset: -4px;
  border-radius: 50%;
  border: 3px solid var(--red);
  animation: focusRipple 1.5s linear infinite;
}
@keyframes focusRipple {
  0%   { transform: scale(1); opacity: .8; }
  100% { transform: scale(1.4); opacity: 0; }
}
.focus-bubble {
  margin-top: 28px;
  font-size: .95rem; color: rgba(255,255,255,.75);
  line-height: 1.5; min-height: 1.5em;
  max-width: 320px;
  white-space: pre-line;
}

/* Dark mode-specific adjustments */

  color: var(--dark);
}

}

}

}

}

[data-theme="dark"] .header h1 span { color: var(--dark); }
[data-theme="dark"] .title-span, [data-theme="dark"] .header h1 span { color: var(--dark); }

.offline-banner {

  font-size:.75rem; font-weight:700; color:var(--deep); border-radius:10px; margin-bottom:12px;
}
body.offline .offline-banner { display:block; }

/* ═══════════════════════════════════════════════════════════════
   👤 ACCOUNT — anonymous by default, can upgrade to Google
   for cross-device sync of lists / tasks / events.
   ═══════════════════════════════════════════════════════════════ */
const Account = {
  isAnonymous: true,
  displayName: null,
  email: null,

  update(user) {
    if (!user) return;
    this.isAnonymous = !!user.isAnonymous;
    this.displayName = user.displayName || null;
    this.email = user.email || null;
  },

  // True when the app is running as installed PWA (standalone display mode)
  // or in any context where popup-based auth is unreliable.
  _shouldUseRedirect() {
    try {
      // Installed PWA on iOS
      if (window.navigator.standalone === true) return true;
      // Installed PWA on Android/desktop
      if (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) return true;
      // Mobile browsers in general handle redirect more reliably
      const ua = navigator.userAgent || "";
      if (/iPhone|iPad|iPod|Android/i.test(ua)) return true;
      return false;
    } catch(e) { return false; }
  },

  async linkGoogle() {
    // Link the current anonymous account with Google so data migrates.
    // If the Google account already exists (user logged in previously on
    // another device) we must sign into THAT account instead of linking.
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: "select_account" });
    const useRedirect = this._shouldUseRedirect();

    try {
      const currentUser = auth.currentUser;

      if (useRedirect) {
        // Redirect-based flow: store intent so we know how to handle the result on return
        try { sessionStorage.setItem("teto_auth_pending", currentUser?.isAnonymous ? "link" : "signin"); } catch(e) {}
        showBubble("Reindirizzo a Google~ ☁️");
        if (currentUser && currentUser.isAnonymous) {
          await currentUser.linkWithRedirect(provider);
        } else {
          await auth.signInWithRedirect(provider);
        }
        // Page will navigate away; nothing else to do here.
        return true;
      }

      // Popup flow (desktop browser only)
      if (currentUser && currentUser.isAnonymous) {
        try {
          const result = await currentUser.linkWithPopup(provider);
          this.update(result.user);
          showBubble("Account collegato! Le tue liste ora ti seguono ovunque~ 🌍");
          return true;
        } catch (err) {
          if (err.code === "auth/credential-already-in-use" || err.code === "auth/email-already-in-use") {
            const credential = err.credential;
            const result = await auth.signInWithCredential(credential);
            this.update(result.user);
            state.uid = result.user.uid;
            listenToTasks();
            Lists.resubscribe();
            Calendar.resubscribe();
            showBubble("Accesso riuscito! Carico i tuoi dati dal cloud~ ☁️");
            return true;
          }
          throw err;
        }
      } else {
        const result = await auth.signInWithPopup(provider);
        this.update(result.user);
        state.uid = result.user.uid;
        listenToTasks();
        Lists.resubscribe();
        Calendar.resubscribe();
        showBubble("Accesso riuscito~ ☁️");
        return true;
      }
    } catch (err) {
      console.error("Google sign-in failed:", err);
      this._reportAuthError(err);
      return false;
    }
  },

  _reportAuthError(err) {
    const code = err?.code || "unknown";
    const map = {
      "auth/popup-blocked":          "Il browser ha bloccato il popup — consenti i popup e riprova, oppure installa l'app come PWA",
      "auth/popup-closed-by-user":   null,  // silent — user cancelled
      "auth/cancelled-popup-request": null,
      "auth/unauthorized-domain":    "Dominio non autorizzato. In Firebase Console → Authentication → Settings → Authorized domains, aggiungi: " + location.hostname,
      "auth/operation-not-allowed":  "Google sign-in non attivo. In Firebase Console → Authentication → Sign-in method, abilita Google",
      "auth/network-request-failed": "Problema di rete — controlla la connessione",
      "auth/internal-error":         "Errore interno Firebase. Riprova fra un momento",
      "auth/configuration-not-found": "Configurazione Firebase mancante. Verifica FIREBASE_CONFIG",
    };
    const msg = map[code];
    if (msg === null) return;   // silent (user cancelled)
    showBubble(msg || `Accesso non riuscito (${code}) 😢`);
  },

  // Called once at boot to finish a redirect-based flow.
  async handleRedirectResult() {
    try {
      const result = await auth.getRedirectResult();
      if (result && result.user) {
        // Successfully signed in / linked
        this.update(result.user);
        state.uid = result.user.uid;
        try { sessionStorage.removeItem("teto_auth_pending"); } catch(e) {}
        // Listeners will be re-attached by onAuthStateChanged after this runs
        showBubble("Accesso riuscito~ ☁️");
        return true;
      }
    } catch (err) {
      console.error("Redirect result failed:", err);
      // credential-already-in-use → Google account exists already, sign into it
      if ((err.code === "auth/credential-already-in-use" || err.code === "auth/email-already-in-use") && err.credential) {
        try {
          const result = await auth.signInWithCredential(err.credential);
          this.update(result.user);
          state.uid = result.user.uid;
          showBubble("Accesso riuscito! Carico i tuoi dati dal cloud~ ☁️");
          return true;
        } catch(e2) {
          this._reportAuthError(e2);
          return false;
        }
      }
      this._reportAuthError(err);
    }
    return false;
  },

  async signOut() {
    if (!await Modal.confirm("Disconnettersi? I dati resteranno nel cloud ma non saranno più visibili qui.", { title: "Disconnetti", danger: true, okLabel: "Disconnetti" })) return;
    try {
      await auth.signOut();
      // Auto-login as anonymous so app keeps working
      const cred = await auth.signInAnonymously();
      this.update(cred.user);
      state.uid = cred.user.uid;
      listenToTasks();
      Lists.resubscribe();
      Calendar.resubscribe();
      showBubble("Disconnesso~ torni come ospite");
      render();
    } catch (err) {
      console.error(err);
      showBubble("Errore nella disconnessione");
    }
  },
};
