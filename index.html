<style>
/* ────────────────────────── RESET & VARS ────────────────────────── */
:root {
  --red: #ff4271;
  --pink: #ff85ad;
  --deep: #c25878;
  --blush: #d46a83;
  --dark: #2a2433;
  --muted: #a295a7;
  --soft: #d4becb;
  --cream: #fef6f8;
  --bg: linear-gradient(170deg, #fef6f8 0%, #f8eef2 40%, #f4e8ee 100%);
  --card: #fff;
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow-x:hidden; }
body {
  font-family: 'Nunito', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--dark);
  -webkit-font-smoothing: antialiased;
}
button { cursor:pointer; border:none; background:none; font-family:inherit; }
button:active { transform:scale(0.96); }
input, textarea { font-family:inherit; }
input:focus, textarea:focus { outline:none; border-color:var(--red) !important; }

/* ────────────────────────── ANIMATIONS ────────────────────────── */
@keyframes pulse { 0%{opacity:.6;transform:scale(1)} 100%{opacity:0;transform:scale(1.6)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes bubbleIn { 0%{opacity:0;transform:translateY(8px) scale(.92)} 100%{opacity:1;transform:translateY(0) scale(1)} }
@keyframes fadeUp { 0%{opacity:0;transform:translateY(12px)} 100%{opacity:1;transform:translateY(0)} }
@keyframes glow { 0%{box-shadow:0 0 0 0 rgba(255,66,113,.35)} 70%{box-shadow:0 0 0 8px rgba(255,66,113,0)} 100%{box-shadow:0 0 0 0 rgba(255,66,113,0)} }
@keyframes spin { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
@keyframes cardIn { 0%{opacity:0;transform:translateX(-12px)} 100%{opacity:1;transform:translateX(0)} }

/* ────────────────────────── LAYOUT ────────────────────────── */
#app {
  max-width: 480px;
  margin: 0 auto;
  padding: calc(20px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
  min-height: 100vh;
}

/* ────────────────────────── LOADING ────────────────────────── */
#loader {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:80vh; gap:16px;
}
#loader .spinner {
  width:36px; height:36px; border:3px solid #f0e0e6;
  border-top-color:var(--red); border-radius:50%; animation:spin .7s linear infinite;
}
#loader p { color:var(--muted); font-weight:700; font-size:.88rem; }

/* ────────────────────────── HEADER ────────────────────────── */
.header { display:flex; align-items:center; gap:12px; margin-bottom:4px; }
.header h1 { font-size:1.7rem; font-weight:800; color:var(--red); letter-spacing:-.02em; line-height:1.1; }
.header h1 span { color:var(--dark); font-weight:600; }
.header .sub { font-size:.8rem; color:var(--muted); font-weight:600; margin-top:2px; }
.mascot { animation:float 3s ease-in-out infinite; flex-shrink:0; }
.avatar { position:relative; width:76px; height:76px; border-radius:50%; overflow:hidden;
  border:3px solid var(--red); box-shadow:0 3px 14px rgba(255,66,113,.25); background:#fff; }
.avatar img { width:100%; height:100%; object-fit:cover; display:block; user-select:none; }
.avatar-speak { animation:glow 1.2s ease infinite; }
.avatar-ring { position:absolute; inset:-6px; border-radius:50%;
  border:2px solid var(--red); animation:pulse 1.2s ease-out infinite; pointer-events:none; }
.speaker-toggle { padding:4px 10px; border-radius:10px; font-size:.72rem; font-weight:700;
  color:var(--muted); background:rgba(255,66,113,.06); transition:all .15s; margin-left:4px; }
.speaker-toggle.on { background:var(--red); color:#fff; }
.speak-btn { padding:6px; color:var(--soft); transition:color .15s; }
.speak-btn:hover { color:var(--red); }
.speak-btn.playing { color:var(--red); animation:glow 1.2s ease infinite; border-radius:6px; }

/* Reminder chip & task states */
.reminder-chip {
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px; border-radius:10px; font-size:.7rem;
  font-weight:700; margin-left:6px; white-space:nowrap;
}
.reminder-chip.future { background:#e8f5f1; color:#2d8a76; }
.reminder-chip.today { background:#fff0d6; color:#b8731a; }
.reminder-chip.overdue { background:#ffdce3; color:#c22a4a; animation:glow 1.5s ease infinite; }
.task-card.overdue { border-left-color:#c22a4a; }
.task-card.today { border-left-color:#e8a73d; }

/* Reminder picker */
.reminder-btn {
  padding:6px 12px; border-radius:16px; font-size:.72rem; font-weight:700;
  color:var(--muted); background:rgba(162,149,167,.12); transition:all .2s;
  display:inline-flex; align-items:center; gap:4px; white-space:nowrap;
}
.reminder-btn.set { background:var(--red); color:#fff; }
.reminder-picker {
  display:flex; gap:6px; align-items:center;
  padding:8px; background:var(--cream); border-radius:12px; margin-top:8px;
  border:1.5px solid #f0e0e6;
}
.reminder-picker input {
  flex:1; border:none; background:transparent; font-size:.82rem;
  font-weight:600; color:var(--dark); font-family:inherit;
}
.reminder-clear {
  padding:4px 10px; border-radius:8px; background:#fff; font-size:.7rem;
  font-weight:700; color:var(--muted); border:1px solid #f0e0e6;
}

/* Today section header */
.section-label {
  font-size:.72rem; font-weight:800; color:var(--blush);
  text-transform:uppercase; letter-spacing:.08em;
  margin:14px 0 6px 4px; display:flex; align-items:center; gap:6px;
}
.section-label .count {
  background:var(--red); color:#fff; padding:1px 7px; border-radius:8px;
  font-size:.68rem; font-weight:800;
}

/* Settings panel */
.settings-btn {
  padding:6px; color:var(--muted); transition:color .15s; margin-left:6px;
}
.settings-btn:hover { color:var(--red); }
.settings-panel {
  background:var(--card); border-radius:16px; padding:14px;
  margin-bottom:14px; box-shadow:0 3px 18px rgba(212,106,131,.1);
  border:1.5px solid rgba(255,66,113,.08);
  animation:fadeUp .25s ease;
}
.settings-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid #f8eef2;
}
.settings-row:last-child { border-bottom:none; }
.settings-label { font-size:.86rem; font-weight:700; color:var(--dark); }
.settings-hint { font-size:.72rem; color:var(--muted); font-weight:600; margin-top:2px; }
.toggle {
  position:relative; width:44px; height:24px; border-radius:14px;
  background:#e5d8de; transition:background .2s; flex-shrink:0;
}
.toggle.on { background:var(--red); }
.toggle::after {
  content:''; position:absolute; left:2px; top:2px; width:20px; height:20px;
  border-radius:50%; background:#fff; transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.toggle.on::after { transform:translateX(20px); }

/* ────────────────────────── BUBBLE ────────────────────────── */
.bubble {
  position:relative; background:var(--card); border-radius:16px 16px 16px 4px;
  padding:10px 16px; font-size:.85rem; font-weight:600; color:var(--dark);
  box-shadow:0 2px 14px rgba(212,106,131,.12); margin:0 0 16px 18px;
  max-width:85%; animation:bubbleIn .35s ease forwards; line-height:1.4;
}
.bubble::before {
  content:''; position:absolute; left:-7px; bottom:8px; width:0; height:0;
  border-right:8px solid var(--card); border-top:6px solid transparent; border-bottom:6px solid transparent;
}

/* ────────────────────────── INPUT CARD ────────────────────────── */
.input-card {
  background:var(--card); border-radius:20px; padding:14px;
  box-shadow:0 3px 20px rgba(212,106,131,.1); margin-bottom:16px;
  border:1.5px solid rgba(255,66,113,.08);
}
.input-row { display:flex; gap:8px; align-items:center; }
.mic-btn {
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--pink)); color:#fff;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  position:relative; box-shadow:0 4px 14px rgba(255,66,113,.3); transition:all .2s;
}
.mic-btn.active { background:linear-gradient(135deg,var(--deep),var(--red)); animation:glow 1.2s ease infinite; }
.mic-btn .pulse-ring {
  position:absolute; inset:-6px; border-radius:50%;
  border:2px solid var(--red); animation:pulse 1.2s ease-out infinite;
}
.text-input {
  flex:1; border:1.5px solid #f0e0e6; border-radius:14px;
  padding:13px 14px; font-size:.92rem; font-weight:600;
  color:var(--dark); background:var(--cream); transition:border-color .2s;
}
.send-btn {
  width:46px; height:46px; border-radius:14px;
  background:var(--dark); color:#fff;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .15s;
}
.send-btn:disabled { opacity:.4; }
.cat-row { display:flex; gap:6px; margin-top:10px; }
.cat-btn {
  padding:6px 14px; border-radius:20px; font-size:.76rem;
  font-weight:700; transition:all .2s; white-space:nowrap;
}
.cat-btn.on { background:var(--red); color:#fff; }
.cat-btn.off { background:rgba(255,66,113,.08); color:var(--blush); }

/* ────────────────────────── FILTERS ────────────────────────── */
.filter-row { display:flex; gap:4px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
.filter-btn {
  padding:6px 12px; border-radius:10px; font-size:.78rem;
  font-weight:700; color:var(--muted); transition:all .15s;
}
.filter-btn:hover { background:rgba(255,66,113,.06); }
.filter-btn.on { background:rgba(255,66,113,.1); color:var(--red); }

/* ────────────────────────── TASK CARDS ────────────────────────── */
.task-list { display:flex; flex-direction:column; gap:8px; }
.task-card {
  background:var(--card); border-radius:var(--radius); padding:12px;
  box-shadow:0 1px 8px rgba(212,106,131,.07); transition:all .2s;
  border-left:3.5px solid var(--red); animation:cardIn .3s ease;
}
.task-card:hover { box-shadow:0 4px 18px rgba(212,106,131,.14); }
.task-card.done { opacity:.5; }
.task-main { display:flex; align-items:center; gap:8px; }
.check-btn {
  width:24px; height:24px; border-radius:8px; border:2px solid var(--soft);
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all .2s; padding:0;
}
.check-btn.checked { background:var(--red); border-color:var(--red); }
.task-text {
  flex:1; font-size:.88rem; font-weight:600; line-height:1.35;
  overflow:hidden; text-overflow:ellipsis; min-width:0; cursor:pointer;
}
.task-text.done-text { text-decoration:line-through; color:var(--soft); }
.icon-btn { padding:6px; color:var(--soft); transition:color .15s; }
.icon-btn.del:hover { color:var(--red); }

/* ────────────────────────── EXPANDED ────────────────────────── */
.expand-area {
  margin:10px 0 0 32px; padding-top:10px; border-top:1px solid #f8eef2;
}
.meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.meta-cat { font-size:.72rem; font-weight:700; color:var(--blush); text-transform:uppercase; letter-spacing:.04em; }
.meta-date { font-size:.7rem; color:var(--soft); font-weight:600; }
.note-box {
  padding:8px 10px; border-radius:10px; background:var(--cream);
  cursor:pointer; min-height:32px; transition:background .2s;
}
.note-box p { margin:0; font-size:.84rem; font-weight:600; line-height:1.45; }
.note-box .text { color:#6b5060; white-space:pre-wrap; }
.note-box .placeholder { color:var(--soft); }
.note-area {
  width:100%; border:1.5px solid #f0e0e6; border-radius:12px;
  padding:10px 12px; font-size:.84rem; font-weight:600;
  color:var(--dark); resize:vertical; background:var(--cream);
}
.note-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:8px; }
.note-cancel {
  padding:6px 14px; border-radius:10px; border:1.5px solid #f0e0e6;
  background:#fff; font-size:.76rem; font-weight:700; color:var(--muted);
}
.note-save {
  padding:6px 16px; border-radius:10px; background:var(--red);
  color:#fff; font-size:.76rem; font-weight:700;
}

/* ────────────────────────── EMPTY ────────────────────────── */
.empty-state { text-align:center; padding:40px 20px; }
.empty-state .bread { font-size:2.2rem; }
.empty-state p { color:var(--soft); font-size:.88rem; font-weight:600; margin-top:8px; }

/* ────────────────────────── FOOTER ────────────────────────── */
.footer { text-align:center; font-size:.7rem; color:var(--soft); margin-top:28px; font-weight:700; letter-spacing:.03em; }

/* ────────────────────────── OFFLINE BANNER ────────────────────────── */
.offline-banner {
  display:none; text-align:center; padding:6px; background:#ffe0e6;
  font-size:.75rem; font-weight:700; color:var(--deep); border-radius:10px; margin-bottom:12px;
}
body.offline .offline-banner { display:block; }
</style>
</head>
<body>

<div id="app">
  <div id="loader"><div class="spinner"></div><p>Teto si sta preparando~ 🍞</p></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   🍞 CONFIGURAZIONE FIREBASE — INSERISCI I TUOI DATI QUI
   ══════════════════════════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyARM5ohBfjrmLQG_pdDDOcH06pjOwOStuU",
  authDomain: "tetotask-2d509.firebaseapp.com",
  projectId: "tetotask-2d509",
  storageBucket: "tetotask-2d509.firebasestorage.app",
  messagingSenderId: "653132789863",
  appId: "1:653132789863:web:0e9c96688bf15fd3e43cc2"
};
/* ══════════════════════════════════════════════════════════════ */

/* ─── Firebase Init ─── */
firebase.initializeApp(FIREBASE_CONFIG);
const db   = firebase.firestore();
const auth = firebase.auth();

/* ─── Data ─── */
const CATS = [
  { id:"personale", label:"Personale", emoji:"🎵" },
  { id:"lavoro",    label:"Lavoro",    emoji:"💼" },
  { id:"urgente",   label:"Urgente",   emoji:"⚡" },
];

const TETO = {
  greet:    ["Ciao~! Sono Teto, pronta ad aiutarti! 🍞","Eccomi! Dimmi cosa devi fare oggi~","Teto è qui per te! Parla pure! ♪"],
  added:    ["Aggiunto! Ce la faremo~ ♪","Annotato! Teto non dimentica! 🍞","Ok ok, lo segno subito~!","Ricevuto! Vai così! ✨"],
  done:     ["Yatta~! Un'altra cosa fatta! ♪","Completato! Sei fortissimo/a! 🌟","Fatto! Teto è fiera di te~ 🍞"],
  empty:    ["Lista vuota! Tempo libero~? 🍞","Niente da fare... rilassati! ♪","Tutto completato! Meriti un pane~ 🥖"],
  listen:   "Ti ascolto...~",
  deleted:  "Via! Sparito! ♪",
  offline:  "Sono offline ma funziono ancora~ 🍞",
  error:    "Ops, qualcosa è andato storto...",
  voiceErr: "Non ho capito... riprova~ 🎤",
  noVoice:  "Il tuo browser non supporta la voce 😢",
  proactive: [
    "Hai bevuto abbastanza acqua oggi? 💧",
    "Ti sei preso/a una pausa? ☕",
    "Come va la giornata~?",
    "Hai mangiato qualcosa? 🍞",
    "Tutto bene lì? ♪",
    "Ti ricordi di respirare~ ✨",
    "Hai guardato fuori dalla finestra? ☀️",
    "Come ti senti adesso?",
    "Meriti un momento per te~ ♪",
    "Ti stai occupando di te? 🌸",
  ],
  dueSoon:  (text) => `Ehi~ tra poco: "${text}" 🔔`,
  overdue:  (text) => `Attenzione~! "${text}" è in ritardo! ⏰`,
  remSet:   "Promemoria impostato~ ♪",
};

const pick = a => a[Math.floor(Math.random()*a.length)];

/* ─── Text-to-Speech (voce italiana di sistema) ─── */
const TTS = {
  enabled: localStorage.getItem("teto-tts") === "1",
  voice: null,
  init() {
    if (!window.speechSynthesis) return;
    const pickVoice = () => {
      const voices = speechSynthesis.getVoices();
      // Prefer Italian female voices
      const prefs = ["Alice", "Federica", "Paolina", "Luca"];
      for (const p of prefs) {
        const v = voices.find(x => x.name.includes(p));
        if (v) { this.voice = v; return; }
      }
      this.voice = voices.find(v => v.lang.startsWith("it")) || voices[0];
    };
    pickVoice();
    speechSynthesis.onvoiceschanged = pickVoice;
  },
  speak(text) {
    if (!this.enabled || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "it-IT";
    u.rate = 1.15;   // leggermente più veloce = più vivace
    u.pitch = 1.4;   // più acuto = Teto-like
    u.volume = 0.9;
    if (this.voice) u.voice = this.voice;
    speechSynthesis.speak(u);
  },
  stop() { speechSynthesis?.cancel(); },
  toggle() {
    this.enabled = !this.enabled;
    localStorage.setItem("teto-tts", this.enabled ? "1" : "0");
    if (!this.enabled) this.stop();
    else this.speak("Voce attivata~ 🍞");
  },
};
TTS.init();
const genId = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

/* ─── State ─── */
let state = {
  uid: null,
  tasks: [],
  input: "",
  cat: "personale",
  filter: "all",
  listening: false,
  expanded: null,
  editNote: null,
  noteVal: "",
  showDone: false,
  bubble: pick(TETO.greet),
  ready: false,
  reminderAt: null,              // current input reminder (ms)
  showReminderPicker: false,
  showSettings: false,
  proactiveEnabled: localStorage.getItem("teto-proactive") === "1",
  notifiedTasks: new Set(),       // task IDs already notified this session
};

let recognition = null;
let bubbleTimeout = null;
let unsubFirestore = null;

/* ─── Helpers ─── */
function tasksRef() {
  return db.collection("users").doc(state.uid).collection("tasks");
}

/* ─── Reminder helpers ─── */
function startOfDay(ts) { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }
function getReminderStatus(ts) {
  if (!ts) return null;
  const now = Date.now();
  const today = startOfDay(now);
  const tomorrow = today + 86400000;
  if (ts < now) return "overdue";
  if (ts < tomorrow) return "today";
  return "future";
}
function formatReminder(ts) {
  if (!ts) return "";
  const now = Date.now();
  const diff = ts - now;
  const absMin = Math.abs(Math.round(diff / 60000));
  if (diff < 0) {
    if (absMin < 60) return `scaduto ${absMin}m fa`;
    if (absMin < 1440) return `scaduto ${Math.round(absMin/60)}h fa`;
    return `scaduto ${Math.round(absMin/1440)}g fa`;
  }
  if (absMin < 60) return `tra ${absMin}m`;
  if (absMin < 1440) {
    const d = new Date(ts);
    return `alle ${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
  }
  const d = new Date(ts);
  return d.toLocaleDateString("it-IT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
}
function toDatetimeLocal(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const pad = n => n.toString().padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ─── Notifications ─── */
async function requestNotifPermission() {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "granted") return true;
  if (Notification.permission === "denied") return false;
  const p = await Notification.requestPermission();
  return p === "granted";
}
function notify(title, body) {
  if ("Notification" in window && Notification.permission === "granted") {
    try { new Notification(title, { body, icon: TETO_IMG, badge: TETO_IMG, tag: "tetotask" }); }
    catch(e) { /* some browsers block in non-secure contexts */ }
  }
}

/* ─── Due reminders checker ─── */
function checkDueReminders() {
  const now = Date.now();
  for (const t of state.tasks) {
    if (t.done || !t.reminderAt) continue;
    if (state.notifiedTasks.has(t.id)) continue;
    if (t.reminderAt <= now) {
      state.notifiedTasks.add(t.id);
      showBubble(TETO.overdue(t.text));
      notify("TetoTask 🍞", `${t.text} — è il momento!`);
    } else if (t.reminderAt - now <= 5*60*1000) {
      // within 5 minutes
      state.notifiedTasks.add(t.id);
      showBubble(TETO.dueSoon(t.text));
      notify("TetoTask 🍞", `${t.text} — tra poco!`);
    }
  }
}
setInterval(() => { if (state.ready) { checkDueReminders(); render(); } }, 60000);

/* ─── Proactive Teto questions ─── */
let proactiveTimer = null;
function scheduleProactive() {
  clearTimeout(proactiveTimer);
  if (!state.proactiveEnabled) return;
  // Random between 12 and 25 minutes
  const delay = (12 + Math.random() * 13) * 60 * 1000;
  proactiveTimer = setTimeout(() => {
    if (state.proactiveEnabled && !state.listening) {
      showBubble(pick(TETO.proactive));
    }
    scheduleProactive();
  }, delay);
}
function toggleProactive() {
  state.proactiveEnabled = !state.proactiveEnabled;
  localStorage.setItem("teto-proactive", state.proactiveEnabled ? "1" : "0");
  if (state.proactiveEnabled) { scheduleProactive(); showBubble("Ti farò compagnia~ ♪"); }
  else { clearTimeout(proactiveTimer); showBubble("Ok, non ti disturbo più!"); }
}

function showBubble(text) {
  state.bubble = text;
  render();
  TTS.speak(text.replace(/[🍞♪✨🌟⚡🎵💼🥖🎤😢⚠️]/gu, "").trim());
  clearTimeout(bubbleTimeout);
  bubbleTimeout = setTimeout(() => {}, 5000);
}

/* ─── Firebase Operations ─── */
async function addTaskToDb(task) {
  try {
    await tasksRef().doc(task.id).set(task);
  } catch(e) { console.error("Add failed:", e); showBubble(TETO.error); }
}

async function updateTaskInDb(id, data) {
  try {
    await tasksRef().doc(id).update(data);
  } catch(e) { console.error("Update failed:", e); }
}

async function deleteTaskFromDb(id) {
  try {
    await tasksRef().doc(id).delete();
  } catch(e) { console.error("Delete failed:", e); }
}

function listenToTasks() {
  if (unsubFirestore) unsubFirestore();
  unsubFirestore = tasksRef().orderBy("ts","desc").onSnapshot(snap => {
    state.tasks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    render();
  }, err => {
    console.error("Firestore listen error:", err);
  });
}

/* ─── Voice ─── */
function toggleMic() {
  if (state.listening) {
    recognition?.stop();
    state.listening = false;
    render();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showBubble(TETO.noVoice); return; }

  recognition = new SR();
  recognition.lang = "it-IT";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => {
    state.input = (state.input ? state.input+" " : "") + e.results[0][0].transcript;
    state.listening = false;
    render();
    setTimeout(() => document.getElementById("taskInput")?.focus(), 100);
  };
  recognition.onerror = () => { state.listening=false; render(); showBubble(TETO.voiceErr); };
  recognition.onend   = () => { state.listening=false; render(); };
  recognition.start();
  state.listening = true;
  showBubble(TETO.listen);
  render();
}

/* ─── Actions ─── */
function addTask() {
  const text = state.input.trim();
  if (!text) return;
  const task = {
    id:genId(), text, category:state.cat, note:"", done:false, ts:Date.now(),
    reminderAt: state.reminderAt || null,
  };
  const hadReminder = !!state.reminderAt;
  state.input = "";
  state.reminderAt = null;
  state.showReminderPicker = false;
  addTaskToDb(task);
  showBubble(hadReminder ? TETO.remSet : pick(TETO.added));
  if (hadReminder) requestNotifPermission();
}

function toggleDone(id) {
  const t = state.tasks.find(x=>x.id===id);
  if (!t) return;
  updateTaskInDb(id, { done:!t.done });
  if (!t.done) showBubble(pick(TETO.done));
}

function deleteTask(id) {
  deleteTaskFromDb(id);
  if (state.expanded===id) state.expanded=null;
  showBubble(TETO.deleted);
}

function saveNote(id) {
  updateTaskInDb(id, { note:state.noteVal });
  state.editNote = null;
  render();
}

function speakTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  if (!window.speechSynthesis) { showBubble("Il tuo browser non supporta la voce 😢"); return; }
  // Force TTS on temporarily if user pressed speak-button
  const wasEnabled = TTS.enabled;
  TTS.enabled = true;
  const text = t.text + (t.note ? ". " + t.note : "");
  TTS.speak(text);
  TTS.enabled = wasEnabled;
}

/* ─── Render ─── */
function render() {
  const s = state;
  const filtered = s.tasks.filter(t => {
    if (s.filter!=="all" && t.category!==s.filter) return false;
    if (!s.showDone && t.done) return false;
    return true;
  });
  // Split into due/today and rest
  const dueNow = filtered.filter(t => !t.done && t.reminderAt && getReminderStatus(t.reminderAt) !== "future");
  const rest = filtered.filter(t => !dueNow.includes(t));
  // Sort due by reminderAt asc, rest by ts desc (already from firestore)
  dueNow.sort((a,b) => a.reminderAt - b.reminderAt);
  const active = s.tasks.filter(t=>!t.done).length;
  const done   = s.tasks.filter(t=>t.done).length;

  const catOf = id => CATS.find(c=>c.id===id)||CATS[0];

  const renderCard = t => {
      const c = catOf(t.category);
      const isExp = s.expanded===t.id;
      const isEdit = s.editNote===t.id;

      let expandHTML = "";
      if (isExp) {
        const dateStr = new Date(t.ts).toLocaleDateString("it-IT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
        let noteHTML;
        if (isEdit) {
          noteHTML = `<div>
            <textarea class="note-area" rows="3" placeholder="Aggiungi dettagli..." id="noteArea">${esc(s.noteVal)}</textarea>
            <div class="note-actions">
              <button class="note-cancel" onclick="state.editNote=null;render()">Annulla</button>
              <button class="note-save" onclick="saveNote('${t.id}')">Salva ♪</button>
            </div>
          </div>`;
        } else {
          noteHTML = `<div class="note-box" onclick="state.editNote='${t.id}';state.noteVal='${esc(t.note||"")}';render();setTimeout(()=>document.getElementById('noteArea')?.focus(),50)">
            <p class="${t.note?"text":"placeholder"}">${t.note ? esc(t.note) : `${ICONS.edit} Aggiungi dettagli...`}</p>
          </div>`;
        }
        expandHTML = `<div class="expand-area">
          <div class="meta">
            <span class="meta-cat">${c.emoji} ${c.label}</span>
            <span class="meta-date">${dateStr}</span>
          </div>
          ${noteHTML}
        </div>`;
      }

      const rStatus = getReminderStatus(t.reminderAt);
      const extraClass = !t.done && rStatus === "overdue" ? "overdue" : (!t.done && rStatus === "today" ? "today" : "");
      return `<div class="task-card ${t.done?"done":""} ${extraClass}">
        <div class="task-main">
          <button class="check-btn ${t.done?"checked":""}" onclick="toggleDone('${t.id}')">${t.done?ICONS.check:""}</button>
          <div class="task-text ${t.done?"done-text":""}" onclick="state.expanded=state.expanded==='${t.id}'?null:'${t.id}';render()">
            ${c.emoji} ${esc(t.text)} ${t.note&&!isExp?"📝":""}${t.reminderAt && !t.done ? `<span class="reminder-chip ${getReminderStatus(t.reminderAt)}">⏰ ${formatReminder(t.reminderAt)}</span>` : ""}
          </div>
          <button class="speak-btn icon-btn" onclick="event.stopPropagation();speakTask('${t.id}')" title="Leggi ad alta voce">${ICONS.speaker}</button>
          <button class="icon-btn" onclick="state.expanded=state.expanded==='${t.id}'?null:'${t.id}';render()">
            <span style="display:inline-block;transition:transform .2s;transform:rotate(${isExp?90:0}deg)">${ICONS.chevron}</span>
          </button>
          <button class="icon-btn del" onclick="deleteTask('${t.id}')">${ICONS.x}</button>
        </div>
        ${expandHTML}
      </div>`;
  };

  let tasksHTML = "";
  if (filtered.length === 0) {
    tasksHTML = `<div class="empty-state">
      <div class="bread">🍞</div>
      <p>${s.tasks.length===0 ? "Premi il microfono e parla~!" : "Nessun risultato qui"}</p>
    </div>`;
  } else {
    if (dueNow.length > 0) {
      tasksHTML += `<div class="section-label">⏰ Da fare ora <span class="count">${dueNow.length}</span></div>`;
      tasksHTML += dueNow.map(renderCard).join("");
    }
    if (rest.length > 0) {
      if (dueNow.length > 0) tasksHTML += `<div class="section-label">📋 Altro</div>`;
      tasksHTML += rest.map(renderCard).join("");
    }
  }

  const subText = active===0 && s.tasks.length>0 ? "Tutto fatto~!" : `${active} da fare` + (done>0 ? ` · ${done} fatt${done===1?"a":"e"}` : "");

  document.getElementById("app").innerHTML = `
    <div class="offline-banner">Sei offline — le modifiche si sincronizzano quando torni~ 🍞</div>

    <div class="header">
      <div class="mascot">${mascotSVG(s.listening)}</div>
      <div>
        <h1>Teto<span>Task</span></h1>
        <div class="sub">${subText}
          <button class="speaker-toggle ${TTS.enabled?'on':''}" onclick="TTS.toggle();render()" title="${TTS.enabled?'Spegni voce':'Accendi voce'}">
            ${TTS.enabled?ICONS.speaker:ICONS.speakerOff} ${TTS.enabled?'ON':'OFF'}
          </button>
          <button class="settings-btn" onclick="state.showSettings=!state.showSettings;render()" title="Impostazioni">${ICONS.settings}</button>
        </div>
      </div>
    </div>

    <div class="bubble">${esc(s.bubble)}</div>

    ${s.showSettings ? `<div class="settings-panel">
      <div class="settings-row">
        <div>
          <div class="settings-label">Domande di Teto</div>
          <div class="settings-hint">Ogni tanto ti chiede come va, se hai bevuto, ecc.</div>
        </div>
        <div class="toggle ${s.proactiveEnabled?'on':''}" onclick="toggleProactive();render()"></div>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">Notifiche browser</div>
          <div class="settings-hint">Per avvisi quando l'app è aperta</div>
        </div>
        <button class="reminder-clear" onclick="requestNotifPermission().then(ok=>showBubble(ok?'Notifiche attive~ ♪':'Notifiche negate 😢'))">Attiva</button>
      </div>
    </div>` : ""}

    <div class="input-card">
      <div class="input-row">
        <button class="mic-btn ${s.listening?"active":""}" onclick="toggleMic()">
          ${ICONS.mic}
          ${s.listening?'<span class="pulse-ring"></span>':""}
        </button>
        <input id="taskInput" class="text-input" type="text" value="${esc(s.input)}"
          placeholder="Parla o scrivi..."
          oninput="state.input=this.value"
          onkeydown="if(event.key==='Enter')addTask()">
        <button class="send-btn" onclick="addTask()" ${s.input.trim()?"":'disabled'}>${ICONS.send}</button>
      </div>
      <div class="cat-row">
        ${CATS.map(c=>`<button class="cat-btn ${s.cat===c.id?"on":"off"}" onclick="state.cat='${c.id}';render()">${c.emoji} ${c.label}</button>`).join("")}
        <div style="flex:1"></div>
        <button class="reminder-btn ${s.reminderAt?'set':''}" onclick="state.showReminderPicker=!state.showReminderPicker;render()">
          ⏰ ${s.reminderAt ? formatReminder(s.reminderAt) : "Quando?"}
        </button>
      </div>
      ${s.showReminderPicker ? `<div class="reminder-picker">
        <input type="datetime-local" value="${toDatetimeLocal(s.reminderAt)}" oninput="state.reminderAt = this.value ? new Date(this.value).getTime() : null; render()" />
        ${s.reminderAt ? `<button class="reminder-clear" onclick="state.reminderAt=null;render()">Rimuovi</button>` : ""}
        <button class="reminder-clear" onclick="state.showReminderPicker=false;render()">OK</button>
      </div>` : ""}
    </div>

    <div class="filter-row">
      <button class="filter-btn ${s.filter==="all"?"on":""}" onclick="state.filter='all';render()">Tutte</button>
      ${CATS.map(c=>`<button class="filter-btn ${s.filter===c.id?"on":""}" onclick="state.filter='${c.id}';render()">${c.emoji}</button>`).join("")}
      <div style="flex:1"></div>
      ${done>0?`<button class="filter-btn" style="font-size:.72rem;padding:4px 10px" onclick="state.showDone=!state.showDone;render()">${s.showDone?"Nascondi ✓":"Mostra ✓"}</button>`:""}
    </div>

    <div class="task-list">${tasksHTML}</div>

    <p class="footer">♪ Teto Task · Powered by 🍞 ♪</p>
  `;

  // Restore cursor in note textarea
  if (s.editNote) {
    const ta = document.getElementById("noteArea");
    if (ta) { ta.oninput = e => { state.noteVal = e.target.value; }; }
  }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

/* ─── Offline detection ─── */
window.addEventListener("online",  () => { document.body.classList.remove("offline"); });
window.addEventListener("offline", () => { document.body.classList.add("offline"); showBubble(TETO.offline); });

/* ─── PWA: Service Worker ─── */
if ("serviceWorker" in navigator) {
  const swCode = `
    const CACHE = "teto-task-v1";
    const ASSETS = ["/"];
    self.addEventListener("install", e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener("activate", e => {
      e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener("fetch", e => {
      if (e.request.method !== "GET") return;
      e.respondWith(
        fetch(e.request).then(r => {
          const clone = r.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
          return r;
        }).catch(() => caches.match(e.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: "application/javascript" });
  const swURL = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).catch(() => {});
}

  name: "TetoTask",
  short_name: "TetoTask",
  description: "Il tuo assistente personale a tema Teto Kasane 🍞",
  start_url: ".",
  display: "standalone",
  background_color: "#fef6f8",
  theme_color: "#ff4271",
  icons: [{
    src: "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="#ff4271" width="100" height="100" rx="20"/><text x="50" y="66" text-anchor="middle" font-size="52">🍞</text></svg>'),
    sizes: "any", type: "image/svg+xml"
  }]
};
const mBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
const mLink = document.createElement("link");
mLink.rel = "manifest";
mLink.href = URL.createObjectURL(mBlob);
document.head.appendChild(mLink);

/* ─── Init ─── */
auth.signInAnonymously()
  .then(cred => {
    state.uid = cred.user.uid;
    state.ready = true;

    // Enable offline persistence
    db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

    listenToTasks();
    render();

    // Kick off proactive questions if enabled
    if (state.proactiveEnabled) scheduleProactive();

    // Initial reminder check shortly after load (once tasks arrive)
    setTimeout(() => { checkDueReminders(); render(); }, 2500);
  })
  .catch(err => {
    console.error("Auth error:", err);
    document.getElementById("app").innerHTML = `
      <div style="padding:40px 20px;text-align:center">
        <p style="font-size:1.1rem;font-weight:700;color:#ff4271;margin-bottom:8px">⚠️ Configura Firebase</p>
        <p style="font-size:.85rem;color:#a295a7;line-height:1.5">
          Apri il file <code>index.html</code> e inserisci la tua configurazione Firebase
          nel blocco <code>FIREBASE_CONFIG</code> in cima allo script.
        </p>
      </div>`;
  });
</script>
