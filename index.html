    if (!state.uid || this.unsub) return;
    this.unsub = db.collection("users").doc(state.uid).collection("events")
      .onSnapshot(snap => {
        const grouped = {};
        snap.docs.forEach(d => {
          const ev = { id: d.id, ...d.data() };
          if (!grouped[ev.date]) grouped[ev.date] = [];
          grouped[ev.date].push(ev);
        });
        // Sort by time inside each day
        Object.values(grouped).forEach(arr => {
          arr.sort((a,b) => (a.time||"99:99").localeCompare(b.time||"99:99"));
        });
        this.events = grouped;
        // Partial re-render: only rebuild the calendar overlay if it's open.
        // Avoids the full-page reload effect when events sync from another device.
        if (this.open_) renderCalendarOnly();
      });
  },
  resubscribe() {
    if (this.unsub) { try { this.unsub(); } catch(e) {} this.unsub = null; }
    if (state.uid) this.subscribe();
  },
  close() {
    this.open_ = false;
    this.showForm = false;
  },
  prev() {
    if (--this.month < 0) { this.month = 11; this.year--; }
  },
  next() {
    if (++this.month > 11) { this.month = 0; this.year++; }
  },
  today() {
    const t = new Date();
    this.year = t.getFullYear();
    this.month = t.getMonth();
    this.selectedDate = dateKey(t.getFullYear(), t.getMonth(), t.getDate());
  },
  selectDay(ds) {
    this.selectedDate = ds;
  },
  openForm(evId = null) {
    this.showForm = true;
    this.editingId = evId;
    if (evId) {
      // evId can come from any day if user navigates; find it across all events
      let ev = null;
      for (const arr of Object.values(this.events)) {
        const found = arr.find(e => e.id === evId);
        if (found) { ev = found; break; }
      }
      if (ev) {
        this.formTitle = ev.title;
        this.formNote = ev.note || "";
        this.formCategory = ev.category || "personal";
        this.formAllDay = !!ev.allDay;
        this.formRecurrence = ev.recurrence || "none";
        this.formReminderOffset = (ev.reminderOffset != null) ? ev.reminderOffset : -1;
        if (ev.time && !ev.allDay) {
          [this.formHour, this.formMin] = ev.time.split(":");
        } else {
          this.formHour = "09"; this.formMin = "00";
        }
        // Make sure selectedDate matches the event we are editing
        if (ev.date) this.selectedDate = ev.date;
      }
    } else {
      this.formTitle = "";
      this.formNote = "";
      this.formCategory = "personal";
      this.formAllDay = false;
      this.formRecurrence = "none";
      this.formReminderOffset = -1;
      this.formHour = "09";
      this.formMin = "00";
    }
  },
  closeForm() {
    this.showForm = false;
    this.editingId = null;
  },
  async saveEvent() {
    const title = this.formTitle.trim();
    if (!title) { showBubble("Scrivi un titolo per l'evento!"); return; }
    const data = {
      title,
      date: this.selectedDate,
      time: this.formAllDay ? null : `${this.formHour}:${this.formMin}`,
      note: this.formNote.trim() || null,
      category: this.formCategory || "personal",
      allDay: !!this.formAllDay,
      recurrence: this.formRecurrence || "none",
      reminderOffset: (this.formReminderOffset == null || this.formReminderOffset === -1) ? null : this.formReminderOffset,
      ts: Date.now(),
    };
    try {
      const col = db.collection("users").doc(state.uid).collection("events");
      if (this.editingId) {
        await col.doc(this.editingId).update(data);
        showBubble("Evento aggiornato!");
      } else {
        await col.add(data);
        showBubble("Evento salvato!");
      }
      haptic(10);
      this.closeForm();
      render();
    } catch(e) { console.error(e); showBubble(TETO.error); }
  },
  async deleteEvent(id) {
    try {
      await db.collection("users").doc(state.uid).collection("events").doc(id).delete();
      showBubble("Evento cancellato!");
      haptic(8);
      render();
    } catch(e) { console.error(e); showBubble(TETO.error); }
  },

  /* ─── U2: Recurrence expansion ───
     Given a "YYYY-MM-DD" string, return all events that fall on that day
     considering recurrence. Result: array of synthetic event objects (with
     `_originalDate` to know the source). */
  eventsOnDay(dayKey) {
    const result = [];
    const [yy, mm, dd] = dayKey.split("-").map(Number);
    const dayDate = new Date(yy, mm-1, dd);
    const dayDow = dayDate.getDay();

    for (const [origDate, arr] of Object.entries(this.events)) {
      for (const ev of arr) {
        if (origDate === dayKey) {
          // Direct match — original or non-recurring instance
          result.push(ev);
          continue;
        }
        if (!ev.recurrence || ev.recurrence === "none") continue;
        const [oy, om, od] = origDate.split("-").map(Number);
        const origD = new Date(oy, om-1, od);
        if (dayDate < origD) continue;       // recurrence only future
        let matches = false;
        if (ev.recurrence === "daily")        matches = true;
        else if (ev.recurrence === "weekly")  matches = (origD.getDay() === dayDow);
        else if (ev.recurrence === "monthly") matches = (origD.getDate() === dd);
        else if (ev.recurrence === "yearly")  matches = (origD.getMonth() === mm-1 && origD.getDate() === dd);
        if (matches) {
          result.push({ ...ev, _originalDate: origDate, _isRecurrence: true });
        }
      }
    }
    return result.sort((a,b) => (a.time||"99:99").localeCompare(b.time||"99:99"));
  },

  /* ─── U1: Agenda view — flat list of next N days with events ─── */
  agendaNextDays(n = 30) {
    const today = startOfDay(Date.now());
    const result = [];
    for (let i = 0; i < n; i++) {
      const d = new Date(today + i * 86400000);
      const k = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const evs = this.eventsOnDay(k);
      if (evs.length > 0) result.push({ key: k, date: d, events: evs });
    }
    return result;
  },

  /* ─── U3: Reminder check — fire notification when reminderOffset matches ─── */
  checkReminders() {
    const now = Date.now();
    const todayKey = dateKey(new Date(now).getFullYear(), new Date(now).getMonth(), new Date(now).getDate());
    const dayEvents = this.eventsOnDay(todayKey);
    for (const ev of dayEvents) {
      if (ev.reminderOffset == null || ev.allDay || !ev.time) continue;
      const [h, m] = ev.time.split(":").map(Number);
      const evMs = new Date().setHours(h, m, 0, 0);
      const fireMs = evMs - ev.reminderOffset * 60000;
      const dedupKey = `${ev.id}_${todayKey}_${ev.reminderOffset}`;
      if (now >= fireMs && now < fireMs + 90000 && !this.notifiedEvents.has(dedupKey)) {
        this.notifiedEvents.add(dedupKey);
        const offText = ev.reminderOffset === 0 ? "ora" :
                        ev.reminderOffset >= 60 ? `tra ${Math.round(ev.reminderOffset/60)}h` :
                        `tra ${ev.reminderOffset} min`;
        const msg = `📅 ${ev.title} ${offText} (${ev.time})`;
        showBubble(msg);
        if (TTS.enabled) TTS.speak(msg);
        haptic([20, 60, 20]);
        if (window.Notification && Notification.permission === "granted") {
          try { new Notification("TetoTask 🍞", { body: msg, tag: dedupKey }); } catch(e) {}
        }
      }
    }
  },

  /* ─── V1/V2/V3: Voice operations ─── */
  // Find event by partial title match (returns first match in next 60 days)
  findByTitle(query) {
    const q = query.toLowerCase().trim();
    if (!q) return null;
    const today = startOfDay(Date.now());
    for (let i = 0; i < 60; i++) {
      const d = new Date(today + i * 86400000);
      const k = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const evs = this.eventsOnDay(k);
      const match = evs.find(e => e.title.toLowerCase().includes(q));
      if (match) return { event: match, dayKey: k, date: d };
    }
    return null;
  },
  async deleteByTitle(query) {
    const found = this.findByTitle(query);
    if (!found) return null;
    // If recurrence instance, delete the whole recurring template (simpler UX)
    const realId = found.event._isRecurrence ? found.event.id : found.event.id;
    await db.collection("users").doc(state.uid).collection("events").doc(realId).delete();
    return found;
  },
  async moveByTitle(query, newDateKey, newTime) {
    const found = this.findByTitle(query);
    if (!found) return null;
    const update = { date: newDateKey };
    if (newTime) update.time = newTime;
    await db.collection("users").doc(state.uid).collection("events").doc(found.event.id).update(update);
    return found;
  },
};

/* ═══════════════════════════════════════════════════════════════
   📝 LISTS MODULE — note e liste personali (film, spesa, ecc.)
   ═══════════════════════════════════════════════════════════════ */
const Lists = {
  open_: false,
  lists: [],                // [{ id, name, emoji, checkable, category, ts }]
  items: {},                // { listId: [{ id, text, done, position, ts }] }
  currentListId: null,
  unsubLists: null,
  unsubItems: {},           // { listId: unsub }
  search: "",               // U-6: detail search query
  editingItemId: null,      // U-1: which item is in inline edit mode
  undoItem: null,           // F-D: last deleted { listId, item, timer }

  findByName(name) {
    if (!name) return null;
    // Normalize: lowercase, strip accents, trim, remove leading articles
    const norm = (s) => String(s || "")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")  // strip accents
      .replace(/^(?:il|lo|la|i|gli|le|l'|un'|un|una|della|dello|dei|degli|delle|del|di|al|alla|allo|ai|agli|alle|per)\s+/g, "")
      .replace(/\s+/g, " ")
      .trim();
    const n = norm(name);
    if (!n) return null;
    // 1. Exact match
    let found = this.lists.find(l => norm(l.name) === n);
    if (found) return found;
    // 2. Query is a prefix of the list name (e.g. "spesa" matches "spesa settimanale")
    found = this.lists.find(l => norm(l.name).startsWith(n));
    if (found) return found;
    // 3. List name is a prefix of the query (e.g. "spesa" list matches "spesa di oggi")
    found = this.lists.find(l => n.startsWith(norm(l.name)));
    if (found) return found;
    // 4. Substring match either way
    found = this.lists.find(l => norm(l.name).includes(n) || n.includes(norm(l.name)));
    return found || null;
  },
  subscribe() {
    if (!state.uid || this.unsubLists) return;
    this.unsubLists = db.collection("users").doc(state.uid).collection("lists")
      .orderBy("ts","desc").onSnapshot(snap => {
        this.lists = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        const liveIds = new Set(this.lists.map(l => l.id));
        // Subscribe to items of each list once
        for (const l of this.lists) {
          if (!this.unsubItems[l.id]) this.subscribeItems(l.id);
        }
        // F-F: clean up subscriptions of lists that no longer exist
        for (const id of Object.keys(this.unsubItems)) {
          if (!liveIds.has(id)) {
            try { this.unsubItems[id](); } catch(e) {}
            delete this.unsubItems[id];
            delete this.items[id];
          }
        }
        if (this.open_) renderListsOnly();
      });
  },
  subscribeItems(listId) {
    this.unsubItems[listId] = db.collection("users").doc(state.uid)
      .collection("lists").doc(listId).collection("items")
      .orderBy("ts","desc").onSnapshot(snap => {
        this.items[listId] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        if (this.open_) renderListsOnly();
      });
  },
  resubscribe() {
    if (this.unsubLists) { try { this.unsubLists(); } catch(e) {} this.unsubLists = null; }
    for (const k of Object.keys(this.unsubItems)) {
      try { this.unsubItems[k](); } catch(e) {}
      delete this.unsubItems[k];
    }
    this.lists = [];
    this.items = {};
    if (state.uid) this.subscribe();
  },
  open(listId = null) {
    this.open_ = true;
    this.currentListId = listId;
    this.subscribe();
  },
  close() {
    this.open_ = false;
    this.currentListId = null;
  },
  openList(id) {
    this.currentListId = id;
  },
  back() {
    this.currentListId = null;
  },
  async createList(name, opts = {}) {
    const id = genId();
    const emoji = opts.emoji || guessListEmoji(name);
    const checkable = opts.checkable !== undefined ? opts.checkable : false;
    const category = opts.category || "general";
    await db.collection("users").doc(state.uid).collection("lists").doc(id).set({
      name, emoji, checkable, category, ts: Date.now(),
    });
    return id;
  },
  async deleteList(id) {
    const list = this.lists.find(l => l.id === id);
    const itemCount = (this.items[id] || []).length;
    const detail = list ? `Eliminerai "${list.name}"${itemCount > 0 ? ` e le sue ${itemCount} voci` : ""}.` : "";
    if (!await Modal.confirm(detail, { title: "Eliminare la lista?", danger: true, okLabel: "Elimina" })) return;
    // Delete all items first
    const itemsSnap = await db.collection("users").doc(state.uid)
      .collection("lists").doc(id).collection("items").get();
    const batch = db.batch();
    itemsSnap.forEach(doc => batch.delete(doc.ref));
    batch.delete(db.collection("users").doc(state.uid).collection("lists").doc(id));
    await batch.commit();
    if (this.currentListId === id) this.currentListId = null;
    showBubble("Lista eliminata");
    haptic(10);
    render();
  },
  async toggleCheckable(id, current) {
    await db.collection("users").doc(state.uid).collection("lists").doc(id)
      .update({ checkable: !current });
  },
  async renameList(id, newName, newEmoji = null, newCategory = null) {
    const update = { name: newName };
    if (newEmoji) update.emoji = newEmoji;
    else update.emoji = guessListEmoji(newName);
    if (newCategory) update.category = newCategory;
    await db.collection("users").doc(state.uid).collection("lists").doc(id).update(update);
  },
  async setCategory(id, category) {
    await db.collection("users").doc(state.uid).collection("lists").doc(id)
      .update({ category });
  },
  async addItem(listId, text) {
    if (!text.trim()) return;
    // U-2: pick the highest existing position so new items go to the bottom of pending
    const arr = this.items[listId] || [];
    const maxPos = arr.reduce((a, x) => Math.max(a, x.position ?? 0), 0);
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").add({
        text: text.trim(), done: false, position: maxPos + 1, ts: Date.now(),
      });
  },
  async toggleItem(listId, itemId, done) {
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").doc(itemId).update({ done: !done });
    haptic(8);
  },
  async deleteItem(listId, itemId) {
    // F-D: store for undo before deleting
    const arr = this.items[listId] || [];
    const item = arr.find(x => x.id === itemId);
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").doc(itemId).delete();
    haptic(6);
    if (item) {
      // Cancel previous undo if any
      if (this.undoItem && this.undoItem.timer) clearTimeout(this.undoItem.timer);
      this.undoItem = {
        listId, item,
        timer: setTimeout(() => { this.undoItem = null; renderListsOnly(); }, 6000)
      };
      renderListsOnly();
    }
  },
  async undoDeleteItem() {
    if (!this.undoItem) return;
    const { listId, item } = this.undoItem;
    if (this.undoItem.timer) clearTimeout(this.undoItem.timer);
    this.undoItem = null;
    // Re-create with same fields (new id, but same content)
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").add({
        text: item.text, done: !!item.done,
        position: item.position ?? Date.now(),
        ts: Date.now(),
      });
    showBubble("Voce ripristinata~ ♪");
    haptic(8);
  },
  async updateItem(listId, itemId, text) {
    if (!text.trim()) return;
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").doc(itemId).update({ text: text.trim() });
    haptic(6);
  },
  async duplicateItem(listId, itemId) {
    const arr = this.items[listId] || [];
    const it = arr.find(x => x.id === itemId);
    if (!it) return;
    const maxPos = arr.reduce((a, x) => Math.max(a, x.position ?? 0), 0);
    await db.collection("users").doc(state.uid).collection("lists").doc(listId)
      .collection("items").add({
        text: it.text, done: false,
        position: maxPos + 1, ts: Date.now(),
      });
    haptic(8);
  },
  async moveItem(listId, itemId, direction) {
    // U-2: swap positions with the previous/next pending sibling
    const arr = this.items[listId] || [];
    const pending = this.sortedItems(listId).pending;
    const idx = pending.findIndex(x => x.id === itemId);
    if (idx < 0) return;
    const targetIdx = direction === "up" ? idx - 1 : idx + 1;
    if (targetIdx < 0 || targetIdx >= pending.length) return;
    const a = pending[idx], b = pending[targetIdx];
    const aPos = a.position ?? a.ts;
    const bPos = b.position ?? b.ts;
    const batch = db.batch();
    const col = db.collection("users").doc(state.uid).collection("lists").doc(listId).collection("items");
    batch.update(col.doc(a.id), { position: bPos });
    batch.update(col.doc(b.id), { position: aPos });
    await batch.commit();
    haptic(6);
  },
  async clearCompleted(listId) {
    const arr = this.items[listId] || [];
    const done = arr.filter(x => x.done);
    if (done.length === 0) return;
    if (!await Modal.confirm(`Eliminare ${done.length} ${done.length===1?"voce completata":"voci completate"}?`, { title: "Pulisci completate", danger: true, okLabel: "Elimina" })) return;
    const batch = db.batch();
    const col = db.collection("users").doc(state.uid).collection("lists").doc(listId).collection("items");
    done.forEach(it => batch.delete(col.doc(it.id)));
    await batch.commit();
    showBubble(`${done.length} voci pulite ✨`);
    haptic(10);
  },
  async toggleAll(listId, allChecked) {
    const arr = this.items[listId] || [];
    if (arr.length === 0) return;
    const newDone = !allChecked;   // if all checked, uncheck all; otherwise check all
    const batch = db.batch();
    const col = db.collection("users").doc(state.uid).collection("lists").doc(listId).collection("items");
    arr.forEach(it => {
      if (it.done !== newDone) batch.update(col.doc(it.id), { done: newDone });
    });
    await batch.commit();
    haptic(10);
  },
  async clearAllItems(listId) {
    const arr = this.items[listId] || [];
    if (arr.length === 0) return;
    if (!await Modal.confirm(`Cancellare tutte le ${arr.length} voci? La lista resta.`, { title: "Svuota lista", danger: true, okLabel: "Svuota" })) return;
    const batch = db.batch();
    const col = db.collection("users").doc(state.uid).collection("lists").doc(listId).collection("items");
    arr.forEach(it => batch.delete(col.doc(it.id)));
    await batch.commit();
    showBubble("Lista svuotata ✨");
    haptic(10);
  },
  // Format list as text for sharing (U-7)
  formatForShare(listId) {
    const list = this.lists.find(l => l.id === listId);
    if (!list) return "";
    const arr = this.items[listId] || [];
    const sorted = [...arr].sort((a,b) => (a.position ?? a.ts) - (b.position ?? b.ts));
    const lines = [`${list.emoji} ${list.name}`, ""];
    sorted.forEach(it => {
      const mark = list.checkable ? (it.done ? "[✓] " : "[ ] ") : "• ";
      lines.push(mark + it.text);
    });
    lines.push("", "— TetoTask 🍞");
    return lines.join("\n");
  },
  async share(listId) {
    const text = this.formatForShare(listId);
    if (!text) return;
    if (navigator.share) {
      try { await navigator.share({ text }); return; }
      catch(e) { /* user cancelled or unsupported, fall through */ }
    }
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text);
      showBubble("Lista copiata negli appunti~ ♪");
    } catch(e) {
      // Last resort: show in modal
      await Modal.show({
        title: "Lista pronta per la condivisione",
        body: "La condivisione automatica non è disponibile. Copia il testo qui sotto.",
        fields: [{ id: "v", label: "", type: "textarea", value: text }],
        actions: [{ label: "Chiudi", value: true, primary: true }],
      });
    }
  },
  // U-2: sorted items split into pending (by position) and done (by ts desc)
  sortedItems(listId) {
    const arr = this.items[listId] || [];
    const pending = arr.filter(x => !x.done).slice().sort((a,b) => (a.position ?? a.ts) - (b.position ?? b.ts));
    const done    = arr.filter(x =>  x.done).slice().sort((a,b) => (b.ts || 0) - (a.ts || 0));
    return { pending, done };
  },
  readAloud(listId) {
    const list = this.lists.find(l => l.id === listId);
    const items = this.items[listId] || [];
    if (!list) return;
    if (items.length === 0) {
      TTS.speak(`La lista ${list.name} è vuota`, { force: true });
      return;
    }
    const filtered = list.checkable ? items.filter(i=>!i.done) : items;
    const text = `Lista ${list.name}. ${filtered.map((i,idx)=>`${idx+1}: ${i.text}`).join(". ")}`;
    TTS.speak(text, { force: true });
  },

  // U-4: full modal create flow
  async createListInteractive() {
    const result = await Modal.show({
      title: "Nuova lista",
      fields: [
        { id: "name", label: "Nome", type: "text", placeholder: "Es. Spesa, Film, Idee..." },
        { id: "emoji", label: "Emoji", type: "emoji-picker", value: "📝", options: LIST_EMOJI_PALETTE },
        { id: "category", label: "Categoria", type: "select", value: "general",
          options: LIST_CATS.map(c => ({ value: c.id, label: c.label })) },
        { id: "checkable", label: "Voci spuntabili (tipo to-do)", type: "checkbox", value: false },
      ],
      actions: [
        { label: "Annulla", value: false },
        { label: "Crea", value: true, primary: true },
      ],
    });
    if (!result || result.action !== true) return;
    const name = (result.values.name || "").trim();
    if (!name) { showBubble("Dai un nome alla lista~"); return; }
    const id = await this.createList(name, {
      emoji: result.values.emoji,
      category: result.values.category,
      checkable: !!result.values.checkable,
    });
    this.openList(id);
    render();
  },
  async editListInteractive(listId) {
    const list = this.lists.find(l => l.id === listId);
    if (!list) return;
    const result = await Modal.show({
      title: "Modifica lista",
      fields: [
        { id: "name", label: "Nome", type: "text", value: list.name },

/* ─── Helpers ─── */

/* ─── Reminder helpers ─── */
function startOfDay(ts) { const d = new Date(ts); d.setHours(0,0,0,0); return d.getTime(); }

/* Find first day in next 14 days with no calendar events and ≤2 active tasks (#3) */
function findNextFreeDay() {
  const today = startOfDay(Date.now());
  for (let i = 1; i <= 14; i++) {
    const dayStart = today + i * 86400000;
    const dayEnd   = dayStart + 86400000;
    const d = new Date(dayStart);
    const dayK = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
    const events = (typeof Calendar !== "undefined" ? Calendar.eventsOnDay(dayK) : []);
    if (events.length > 0) continue;
    const tasksThatDay = state.tasks.filter(t => !t.done && t.reminderAt && t.reminderAt >= dayStart && t.reminderAt < dayEnd);
    if (tasksThatDay.length <= 2) return dayStart;
  }
  return null;
}
function getReminderStatus(ts) {
  if (!ts) return null;
  const now = Date.now();
  const today = startOfDay(now);
  const tomorrow = today + 86400000;
  if (ts < now) return "overdue";
  if (ts < tomorrow) return "today";
  return "future";
}
function formatReminder(ts) {
  if (!ts) return "";
  const now = Date.now();
  const diff = ts - now;
  const absMin = Math.abs(Math.round(diff / 60000));
  if (diff < 0) {
    if (absMin < 60) return `scaduto ${absMin}m fa`;
    if (absMin < 1440) return `scaduto ${Math.round(absMin/60)}h fa`;
    return `scaduto ${Math.round(absMin/1440)}g fa`;
  }
  if (absMin < 60) return `tra ${absMin}m`;
  if (absMin < 1440) {
    const d = new Date(ts);
    return `alle ${d.getHours().toString().padStart(2,"0")}:${d.getMinutes().toString().padStart(2,"0")}`;
  }
  const d = new Date(ts);
  return d.toLocaleDateString("it-IT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
}
function toDatetimeLocal(ts) {
  if (!ts) return "";
  const d = new Date(ts);
  const pad = n => n.toString().padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

/* ─── Notifications ─── */
async function requestNotifPermission() {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "granted") return true;
  if (Notification.permission === "denied") return false;
  const p = await Notification.requestPermission();
  return p === "granted";
}
function notify(title, body) {
  if ("Notification" in window && Notification.permission === "granted") {
    try { new Notification(title, { body, icon: TETO_IMG, badge: TETO_IMG, tag: "tetotask" }); }
    catch(e) { /* some browsers block in non-secure contexts */ }
  }
}

/* ─── Due reminders checker ─── */
function checkDueReminders() {
  const now = Date.now();
  let fired = false;
  for (const t of state.tasks) {
    if (t.done || !t.reminderAt) continue;
    if (state.notifiedTasks.has(t.id)) continue;
    if (t.reminderAt <= now) {
      state.notifiedTasks.add(t.id);
      showBubble(TETO.overdue(t.text));
      notify("TetoTask 🍞", `${t.text} — è il momento!`);
      fired = true;
    } else if (t.reminderAt - now <= 5*60*1000) {
      state.notifiedTasks.add(t.id);
      showBubble(TETO.dueSoon(t.text));
      notify("TetoTask 🍞", `${t.text} — tra poco!`);
      fired = true;
    }
  }
  return fired;
}
// Only re-render when something actually changes, and never when calendar/lists
// are open (avoids the disruptive full-page refresh the user complained about).
setInterval(() => {
  if (!state.ready) return;
  const fired = checkDueReminders();
  // U3: also fire calendar event reminders
  Calendar.checkReminders();
  if (fired && !Calendar.open_ && !Lists.open_ && !state.showSettings && !state.showHelp) {
    render();
  }
}, 60000);

/* ─── Proactive Teto questions ─── */
let proactiveTimer = null;
function scheduleProactive() {
  clearTimeout(proactiveTimer);
  if (!state.proactiveEnabled) return;
  // Random between 12 and 25 minutes
  const delay = (12 + Math.random() * 13) * 60 * 1000;
  proactiveTimer = setTimeout(() => {
    if (state.proactiveEnabled && !state.listening) {
      showBubble(pick(TETO.proactive));
    }
    scheduleProactive();
  }, delay);
}
function toggleProactive() {
  state.proactiveEnabled = !state.proactiveEnabled;
  localStorage.setItem("teto-proactive", state.proactiveEnabled ? "1" : "0");
  if (state.proactiveEnabled) { scheduleProactive(); showBubble("Ti farò compagnia~ ♪"); }
  else { clearTimeout(proactiveTimer); showBubble("Ok, non ti disturbo più!"); }
}

function showBubble(text, opts = {}) {
  state.bubble = text;
  render();
  // Speak unless silent flag passed or mic is listening (avoid feedback loop).
  // TTS.speak() sanitizes emojis/tildes internally now.
  if (!opts.silent && !state.listening) {
    TTS.speak(text);
  }
  clearTimeout(bubbleTimeout);
  bubbleTimeout = setTimeout(() => {}, 5000);
}

/* ─── Haptic feedback (mobile) ─── */
function haptic(ms = 10) {
  if (navigator.vibrate) { try { navigator.vibrate(ms); } catch(e) {} }
}

/* ─── Confetti (Teto-themed particles on task completion) ─── */
function confetti(originX, originY) {
  const symbols = ["♪", "♫", "✨", "🍞", "♡", "★"];
  const colors  = ["#ff2f5e", "#ff85ad", "#e85c7f", "#ffb84d", "#a31540"];
  const count = 14;
  const host = document.body;
  for (let i = 0; i < count; i++) {
    const el = document.createElement("span");
    el.className = "confetti-piece";
    el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.style.left = originX + "px";
    el.style.top  = originY + "px";
    // random direction
    const angle = (Math.random() * 2 - 1) * Math.PI / 2 - Math.PI / 2;  // upward fan
    const speed = 80 + Math.random() * 120;
    const dx = Math.cos(angle) * speed;
    const dy = Math.sin(angle) * speed;
    const rot = (Math.random() * 720 - 360);
    const size = 14 + Math.random() * 14;
    el.style.fontSize = size + "px";
    el.style.setProperty("--dx", dx + "px");
    el.style.setProperty("--dy", dy + "px");
    el.style.setProperty("--rot", rot + "deg");
    host.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

/* ─── Swipe gestures on task cards ─── */
const Swipe = {
  THRESHOLD: 80,      // px before action triggers
  MAX_OFFSET: 160,    // visual cap
  startX: 0, startY: 0, currentDx: 0,
  card: null, taskId: null, active: false, locked: null,

  onStart(e) {
    const target = e.target.closest(".task-card");
    if (!target) return;
    if (e.target.closest("button, input, textarea, .expand-area")) return;
    const id = target.getAttribute("data-task-id");
    if (state.expanded === id || state.editText === id || state.editNote === id) return;
    this.active = true;
    this.locked = null;
    this.card = target;
    this.taskId = id;
    this.startX = e.touches[0].clientX;
    this.startY = e.touches[0].clientY;
    this.currentDx = 0;
  },
  onMove(e) {
    if (!this.active) return;
    const dx = e.touches[0].clientX - this.startX;
    const dy = e.touches[0].clientY - this.startY;
    if (!this.locked) {
      if (Math.abs(dx) > 12 || Math.abs(dy) > 12) {
        this.locked = Math.abs(dx) > Math.abs(dy) ? "h" : "v";
      }
    }
    if (this.locked !== "h") return;
    e.preventDefault();
    const clamped = Math.max(-this.MAX_OFFSET, Math.min(this.MAX_OFFSET, dx));
    this.currentDx = clamped;
    this.card.style.transform = `translateX(${clamped}px)`;
    const pct = Math.min(1, Math.abs(clamped) / this.THRESHOLD);
    if (clamped > 0) {
      this.card.style.boxShadow = `inset 8px 0 0 rgba(76,175,80,${pct*0.7}), 0 2px 10px rgba(255,47,94,.08)`;
    } else {
      this.card.style.boxShadow = `inset -8px 0 0 rgba(255,47,94,${pct*0.7}), 0 2px 10px rgba(255,47,94,.08)`;
    }
  },
  onEnd() {
    if (!this.active) return;
    const wasHoriz = this.locked === "h";
    const dx = this.currentDx;
    const card = this.card;
    const id = this.taskId;
    if (card) {
      card.style.transition = "transform .25s ease, box-shadow .25s ease";
      card.style.transform = "";
      card.style.boxShadow = "";
      setTimeout(() => { if (card) card.style.transition = ""; }, 300);
    }
    if (wasHoriz && Math.abs(dx) >= this.THRESHOLD && id) {
      if (dx > 0) toggleDone(id);
      else deleteTask(id);
    }
    this.active = false;
    this.card = null; this.taskId = null; this.locked = null; this.currentDx = 0;
  },
  init() {
    document.addEventListener("touchstart", e => this.onStart(e), { passive: true });
    document.addEventListener("touchmove",  e => this.onMove(e),  { passive: false });
    document.addEventListener("touchend",   () => this.onEnd(),   { passive: true });
    document.addEventListener("touchcancel",() => this.onEnd(),   { passive: true });
  },
};
Swipe.init();

/* ─── Firebase Operations ─── */
async function addTaskToDb(task) {
  try {
    await tasksRef().doc(task.id).set(task);
  } catch(e) { console.error("Add failed:", e); showBubble(TETO.error); }
}

async function updateTaskInDb(id, data) {
  try {
    await tasksRef().doc(id).update(data);
  } catch(e) { console.error("Update failed:", e); }
}

async function deleteTaskFromDb(id) {
  try {
    await tasksRef().doc(id).delete();
  } catch(e) { console.error("Delete failed:", e); }
}

function listenToTasks() {
  if (unsubFirestore) unsubFirestore();
  unsubFirestore = tasksRef().orderBy("ts","desc").onSnapshot(snap => {
    state.tasks = snap.docs.map(d => ({ id:d.id, ...d.data() }));
    // Don't force a full re-render if user is inside an overlay — they'd
    // see the overlay flicker / lose scroll for no reason. Tasks list
    // is only visible on the main screen.
    if (!Calendar.open_ && !Lists.open_ && !state.showSettings && !state.showHelp) {
      render();
    }
  }, err => {
    console.error("Firestore listen error:", err);
  });
}

/* ─── Voice ─── */
function toggleMic() {
  if (state.listening) {
    recognition?.stop();
    state.listening = false;
    render();
    // Command mic cancelled by user — restore wake word listener
    WAKE.resume();
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showBubble(TETO.noVoice); return; }

  // Pause the wake listener: only one recognizer can be active per tab
  WAKE.pause();

  // CRITICAL: stop any ongoing TTS so the mic doesn't record Teto's own voice
  TTS.stop();

  recognition = new SR();
  recognition.lang = "it-IT";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = async e => {
    const transcript = e.results[0][0].transcript;
    state.listening = false;
    state.input = "";  // we'll execute directly
    render();
    haptic(10);
    // Parse intent and execute — Teto "capisce"
    try {
      const intent = detectIntent(transcript);
      const reply = await executeIntent(intent);
      if (reply) showBubble(reply);
    } catch (err) {
      console.error("Intent execution error:", err);
      // Fallback: treat as plain task
      state.input = transcript;
      render();
      setTimeout(() => document.getElementById("taskInput")?.focus(), 100);
    }
  };
  recognition.onerror = () => {
    state.listening = false;
    render();
    showBubble(TETO.voiceErr, {silent:true});
    WAKE.resume();
  };
  recognition.onend = () => {
    state.listening = false;
    render();
    WAKE.resume();
  };

  // Small delay so any just-cancelled TTS / wake recognizer is fully stopped
  // before the command mic opens (mic hardware needs a brief release window).
  setTimeout(() => {
    try { recognition.start(); } catch(e) {}
    state.listening = true;
    // "Ti ascolto" is shown VISUALLY only — not spoken, to avoid mic feedback
    showBubble(TETO.listen, {silent:true});
    haptic(15);
    render();
  }, 200);
}

/* ─── Actions ─── */
async function addTask() {
  const text = state.input.trim();
  if (!text) return;
  // If user explicitly set a reminder via picker, treat as plain task w/ reminder
  if (state.reminderAt) {
    const task = {
      id:genId(), text, category:state.cat, note:"", done:false, ts:Date.now(),
      reminderAt: state.reminderAt,
    };
    state.input = "";
    state.reminderAt = null;
    state.showReminderPicker = false;
    addTaskToDb(task);
    showBubble(TETO.remSet);
    haptic(12);
    requestNotifPermission();
    return;
  }
  // Otherwise route through intent parser so typing behaves like voice
  state.input = "";
  render();
  try {
    const intent = detectIntent(text);
    const reply = await executeIntent(intent);
    if (reply) showBubble(reply);
    haptic(10);
  } catch (err) {
    console.error("Intent error:", err);
    // Fallback: plain task
    const task = { id:genId(), text, category:state.cat, note:"", done:false, ts:Date.now(), reminderAt:null };
    addTaskToDb(task);
    showBubble(pick(TETO.added));
  }
}

function toggleDone(id) {
  const t = state.tasks.find(x=>x.id===id);
  if (!t) return;
  updateTaskInDb(id, { done:!t.done });
  if (!t.done) {
    showBubble(pick(TETO.done));
    haptic(20);
    // Fire confetti from the check button position
    const btn = document.querySelector(`[data-task-id="${id}"] .check-btn`);
    if (btn) {
      const r = btn.getBoundingClientRect();
      confetti(r.left + r.width/2, r.top + r.height/2);
    }
    // Flag for celebrate animation on the next render (#5)
    state.celebratingId = id;
    setTimeout(() => { state.celebratingId = null; }, 900);
  }
  else haptic(8);
}

function deleteTask(id) {
  const t = state.tasks.find(x=>x.id===id);
  if (!t) return;
  state.undoTask = { ...t };
  deleteTaskFromDb(id);
  if (state.expanded===id) state.expanded=null;
  showBubble(TETO.deleted);
  haptic(15);
  clearTimeout(undoTimer);
  undoTimer = setTimeout(() => { state.undoTask = null; render(); }, 6000);
  render();
}

function undoDelete() {
  if (!state.undoTask) return;
  const t = state.undoTask;
  state.undoTask = null;
  clearTimeout(undoTimer);
  addTaskToDb(t);
  showBubble(TETO.undone);
  haptic(10);
  render();
}

function saveNote(id) {
  updateTaskInDb(id, { note:state.noteVal });
  state.editNote = null;
  haptic(8);
  render();
}

function saveTaskText(id) {
  const newText = state.editTextVal.trim();
  if (newText && newText !== state.tasks.find(x=>x.id===id)?.text) {
    updateTaskInDb(id, { text: newText });
    showBubble(TETO.edited);
    haptic(8);
  }
  state.editText = null;
  state.editTextVal = "";
  render();
}

function setReminderPreset(preset) {
  const now = new Date();
  let ts;
  if (preset === "30m") ts = Date.now() + 30*60*1000;
  else if (preset === "1h") ts = Date.now() + 60*60*1000;
  else if (preset === "2h") ts = Date.now() + 2*60*60*1000;
  else if (preset === "tonight") {
    const d = new Date(); d.setHours(20,0,0,0);
    if (d.getTime() < Date.now()) d.setDate(d.getDate()+1);
    ts = d.getTime();
  }
  else if (preset === "tomorrow9") {
    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(9,0,0,0);
    ts = d.getTime();
  }
  else if (preset === "tomorrow18") {
    const d = new Date(); d.setDate(d.getDate()+1); d.setHours(18,0,0,0);
    ts = d.getTime();
  }
  state.reminderAt = ts;
  haptic(8);
  render();
}

/* ─── Hero helpers (#1) ─── */
function heroGreet() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return "Buongiorno";
  if (h >= 12 && h < 18) return "Buon pomeriggio";
  if (h >= 18 && h < 23) return "Buonasera";
  return "Buonanotte";
}
function heroDate() {
  const d = new Date();
  return d.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
}
/* "Today" relevance: tasks with reminder today, plus active inbox items */
function computeTodayProgress(tasks) {
  const todayStart = startOfDay(Date.now());
  const tomorrowStart = todayStart + 86400000;
  const todayRelevant = tasks.filter(t => {
    const r = t.reminderAt;
    if (r && r >= todayStart && r < tomorrowStart) return true;
    if (!r && !t.done) return true;
    return false;
  });
  const done = todayRelevant.filter(t => t.done).length;
  const total = todayRelevant.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  return { done, total, pct };
}

/* ─── Mascot mood (#3) ─── */
function mascotMood() {
  if (state.listening) return "🎤";
  const total = state.tasks.length;
  if (total === 0) return "💤";
  const active = state.tasks.filter(t => !t.done).length;
  if (active === 0) return "🎉";
  const overdue = state.tasks.filter(t => !t.done && t.reminderAt && getReminderStatus(t.reminderAt) === "overdue").length;
  if (overdue > 0) return "⚠️";
  const { pct } = computeTodayProgress(state.tasks);
  if (pct >= 66) return "🌟";
  return "🎵";
}
function mascotMoodTitle() {
  const m = mascotMood();
  return {
    "🎤": "In ascolto...",
    "💤": "Lista vuota, riposati!",
    "🎉": "Tutto fatto~",
    "⚠️": "Qualcosa è in ritardo!",
    "🌟": "Buon ritmo!",
    "🎵": "Al lavoro~",
  }[m] || "";
}

function speakTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  if (!window.speechSynthesis) { showBubble("Il tuo browser non supporta la voce 😢"); return; }
  // Force TTS on temporarily if user pressed speak-button
  const wasEnabled = TTS.enabled;
  TTS.enabled = true;
  const text = t.text + (t.note ? ". " + t.note : "");
  TTS.speak(text);
  TTS.enabled = wasEnabled;
}

/* ─── Render ─── */
function render() {
  const s = state;
  const filtered = s.tasks.filter(t => {
    if (s.filter!=="all" && t.category!==s.filter) return false;
    if (!s.showDone && t.done) return false;
    return true;
  });
  // Split into visual sections (#2): due-now / upcoming / inbox / done
  const dueNow   = filtered.filter(t => !t.done && t.reminderAt && getReminderStatus(t.reminderAt) !== "future");
  const upcoming = filtered.filter(t => !t.done && t.reminderAt && getReminderStatus(t.reminderAt) === "future");
  const inbox    = filtered.filter(t => !t.done && !t.reminderAt);
  const doneList = filtered.filter(t => t.done);
  dueNow.sort((a,b)   => a.reminderAt - b.reminderAt);
  upcoming.sort((a,b) => a.reminderAt - b.reminderAt);
  const active = s.tasks.filter(t=>!t.done).length;
  const done   = s.tasks.filter(t=>t.done).length;

  const catOf = id => CATS.find(c=>c.id===id)||CATS[0];

  const renderCard = t => {
      const c = catOf(t.category);
      const isExp = s.expanded===t.id;
      const isEdit = s.editNote===t.id;

      let expandHTML = "";
      if (isExp) {
        const dateStr = new Date(t.ts).toLocaleDateString("it-IT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
        let noteHTML;
        if (isEdit) {
          noteHTML = `<div>
            <textarea class="note-area" rows="3" placeholder="Aggiungi dettagli..." id="noteArea">${esc(s.noteVal)}</textarea>
            <div class="note-actions">
              <button class="note-cancel" onclick="state.editNote=null;render()">Annulla</button>
              <button class="note-save" onclick="saveNote('${t.id}')">Salva ♪</button>
            </div>
          </div>`;
        } else {
          noteHTML = `<div class="note-box" onclick="state.editNote='${t.id}';state.noteVal='${esc(t.note||"")}';render();setTimeout(()=>document.getElementById('noteArea')?.focus(),50)">
            <p class="${t.note?"text":"placeholder"}">${t.note ? esc(t.note) : `${ICONS.edit} Aggiungi dettagli...`}</p>
          </div>`;
        }
        expandHTML = `<div class="expand-area">
          <div class="meta">
            <span class="meta-cat">${c.emoji} ${c.label}</span>
            <span class="meta-date">${dateStr}</span>
          </div>
          ${state.editText === t.id ? `
            <div style="display:flex;gap:6px;margin-bottom:10px">
              <input type="text" class="task-edit-input" id="taskEditInput" value="${esc(state.editTextVal)}"
                oninput="state.editTextVal=this.value"
                onkeydown="if(event.key==='Enter')saveTaskText('${t.id}');if(event.key==='Escape'){state.editText=null;render();}">
              <button class="note-cancel" onclick="state.editText=null;render()">Annulla</button>
              <button class="note-save" onclick="saveTaskText('${t.id}')">Salva</button>
            </div>
          ` : `
            <button class="edit-text-link" onclick="state.editText='${t.id}';state.editTextVal='${esc(t.text)}';render();setTimeout(()=>{const i=document.getElementById('taskEditInput');if(i){i.focus();i.select();}},50)">
              ✏️ Modifica testo
            </button>
          `}
          ${noteHTML}
        </div>`;
      }

      const rStatus = getReminderStatus(t.reminderAt);
      const extraClass = !t.done && rStatus === "overdue" ? "overdue" : (!t.done && rStatus === "today" ? "today" : "");
      const celebClass = s.celebratingId === t.id ? "celebrate" : "";
      return `<div class="task-card ${t.done?"done":""} ${extraClass} ${celebClass}" data-task-id="${t.id}">
        <div class="task-main">
          <button class="check-btn ${t.done?"checked":""}" onclick="toggleDone('${t.id}')">${t.done?ICONS.check:""}</button>
          <div class="task-text ${t.done?"done-text":""}" onclick="state.expanded=state.expanded==='${t.id}'?null:'${t.id}';render()">
            ${c.emoji} ${esc(t.text)} ${t.note&&!isExp?"📝":""}${t.reminderAt && !t.done ? `<span class="reminder-chip ${getReminderStatus(t.reminderAt)}">⏰ ${formatReminder(t.reminderAt)}</span>` : ""}
          </div>
          <button class="speak-btn icon-btn" onclick="event.stopPropagation();speakTask('${t.id}')" title="Leggi ad alta voce">${ICONS.speaker}</button>
          <button class="icon-btn" onclick="state.expanded=state.expanded==='${t.id}'?null:'${t.id}';render()">
            <span style="display:inline-block;transition:transform .2s;transform:rotate(${isExp?90:0}deg)">${ICONS.chevron}</span>
          </button>
          <button class="icon-btn del" onclick="deleteTask('${t.id}')">${ICONS.x}</button>
        </div>
        ${expandHTML}
      </div>`;
  };

  let tasksHTML = "";
  if (filtered.length === 0) {
    tasksHTML = `<div class="empty-state">
      <div class="bread-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

          <ellipse cx="32" cy="40" rx="24" ry="16" fill="#e8a55a"/>

          <ellipse cx="32" cy="32" rx="20" ry="10" fill="#ffd08a"/>
          <!-- score lines on top -->
          <path d="M20 30 Q22 26 24 30" stroke="#c27a28" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M30 28 Q32 24 34 28" stroke="#c27a28" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M40 30 Q42 26 44 30" stroke="#c27a28" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- cute face -->
          <circle cx="26" cy="40" r="1.5" fill="#4a2a15"/>
          <circle cx="38" cy="40" r="1.5" fill="#4a2a15"/>
          <path d="M29 44 Q32 46 35 44" stroke="#4a2a15" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <!-- blush -->

        </svg>
      </div>
      <p>${s.tasks.length===0 ? "Premi il microfono e parla~!" : "Nessun risultato qui"}</p>

      tasksHTML += `<div class="section-label">⏰ Da fare ora <span class="count">${dueNow.length}</span></div>`;
      tasksHTML += dueNow.map(renderCard).join("");
    }
    if (upcoming.length > 0) {
      tasksHTML += `<div class="section-label">📅 In arrivo <span class="count">${upcoming.length}</span></div>`;
      tasksHTML += upcoming.map(renderCard).join("");

    if (inbox.length > 0) {
      tasksHTML += `<div class="section-label">📋 Da fare <span class="count">${inbox.length}</span></div>`;
      tasksHTML += inbox.map(renderCard).join("");
    }
    if (doneList.length > 0) {
      tasksHTML += `<div class="section-label done-label">✓ Completate <span class="count">${doneList.length}</span></div>`;
      tasksHTML += doneList.map(renderCard).join("");

  }

  const subText = active===0 && s.tasks.length>0 ? "Tutto fatto~!" : `${active} da fare` + (done>0 ? ` · ${done} fatt${done===1?"a":"e"}` : "");

  // Hero card data (#1)
  const progress = computeTodayProgress(s.tasks);

        </div>
      </div>
    </div>

    <div class="hero-card">
      <div class="hero-text">

          <span class="hero-stat">${progress.total > 0 ? `✓ ${progress.done}/${progress.total} oggi` : "💤 Niente per oggi"}</span>
          ${done > 0 ? `<span class="hero-stat fire">🔥 ${done} completat${done===1?"a":"e"}</span>` : ""}
        </div>
      </div>
      <div class="hero-ring" aria-label="Progresso di oggi: ${progress.pct}%">
        <svg viewBox="0 0 66 66" width="66" height="66">
          <circle class="track" cx="33" cy="33" r="27"/>
          <circle class="fill"  cx="33" cy="33" r="27"
                  stroke-dasharray="${ringCirc}"
                  stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="hero-ring-center">
          <div class="hero-ring-pct">${progress.pct}%</div>
          <div class="hero-ring-label">oggi</div>
        </div>
      </div>
    </div>

    <div class="bubble">${esc(s.bubble)}</div>

    ${s.showSettings ? `<div class="settings-panel">
      <div class="settings-section-title">🎤 Voce di Teto</div>
      <div class="voice-controls">
        ${TTS.availableVoices.length > 0 ? `
          <label class="voice-field">
            <span class="voice-label">Voce</span>
            <select class="voice-select" onchange="TTS.setVoice(this.value);render()">
              ${TTS.availableVoices.map(v => `<option value="${esc(v.name)}" ${v.name===TTS.voice?.name?'selected':''}>${esc(v.name)} ${v.lang.startsWith('it')?'🇮🇹':'('+v.lang+')'}</option>`).join("")}

          <span class="slider-ends">grave ↔ acuto</span>
        </label>
        <label class="voice-field">
          <span class="voice-label">Velocità <span class="voice-value">${TTS.settings.rate.toFixed(2)}x</span></span>
          <input type="range" min="0.5" max="2" step="0.05" value="${TTS.settings.rate}"
            oninput="TTS.setSetting('rate', parseFloat(this.value));render()">
          <span class="slider-ends">lenta ↔ veloce</span>
        </label>
        <label class="voice-field">
          <span class="voice-label">Volume <span class="voice-value">${Math.round(TTS.settings.volume*100)}%</span></span>
          <input type="range" min="0" max="1" step="0.05" value="${TTS.settings.volume}"
            oninput="TTS.setSetting('volume', parseFloat(this.value));render()">
        </label>
        <div class="voice-actions">
          <button class="voice-preview-btn" onclick="TTS.preview()">▶ Prova voce</button>
          <button class="voice-teto-btn" onclick="TTS.applyTetoPreset();render();TTS.preview()" title="Valori calibrati sull'audio reale di Teto">🍞 Teto</button>
          <button class="voice-reset-btn" onclick="TTS.resetDefaults();render();showBubble('Voce ripristinata~ ♪')">↺</button>
        </div>
        <div class="voice-note">
          💡 La voce del browser è umana e non può replicare il timbro Vocaloid.
          Per avvicinarti, prova voci italiane femminili di Google TTS Neural.
        </div>
      </div>

      <div class="settings-section-title" style="margin-top:14px">🧠 Memoria di Teto</div>
      <div class="settings-row">
        <div>
          <div class="settings-label">${Object.keys(s.preferences).length > 0 ? `${Object.keys(s.preferences).length} ricord${Object.keys(s.preferences).length===1?"o":"i"} su di te` : "Nessun ricordo ancora"}</div>
          <div class="settings-hint">Dimmi "ricordati che..." e Teto userà quello che sa per personalizzare le risposte</div>
        </div>
        <button class="reminder-clear" onclick="state.showMemoryPanel=!state.showMemoryPanel;render()">${s.showMemoryPanel ? "Chiudi" : "Mostra"}</button>
      </div>
      ${s.showMemoryPanel ? `<div class="memory-panel">
        ${Prefs.list().length === 0
          ? `<div class="memory-empty">Insegnami qualcosa! Esempi:<br>• "ricordati che mi piace il caffè amaro"<br>• "ricordati che lavoro come sviluppatore"<br>• "ricordati che il martedì vado in palestra"</div>`
          : Prefs.list().map(p => `<div class="memory-item">
              <span class="memory-text">${esc(p.value)}</span>
              <button class="memory-del" onclick="Prefs.remove('${esc(p.key)}');render()" title="Dimentica">×</button>
            </div>`).join("")
        }
        ${Prefs.list().length > 0 ? `<button class="reminder-clear" style="width:100%;margin-top:8px" onclick="Modal.confirm('Cancellare tutti i ricordi?',{title:'Svuota memoria',danger:true,okLabel:'Svuota'}).then(ok=>{if(ok){Prefs.clear();render()}})">🗑️ Svuota memoria</button>` : ""}
      </div>` : ""}

      <div class="settings-section-title" style="margin-top:14px">⚙️ Altro</div>
      <div class="settings-row">
        <div>
          <div class="settings-label">📍 Casa ${Prefs.get("location_home") ? "(salvata)" : "(non salvata)"}</div>
          <div class="settings-hint">${Geofence.load().length > 0 ? `${Geofence.load().length} promemoria geofence attiv${Geofence.load().length===1?"o":"i"}` : "Salva la posizione per ricordarti cose quando esci/torni"}</div>
        </div>
        <button class="reminder-clear primary" onclick="Geofence.saveHome().then(()=>{Geofence.start();showBubble('Casa salvata! 🏠');render()}).catch(()=>showBubble('Permetti l\\'accesso alla posizione~'))">Salva</button>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">Modalità Focus 🌙</div>
          <div class="settings-hint">Schermo minimale: orologio, prossimo reminder, microfono</div>
        </div>
        <button class="reminder-clear primary" onclick="state.showSettings=false;Focus.enter();Focus.startTicker()">Attiva</button>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">Briefing del mattino ☀️</div>
          <div class="settings-hint">Riepilogo giornata al primo accesso del giorno (5-12)</div>
        </div>
        <button class="reminder-clear" onclick="Briefing.show(true)">Prova</button>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">Tema</div>
          <div class="settings-hint">Chiaro, scuro, o come il sistema</div>
        </div>
        <div class="theme-selector">
          <button class="theme-opt ${Theme.mode==='light'?'on':''}" onclick="Theme.set('light');render()">☀️</button>
          <button class="theme-opt ${Theme.mode==='auto'?'on':''}" onclick="Theme.set('auto');render()">Auto</button>
          <button class="theme-opt ${Theme.mode==='dark'?'on':''}" onclick="Theme.set('dark');render()">🌙</button>
        </div>
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">${Account.isAnonymous ? "☁️ Sincronizza tra dispositivi" : `☁️ Collegato: ${esc(Account.displayName || Account.email || "account")}`}</div>
          <div class="settings-hint">${Account.isAnonymous ? "Accedi con Google per vedere le stesse liste e task su PC e telefono" : "I tuoi dati sono sincronizzati"}</div>

        ${Account.isAnonymous

      </div>
      <div class="settings-row">

      ${CATS.map(c=>`<button class="filter-btn ${s.filter===c.id?"on":""}" onclick="state.filter='${c.id}';render()">${c.emoji}</button>`).join("")}
      <div style="flex:1"></div>
      ${done>0?`<button class="filter-btn" style="font-size:.72rem;padding:4px 10px" onclick="state.showDone=!state.showDone;render()">${s.showDone?"Nascondi ✓":"Mostra ✓"}</button>`:""}
    </div>

    <div class="task-list">${tasksHTML}</div>

    ${s.undoTask ? `<div class="undo-snack">
      <span>🍞 ${esc(s.undoTask.text.slice(0,40))}${s.undoTask.text.length>40?'…':''} eliminato</span>
      <button onclick="undoDelete()">Annulla</button>
    </div>` : ""}

    ${Calendar.open_ ? renderCalendar() : ""}
    ${Lists.open_ ? renderLists() : ""}
    ${s.showHelp ? renderHelp() : ""}
    ${s.planSuggestion ? renderPlanModal(s.planSuggestion) : ""}
    ${s.focusMode ? renderFocusMode() : ""}

    <p class="footer">♪ TetoTask · made with 🍞 & ❤️ ♪</p>
  `;

  // Restore cursor in note textarea
  if (s.editNote) {
    const ta = document.getElementById("noteArea");
    if (ta) { ta.oninput = e => { state.noteVal = e.target.value; }; }
  }

  // Disable re-animation of panels on subsequent renders.
  // First time a panel is open (just after .open()), the animation plays.
  // On every re-render while still open, we mark it .no-animate so navigation
  // inside it doesn't re-trigger the slide-in effect.
  if (Calendar.open_) {
    const p = document.querySelector(".cal-panel");
    if (p && Calendar._animated) p.classList.add("no-animate");
    Calendar._animated = true;
  } else {
    Calendar._animated = false;
  }
  if (Lists.open_) {
    const p = document.querySelector(".cal-panel");
    if (p && Lists._animated) p.classList.add("no-animate");
    Lists._animated = true;
  } else {
    Lists._animated = false;
  }
  // Cal form: separate tracker
  if (Calendar.showForm) {
    const f = document.querySelector(".cal-form");
    if (f && Calendar._formAnimated) f.classList.add("no-animate");
    Calendar._formAnimated = true;
  } else {
    Calendar._formAnimated = false;
  }
  // Help panel: disable re-animation
  if (state.showHelp) {
    const p = document.querySelector(".help-panel");
    if (p && state._helpAnimated) p.classList.add("no-animate");
    state._helpAnimated = true;
  } else {
    state._helpAnimated = false;
  }
  // N1: swipe gesture on the calendar grid for month navigation
  setupCalendarSwipe();
}

function setupCalendarSwipe() {
  const grid = document.getElementById("cal-grid-swipe");
  if (!grid || grid._swipeBound) return;
  grid._swipeBound = true;
  let startX = null, startY = null;
  grid.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  grid.addEventListener("touchend", (e) => {
    if (startX == null) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    startX = startY = null;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;  // mostly horizontal, min 50px
    if (dx < 0) Calendar.next(); else Calendar.prev();
    renderCalendarOnly();
  }, { passive: true });
}

/**
 * Partial re-renders: update only the calendar or lists overlay instead
 * of rebuilding the entire #app innerHTML. This fixes the "click on day
 * reloads the whole calendar" bug — the overlay now updates in place,
 * keeping scroll position and avoiding a visual flash.
 */
function renderCalendarOnly() {
  if (!Calendar.open_) { render(); return; }
  // F2: if the form is open, only update parts that don't include it,
  // so input focus and caret position are preserved.
  if (Calendar.showForm) {
    const existingForm = document.querySelector(".cal-form-overlay");
    if (existingForm) return;   // form is mounted, leave it untouched
  }
  const existing = document.querySelector(".cal-overlay");
  if (!existing) { render(); return; }
  const wrapper = document.createElement("div");
  wrapper.innerHTML = renderCalendar();
  const fresh = wrapper.firstElementChild;
  if (fresh) {
    existing.replaceWith(fresh);
    setupCalendarSwipe();
  }
  else render();
}
function renderListsOnly() {
  if (!Lists.open_) { render(); return; }
  // Find the lists overlay: it shares the .cal-overlay class but is uniquely identified
  // by the "Liste" close handler. Find by querying the panel content marker.
  const allOverlays = document.querySelectorAll(".cal-overlay");
  let existing = null;
  for (const ov of allOverlays) {
    // Heuristic: lists overlay has the "Liste" back button OR the lists grid OR the lists title
    if (ov.querySelector(".lists-back, .lists-grid, .lists-title-row")) { existing = ov; break; }
  }
  if (!existing) { render(); return; }

  // F-B: preserve focus state of inputs that survive the re-render
  const focusedEl = document.activeElement;
  const wasFocusedAddInput = focusedEl && focusedEl.id === "listAddInput";
  const wasFocusedSearch   = focusedEl && focusedEl.classList.contains("list-search");
  const wasFocusedEdit     = focusedEl && focusedEl.classList.contains("list-item-edit-input");
  const focusedEditId      = wasFocusedEdit ? focusedEl.id : null;
  const carryValue         = wasFocusedAddInput ? focusedEl.value : null;
  const carryCaretStart    = focusedEl?.selectionStart ?? null;
  const carryCaretEnd      = focusedEl?.selectionEnd ?? null;
  const scrollTop          = existing.querySelector(".cal-panel")?.scrollTop || 0;

  const wrapper = document.createElement("div");
  wrapper.innerHTML = renderLists();
  const fresh = wrapper.firstElementChild;
  if (!fresh) { render(); return; }
  existing.replaceWith(fresh);

  // Restore scroll
  const newPanel = fresh.querySelector(".cal-panel");
  if (newPanel) newPanel.scrollTop = scrollTop;

  // Restore focus + value + caret
  if (wasFocusedAddInput) {
    const input = fresh.querySelector("#listAddInput");
    if (input) {
      if (carryValue !== null) input.value = carryValue;
      input.focus();
      try { input.setSelectionRange(carryCaretStart ?? input.value.length, carryCaretEnd ?? input.value.length); } catch(e) {}
    }
  } else if (wasFocusedSearch) {
    const input = fresh.querySelector(".list-search");
    if (input) {
      input.focus();
      try { input.setSelectionRange(carryCaretStart ?? input.value.length, carryCaretEnd ?? input.value.length); } catch(e) {}
    }
  } else if (wasFocusedEdit && focusedEditId) {
    const input = fresh.querySelector("#" + focusedEditId);
    if (input) {
      input.focus();
      try { input.setSelectionRange(carryCaretStart ?? input.value.length, carryCaretEnd ?? input.value.length); } catch(e) {}
    }
  }
}

function renderCalendar() {
  const c = Calendar;
  const holidays = getItalianHolidays(c.year);
  const cells = [];

  // Build month grid (only used in month view)
  const firstDay = new Date(c.year, c.month, 1).getDay(); // 0=Sun
  const offset = (firstDay + 6) % 7; // Italian week: Mon=0
  const daysInMonth = new Date(c.year, c.month+1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  if (c.view === "month") {
    for (let i = 0; i < offset; i++) cells.push(`<div class="cal-cell cal-empty"></div>`);
    for (let d = 1; d <= daysInMonth; d++) {
      const k = dateKey(c.year, c.month, d);
      const dow = new Date(c.year, c.month, d).getDay();
      const isWeekend = (dow === 0 || dow === 6);
      const isToday = (k === todayKey);
      const isSelected = (k === c.selectedDate);
      const isHoliday = !!holidays[k];
      const dayEvts = c.eventsOnDay(k);
      const hasEvents = dayEvts.length > 0;
      const hasTaskRem = state.tasks.some(t => t.reminderAt && !t.done &&
        dateKey(new Date(t.reminderAt).getFullYear(), new Date(t.reminderAt).getMonth(), new Date(t.reminderAt).getDate()) === k);
      // U4: pick up to 2 distinct category colors as small bars on the cell
      const cats = [...new Set(dayEvts.map(e => e.category || "personal"))].slice(0, 2);
      const classes = ["cal-cell"];
      if (isWeekend) classes.push("weekend");
      if (isToday) classes.push("today");
      if (isSelected) classes.push("selected");
      if (isHoliday) classes.push("holiday");
      const catBars = cats.map(cid => {
        const cat = EVENT_CAT_BY_ID[cid] || EVENT_CAT_BY_ID.personal;
        return `<span class="cal-cat-bar" style="background:${cat.color}"></span>`;
      }).join("");
      cells.push(`<div class="${classes.join(' ')}" onclick="Calendar.selectDay('${k}');renderCalendarOnly()">
        <div class="cal-cell-num">${d}</div>
        ${catBars ? `<div class="cal-cat-bars">${catBars}</div>` : ""}
        <div class="cal-dots">
          ${hasEvents ? '<span class="cal-dot event"></span>' : ''}
          ${hasTaskRem ? '<span class="cal-dot task"></span>' : ''}
          ${isHoliday ? '<span class="cal-dot holiday"></span>' : ''}
        </div>
      </div>`);
    }
  }

  const selEvents = c.selectedDate ? c.eventsOnDay(c.selectedDate) : [];
  const selHoliday = holidays[c.selectedDate];
  const selTasks = state.tasks.filter(t => t.reminderAt && !t.done &&
    dateKey(new Date(t.reminderAt).getFullYear(), new Date(t.reminderAt).getMonth(), new Date(t.reminderAt).getDate()) === c.selectedDate);

  const [sy, sm, sd] = (c.selectedDate || "").split("-").map(Number);
  const selDate = c.selectedDate ? new Date(sy, sm-1, sd) : null;
  const selLabel = selDate ? selDate.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"}) : "";

  const hourOpts = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'))
    .map(h=>`<option value="${h}" ${h===c.formHour?'selected':''}>${h}</option>`).join("");
  const minOpts  = ["00","05","10","15","20","25","30","35","40","45","50","55"]
    .map(m=>`<option value="${m}" ${m===c.formMin?'selected':''}>${m}</option>`).join("");

  const renderEventItem = (ev, showDate = false) => {
    const cat = EVENT_CAT_BY_ID[ev.category] || EVENT_CAT_BY_ID.personal;
    const recurLabel = ev.recurrence && ev.recurrence !== "none" ? `<span class="cal-event-recur">↻ ${({daily:"ogni giorno",weekly:"sett.",monthly:"mens.",yearly:"ann."})[ev.recurrence]}</span>` : "";
    const reminderLabel = (ev.reminderOffset != null) ? `<span class="cal-event-reminder">🔔</span>` : "";
    const timeLabel = ev.allDay ? '<span class="cal-event-time allday">tutto il giorno</span>' :
                      ev.time ? `<span class="cal-event-time" style="background:${cat.color}">${ev.time}</span>` : "";
    return `<div class="cal-event-item" style="border-left-color:${cat.color}">
      <div class="cal-event-main">
        ${timeLabel}
        <div class="cal-event-body">
          <div class="cal-event-title">${cat.icon} ${esc(ev.title)} ${recurLabel}${reminderLabel}</div>
          ${ev.note ? `<div class="cal-event-note">${esc(ev.note)}</div>` : ''}
          ${showDate ? `<div class="cal-event-date">${new Date(ev._originalDate||ev.date).toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"short"})}</div>` : ""}
        </div>
      </div>
      <div class="cal-event-actions">
        <button onclick="Calendar.openForm('${ev.id}');renderCalendarOnly()" title="Modifica">✏️</button>
        <button onclick="Modal.confirm('Eliminerai &quot;${esc(ev.title).replace(/'/g,'’').replace(/&/g,'&amp;')}&quot;.',{title:'Eliminare evento?',danger:true,okLabel:'Elimina'}).then(ok=>{if(ok)Calendar.deleteEvent('${ev.id}')})" title="Elimina">🗑</button>
      </div>
    </div>`;
  };

  const monthBody = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="Calendar.prev();renderCalendarOnly()">‹</button>
      <button class="cal-today-btn" onclick="Calendar.today();renderCalendarOnly()">Oggi</button>
      <button class="cal-nav-btn" onclick="Calendar.next();renderCalendarOnly()">›</button>
    </div>

    <div class="cal-grid" id="cal-grid-swipe">
      ${GIORNI_BREVI.map(g=>`<div class="cal-day-name">${g}</div>`).join("")}
      ${cells.join("")}
    </div>

    <div class="cal-legend">
      <span><span class="cal-dot event"></span> Evento</span>
      <span><span class="cal-dot task"></span> Task</span>
      <span><span class="cal-dot holiday"></span> Festa</span>
    </div>

    ${c.selectedDate ? `<div class="cal-day-detail">
      <div class="cal-day-header">
        <div class="cal-day-label">${selLabel}</div>
        ${selHoliday ? `<div class="cal-holiday-badge">🎊 ${esc(selHoliday)}</div>` : ''}
      </div>

      ${selTasks.length > 0 ? `<div class="cal-subsection">
        <div class="cal-subsection-title">📝 Task con reminder</div>
        ${selTasks.map(t => `<div class="cal-task-item">
          <span class="cal-task-time">${new Date(t.reminderAt).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})}</span>
          <span class="cal-task-text">${esc(t.text)}</span>
        </div>`).join("")}
      </div>` : ''}

      <div class="cal-subsection">
        <div class="cal-subsection-title">📆 Eventi</div>
        ${selEvents.length === 0 ? `<div class="cal-empty-msg">Nessun evento per questo giorno</div>` : ''}
        ${selEvents.map(ev => renderEventItem(ev)).join("")}
      </div>

      <button class="cal-add-btn" onclick="Calendar.openForm();renderCalendarOnly()">
        + Aggiungi evento
      </button>
    </div>` : ''}
  `;

  const agendaItems = c.agendaNextDays(60);
  const agendaBody = agendaItems.length === 0
    ? `<div class="cal-empty-msg" style="margin-top:16px">Nessun evento nei prossimi 60 giorni~ ♪</div>`
    : agendaItems.map(g => `<div class="cal-agenda-day">
        <div class="cal-agenda-date ${g.key === todayKey ? 'today' : ''}">
          <div class="cal-agenda-dow">${g.date.toLocaleDateString("it-IT",{weekday:"short"})}</div>
          <div class="cal-agenda-num">${g.date.getDate()}</div>
          <div class="cal-agenda-mon">${g.date.toLocaleDateString("it-IT",{month:"short"})}</div>
        </div>
        <div class="cal-agenda-events">
          ${g.events.map(ev => renderEventItem(ev, false)).join("")}
        </div>
      </div>`).join("");

  return `<div class="cal-overlay" onclick="if(event.target===this){Calendar.close();render()}">
    <div class="cal-panel">
      <div class="cal-header">
        <div>
          <div class="cal-title-small">📅 Calendario</div>
          <div class="cal-month-label">${c.view === "month" ? `${MESI_IT[c.month]} ${c.year}` : "Agenda"}</div>
        </div>
        <button class="cal-close" onclick="Calendar.close();render()">✕</button>
      </div>

      <div class="cal-view-tabs">
        <button class="cal-view-tab ${c.view==='month'?'on':''}" onclick="Calendar.view='month';renderCalendarOnly()">📅 Mese</button>
        <button class="cal-view-tab ${c.view==='agenda'?'on':''}" onclick="Calendar.view='agenda';renderCalendarOnly()">📋 Agenda</button>
      </div>

      ${c.view === "month" ? monthBody : agendaBody}

      ${c.showForm ? renderEventForm(hourOpts, minOpts) : ''}
    </div>
  </div>`;
}

/* Smart re-render of just the form (preserves focus on the title input) */
function renderEventFormOnly() {
  const existing = document.querySelector(".cal-form-overlay");
  if (!existing) { renderCalendarOnly(); return; }
  const focusedEl = document.activeElement;
  const focusedSel = focusedEl && focusedEl.matches(".cal-form-input") ? focusedEl : null;
  const caretStart = focusedSel ? focusedSel.selectionStart : null;
  const caretEnd = focusedSel ? focusedSel.selectionEnd : null;
  const placeholder = focusedSel ? focusedSel.getAttribute("placeholder") : null;

  const hourOpts = Array.from({length:24},(_,i)=>String(i).padStart(2,'0'))
    .map(h=>`<option value="${h}" ${h===Calendar.formHour?'selected':''}>${h}</option>`).join("");
  const minOpts  = ["00","05","10","15","20","25","30","35","40","45","50","55"]
    .map(m=>`<option value="${m}" ${m===Calendar.formMin?'selected':''}>${m}</option>`).join("");
  const wrapper = document.createElement("div");
  wrapper.innerHTML = renderEventForm(hourOpts, minOpts);
  const fresh = wrapper.firstElementChild;
  if (fresh) {
    existing.replaceWith(fresh);
    // Restore focus to the same input (matched by placeholder, which is unique within this form)
    if (placeholder) {
      const restore = fresh.querySelector(`.cal-form-input[placeholder="${placeholder}"]`);
      if (restore) {
        restore.focus();
        if (caretStart != null) try { restore.setSelectionRange(caretStart, caretEnd); } catch(e) {}
      }
    }
  }
}

function renderLists() {
  const L = Lists;
  // Header
  if (L.currentListId) {
    // List detail view
    const list = L.lists.find(x => x.id === L.currentListId);
    if (!list) return "";
    const cat = LIST_CAT_BY_ID[list.category] || LIST_CAT_BY_ID.general;
    const { pending, done: doneItems } = L.sortedItems(list.id);
    const total = pending.length + doneItems.length;
    const allChecked = list.checkable && total > 0 && doneItems.length === total;

    // U-6: search filter
    const q = (L.search || "").toLowerCase().trim();
    const filterFn = (it) => !q || it.text.toLowerCase().includes(q);
    const pendingShown = pending.filter(filterFn);
    const doneShown    = doneItems.filter(filterFn);

    const showSearch = total >= 6;     // show bar only when worth it

    const renderItem = (it, isDone, idx, total) => {
      const editing = L.editingItemId === it.id;
      if (editing) {
        return `<div class="list-item editing">
          <input class="list-item-edit-input" id="list-edit-${it.id}" type="text" value="${esc(it.text)}"
            onblur="if(this.value.trim()&&this.value.trim()!==${JSON.stringify(it.text).replace(/"/g,'&quot;')})Lists.updateItem('${list.id}','${it.id}',this.value);Lists.editingItemId=null;renderListsOnly()"
            onkeydown="if(event.key==='Enter'){this.blur()}else if(event.key==='Escape'){Lists.editingItemId=null;renderListsOnly()}">
        </div>`;
      }
      const checkBtn = list.checkable
        ? `<button class="check-btn ${isDone?'checked':''}" onclick="Lists.toggleItem('${list.id}','${it.id}',${isDone})">${isDone?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}</button>`
        : '<span class="list-bullet">•</span>';
      // U-2 reorder buttons (only on pending in unfiltered view)
      const reorderBtns = !isDone && !q && total > 1 ? `
        <button class="icon-btn move ${idx===0?'disabled':''}" ${idx===0?'disabled':''} onclick="Lists.moveItem('${list.id}','${it.id}','up')" title="Su">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
        </button>
        <button class="icon-btn move ${idx===total-1?'disabled':''}" ${idx===total-1?'disabled':''} onclick="Lists.moveItem('${list.id}','${it.id}','down')" title="Giù">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>` : "";
      return `<div class="list-item ${isDone?'done':''}" style="border-left-color:${cat.color}">
        ${checkBtn}
        <span class="list-item-text ${isDone?'done-text':''}" onclick="Lists.editingItemId='${it.id}';renderListsOnly()">${esc(it.text)}</span>
        ${reorderBtns}
        <button class="icon-btn dup" onclick="Lists.duplicateItem('${list.id}','${it.id}')" title="Duplica">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M4 16V6a2 2 0 0 1 2-2h10"/></svg>
        </button>

            </div>
          </button>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}

/* ─── Plan modal (#1) ─── */
function renderPlanModal(suggestion) {
  const items = suggestion.plan.map(item => {
    const time = `${String(item.hour).padStart(2,"0")}:${String(item.min).padStart(2,"0")}`;
    const tag  = item.kept ? '<span class="plan-tag kept">già pianificata</span>' : '<span class="plan-tag new">nuova</span>';
    return `<div class="plan-item">
      <div class="plan-time">${time}</div>
      <div class="plan-text">${esc(item.task.text)}</div>
      ${tag}
    </div>`;
  }).join("");
  const newCount = suggestion.plan.filter(p => !p.kept).length;
  return `<div class="modal-overlay" onclick="if(event.target===this){state.planSuggestion=null;render()}">
    <div class="plan-modal">
      <div class="plan-modal-header">
        <h2>📅 Pianificazione di oggi</h2>
        <button class="plan-close" onclick="state.planSuggestion=null;render()">×</button>
      </div>
      <div class="plan-modal-body">
        ${suggestion.events.length > 0 ? `<div class="plan-section-label">Già in calendario</div>
          ${suggestion.events.map(e => `<div class="plan-item event"><div class="plan-time">${String(e.hour).padStart(2,"0")}:${String(e.min).padStart(2,"0")}</div><div class="plan-text">📌 ${esc(e.title)}</div></div>`).join("")}` : ""}
        <div class="plan-section-label" style="margin-top:10px">Le tue task</div>
        ${items}
      </div>
      <div class="plan-modal-actions">
        <button class="reminder-clear" onclick="state.planSuggestion=null;render()">Annulla</button>
        ${newCount > 0
          ? `<button class="reminder-clear primary" onclick="Planner.apply(state.planSuggestion.plan)">Applica (${newCount} nuove)</button>`
          : `<button class="reminder-clear primary" onclick="state.planSuggestion=null;render()" disabled>Tutto già a posto</button>`
        }
      </div>
    </div>
  </div>`;
}

/* ─── Focus mode UI (#7) ─── */
function renderFocusMode() {
  const now = new Date();
  const clock = now.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
  const dateStr = now.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });

  // Find next reminder (active task with closest reminderAt in the future, or earliest overdue)
  const nowTs = Date.now();
  const reminders = state.tasks.filter(t => !t.done && t.reminderAt).sort((a,b) => a.reminderAt - b.reminderAt);
  const nextRem = reminders.find(t => t.reminderAt >= nowTs) || reminders[0];
  let nextHTML = '<div class="focus-empty">Nessun reminder in coda~ ♪</div>';
  if (nextRem) {
    const d = new Date(nextRem.reminderAt);
    const overdue = nextRem.reminderAt < nowTs;
    const timeStr = d.toLocaleString("it-IT", { weekday: "short", hour: "2-digit", minute: "2-digit" });
    nextHTML = `<div class="focus-next ${overdue?'overdue':''}">
      <div class="focus-next-label">${overdue?"⚠️ in ritardo":"prossimo"}</div>
      <div class="focus-next-text">${esc(nextRem.text)}</div>
      <div class="focus-next-time">${timeStr}</div>
    </div>`;
  }

  return `<div class="focus-overlay">
    <button class="focus-exit" onclick="Focus.exit()" title="Esci">×</button>
    <div class="focus-clock" id="focus-clock">${clock}</div>
    <div class="focus-date">${esc(dateStr)}</div>
    ${nextHTML}
    <button class="focus-mic ${state.listening?'listening':''}" onclick="toggleMic()" title="Tocca per parlare">
      ${ICONS.mic}
      ${state.listening?'<span class="focus-mic-pulse"></span>':''}
    </button>
    <div class="focus-bubble">${esc(state.bubble)}</div>
  </div>`;
}

/* ─── Init ─── */
// LOCAL persistence ensures the anonymous uid (and Google login) survives
// page refresh — without this, every reload creates a new anonymous user
// and loses all local-only data.
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => {});

// Complete redirect-based Google sign-in if we just came back from one.
// This must run before onAuthStateChanged fires for the result to be picked up.
Account.handleRedirectResult();

auth.onAuthStateChanged(user => {
  if (user) {
    Account.update(user);
    state.uid = user.uid;
    if (!state.ready) {
      state.ready = true;
      db.enablePersistence({ synchronizeTabs: true }).catch(() => {});
      listenToTasks();
      Lists.subscribe();
      Calendar.subscribe();       // F1: events available everywhere from boot
      Prefs.load();              // load preferences from localStorage
      Prefs.pull();               // sync from Firebase in background
      Geofence.start();           // resume any pending geofence triggers (#3)
      render();

      if (!localStorage.getItem("teto-seen-onboarding")) {
        setTimeout(() => {
          showBubble("Parlami! Puoi dirmi cose come: 'comprare pane', 'domani alle 15 dentista', 'crea lista film'~ ♪");
          localStorage.setItem("teto-seen-onboarding", "1");
        }, 1500);
      } else {
        // Show morning briefing if it's the first access of the day in the AM window
        setTimeout(() => Briefing.show(false), 2000);
      }

      if (state.proactiveEnabled) scheduleProactive();
      if (WAKE.enabled) WAKE.start();

      setTimeout(() => { checkDueReminders(); Calendar.checkReminders(); render(); }, 2500);
    }
  } else {
    // No user — sign in anonymously
    auth.signInAnonymously().catch(err => {
      console.error("Auth error:", err);
      document.getElementById("app").innerHTML = `
        <div style="padding:40px 20px;text-align:center">
          <p style="font-size:1.1rem;font-weight:700;color:#ff4271;margin-bottom:8px">⚠️ Configura Firebase</p>
          <p style="font-size:.85rem;color:#a295a7;line-height:1.5">
            Apri il file <code>index.html</code> e inserisci la tua configurazione Firebase
            nel blocco <code>FIREBASE_CONFIG</code> in cima allo script.
          </p>
        </div>`;
    });
  }
});
