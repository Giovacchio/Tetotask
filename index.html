/**
 * Parse Italian date/time expressions from a string.
 * Returns { timestamp: ms, matched: "string matched", cleaned: "text without date" }
 * or null if no date found.
 */
function parseDateTime(text) {
  const now = new Date();
  let ts = null;
  let matched = "";
  let cleaned = text;

  // Helper to build timestamp
  const buildDate = (daysAdd, hour, min) => {
    const d = new Date();
    d.setDate(d.getDate() + daysAdd);
    d.setHours(hour != null ? hour : 9, min || 0, 0, 0);
    return d.getTime();
  };

  // ─── SPECIAL WORDS: mezzogiorno / mezzanotte ───
  let hour = null, min = 0;
  if (/\bmezzogiorno\b/i.test(text)) {
    hour = 12; min = 0;
    const mm = text.match(/\bmezzogiorno\b/i);
    matched = mm[0];
    cleaned = cleaned.replace(mm[0], "").trim();
  } else if (/\bmezzanotte\b/i.test(text)) {
    hour = 0; min = 0;
    const mm = text.match(/\bmezzanotte\b/i);
    matched = mm[0];
    cleaned = cleaned.replace(mm[0], "").trim();
  }

  // ─── TIME: "alle X e mezza/mezzo" ───
  if (hour === null) {
    const halfMatch = text.match(/\balle?\s+(\d{1,2})\s+e\s+mezz[ao]\b/i);
    if (halfMatch) {
      hour = parseInt(halfMatch[1]); min = 30;
      matched = halfMatch[0];
      cleaned = cleaned.replace(halfMatch[0], "").trim();
    }
  }

  // ─── TIME: "alle X e un quarto" / "alle X e tre quarti" ───
  if (hour === null) {
    const quarterMatch = text.match(/\balle?\s+(\d{1,2})\s+e\s+un\s+quarto\b/i);
    if (quarterMatch) {
      hour = parseInt(quarterMatch[1]); min = 15;
      matched = quarterMatch[0];
      cleaned = cleaned.replace(quarterMatch[0], "").trim();
    }
  }
  if (hour === null) {
    const threeQMatch = text.match(/\balle?\s+(\d{1,2})\s+e\s+tre\s+quarti\b/i);
    if (threeQMatch) {
      hour = parseInt(threeQMatch[1]); min = 45;
      matched = threeQMatch[0];
      cleaned = cleaned.replace(threeQMatch[0], "").trim();
    }
  }

  // ─── TIME: "alle X meno un quarto" ───
  if (hour === null) {
    const lessQMatch = text.match(/\balle?\s+(\d{1,2})\s+meno\s+un\s+quarto\b/i);
    if (lessQMatch) {
      hour = parseInt(lessQMatch[1]) - 1; if (hour < 0) hour = 23;
      min = 45;
      matched = lessQMatch[0];
      cleaned = cleaned.replace(lessQMatch[0], "").trim();
    }
  }

  // ─── TIME: "alle X:MM" / "alle X e MM" / "alle X.MM" ───
  if (hour === null) {
    const timeMatch = text.match(/\balle?\s+(\d{1,2})(?:[:\.e\s]+(\d{1,2}))?\b(?!\s*(?:e\s+mezz|e\s+un\s+quarto|meno))/i);
    if (timeMatch) {
      hour = parseInt(timeMatch[1]);
      min = timeMatch[2] ? parseInt(timeMatch[2]) : 0;
      matched = timeMatch[0];
      cleaned = cleaned.replace(timeMatch[0], "").trim();
    }
  }

  // ─── TIME: word-number hours — "alle otto", "alle venti", "alle nove e mezza"
  if (hour === null) {
    const hourWords = {
      "una":1,"due":2,"tre":3,"quattro":4,"cinque":5,"sei":6,"sette":7,"otto":8,
      "nove":9,"dieci":10,"undici":11,"dodici":12,"tredici":13,"quattordici":14,
      "quindici":15,"sedici":16,"diciassette":17,"diciotto":18,"diciannove":19,
      "venti":20,"ventuno":21,"ventidue":22,"ventitre":23,
    };
    const wordList = Object.keys(hourWords).sort((a,b)=>b.length-a.length).join("|");
    // "alle otto e mezza" / "alle nove e un quarto" / "alle sette"
    let wordMatch = text.match(new RegExp(`\\balle?\\s+(${wordList})(?:\\s+e\\s+(mezz[ao]|un\\s+quarto|tre\\s+quarti|\\d{1,2}))?`, "i"));
    if (wordMatch) {
      hour = hourWords[wordMatch[1].toLowerCase()];
      if (wordMatch[2]) {
        const mod = wordMatch[2].toLowerCase();
        if (/^mezz/.test(mod)) min = 30;
        else if (/un\s+quarto/.test(mod)) min = 15;
        else if (/tre\s+quarti/.test(mod)) min = 45;
        else min = parseInt(mod);
      }
      matched = wordMatch[0];
      cleaned = cleaned.replace(wordMatch[0], "").trim();
    }
  }

  // ─── "alle X meno un quarto" with word numbers
  if (hour === null) {
    const hourWords = {"una":1,"due":2,"tre":3,"quattro":4,"cinque":5,"sei":6,"sette":7,"otto":8,"nove":9,"dieci":10,"undici":11,"dodici":12};
    const wordList = Object.keys(hourWords).sort((a,b)=>b.length-a.length).join("|");
    const lessQ = text.match(new RegExp(`\\balle?\\s+(${wordList})\\s+meno\\s+un\\s+quarto`, "i"));
    if (lessQ) {
      hour = hourWords[lessQ[1].toLowerCase()] - 1; if (hour < 0) hour = 23;
      min = 45;
      matched = lessQ[0];
      cleaned = cleaned.replace(lessQ[0], "").trim();
    }
  }

  // ─── TIME: "all'una" (exception for vowel elision) ───
  if (hour === null && /\ball'?una\b/i.test(text)) {
    hour = 13; min = 0;  // default to afternoon
    const mm = text.match(/\ball'?una\b/i);
    matched = mm[0];
    cleaned = cleaned.replace(mm[0], "").trim();
  }

  // ─── AM/PM CUES: "di mattina", "del pomeriggio", "di sera", "di notte" ───
  if (hour !== null) {
    if (/\b(?:del|di)\s+mattin[ao]\b/i.test(text)) {
      if (hour >= 1 && hour <= 11) { /* keep */ }
      const mm = text.match(/\b(?:del|di)\s+mattin[ao]\b/i);
      cleaned = cleaned.replace(mm[0], "").trim();
    } else if (/\b(?:del|di|al)\s+pomeriggio\b/i.test(text)) {
      if (hour >= 1 && hour <= 7) hour += 12;  // 3 del pomeriggio → 15
      const mm = text.match(/\b(?:del|di|al)\s+pomeriggio\b/i);
      cleaned = cleaned.replace(mm[0], "").trim();
    } else if (/\b(?:di|della)\s+sera\b/i.test(text)) {
      if (hour >= 1 && hour <= 11) hour += 12;  // 8 di sera → 20
      const mm = text.match(/\b(?:di|della)\s+sera\b/i);
      cleaned = cleaned.replace(mm[0], "").trim();
    } else if (/\b(?:di|della)\s+notte\b/i.test(text)) {
      if (hour >= 1 && hour <= 5) { /* keep as AM */ }
      const mm = text.match(/\b(?:di|della)\s+notte\b/i);
      cleaned = cleaned.replace(mm[0], "").trim();
    }
  }

  // Relative days
  const dayPatterns = [
    { rx: /\boggi\b/i,           days: 0 },
    { rx: /\bstasera\b/i,        days: 0, defaultHour: 20 },
    { rx: /\bstamattina\b/i,     days: 0, defaultHour: 9 },
    { rx: /\bstanotte\b/i,       days: 0, defaultHour: 23 },
    { rx: /\bquesta\s+notte\b/i, days: 0, defaultHour: 23 },
    { rx: /\bquesta\s+sera\b/i,  days: 0, defaultHour: 20 },
    { rx: /\bpomeriggio\b/i,     days: 0, defaultHour: 15 },
    { rx: /\bdomani\s+mattina\b/i, days: 1, defaultHour: 9 },
    { rx: /\bdomani\s+sera\b/i,    days: 1, defaultHour: 20 },
    { rx: /\bdomani\s+pomeriggio\b/i, days: 1, defaultHour: 15 },
    { rx: /\bdomani\s+notte\b/i, days: 1, defaultHour: 23 },
    { rx: /\bdomani\b/i,         days: 1 },
    { rx: /\bdopodomani\b/i,     days: 2 },
    { rx: /\b(?:tra|fra|in)\s+(\d+)\s+giorn[io]\b/i, days: "N" },
    { rx: /\b(?:tra|fra|in)\s+(\d+)\s+or[ae]\b/i, hoursAdd: "N" },
    { rx: /\b(?:tra|fra|in)\s+(\d+)\s+minut[oi]\b/i, minAdd: "N" },
    { rx: /\b(?:tra|fra)\s+mezz'?\s*ora\b/i, minAdd: 30 },
    { rx: /\b(?:tra|fra)\s+un'?\s*ora\b/i, hoursAdd: 1 },
    { rx: /\b(?:tra|fra)\s+due\s+or[ae]\b/i, hoursAdd: 2 },
    { rx: /\b(?:tra|fra)\s+un\s+minuto\b/i, minAdd: 1 },
    { rx: /\b(?:tra|fra)\s+poco\b/i, minAdd: 30 },
    { rx: /\b(?:la\s+)?prossima\s+settimana\b/i, days: 7 },
    { rx: /\btra\s+una\s+settimana\b/i, days: 7 },
    // Weekend / fine settimana → next Saturday
    { rx: /\b(?:nel\s+)?(?:weekend|week\s*end|fine\s+settimana|weekend)\b/i, weekend: true },
    { rx: /\ba\s+fine\s+settimana\b/i, weekend: true },
    // Inizio/fine mese
    { rx: /\b(?:il\s+)?primo\s+del\s+mese\b/i, firstOfMonth: true, defaultHour: 9 },
    { rx: /\ba\s+fine\s+mese\b/i, lastOfMonth: true, defaultHour: 9 },
    { rx: /\ba\s+inizio\s+mese\b/i, firstOfMonth: true, defaultHour: 9 },
  ];
  for (const p of dayPatterns) {
    const m = text.match(p.rx);
    if (m) {
      if (p.hoursAdd === "N") {
        ts = Date.now() + parseInt(m[1]) * 3600 * 1000;
      } else if (typeof p.hoursAdd === "number") {
        ts = Date.now() + p.hoursAdd * 3600 * 1000;
      } else if (p.minAdd === "N") {
        ts = Date.now() + parseInt(m[1]) * 60 * 1000;
      } else if (typeof p.minAdd === "number") {
        ts = Date.now() + p.minAdd * 60 * 1000;
      } else if (p.weekend) {
        // Next Saturday (or Sunday if today is Saturday)
        const currentDay = now.getDay();  // 0=Sun, 6=Sat
        let daysAhead = (6 - currentDay + 7) % 7;
        if (daysAhead === 0) daysAhead = 6;  // Today Sat → next Sat
        ts = buildDate(daysAhead, hour !== null ? hour : (p.defaultHour || 19), min);
      } else if (p.firstOfMonth) {
        const d = new Date(now.getFullYear(), now.getMonth(), 1, hour !== null ? hour : (p.defaultHour || 9), min, 0, 0);
        if (d.getTime() < now.getTime()) d.setMonth(d.getMonth() + 1);
        ts = d.getTime();
      } else if (p.lastOfMonth) {
        const d = new Date(now.getFullYear(), now.getMonth() + 1, 0, hour !== null ? hour : (p.defaultHour || 9), min, 0, 0);
        if (d.getTime() < now.getTime()) d = new Date(now.getFullYear(), now.getMonth() + 2, 0, hour !== null ? hour : 9, min, 0, 0);
        ts = d.getTime();
      } else {
        const days = p.days === "N" ? parseInt(m[1]) : p.days;
        ts = buildDate(days, hour !== null ? hour : p.defaultHour, min);
      }
      matched = matched ? matched + " " + m[0] : m[0];
      cleaned = cleaned.replace(m[0], "").trim();
      break;
    }
  }

  // Day names (lunedì, martedì, ...)
  // Use space/punct boundaries instead of \b because \b doesn't work around
  // non-ASCII chars like ì — regex /\bvenerdì\b/ would fail in Italian.
  if (!ts) {
    const dayNames = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"];
    const shortNames = ["domenica","lunedi","martedi","mercoledi","giovedi","venerdi","sabato"];
    const padded = " " + text.toLowerCase() + " ";
    for (let i = 0; i < 7; i++) {
      const rx = new RegExp(`(?:^|[\\s,.!?])(?:(?:il|di|questo|prossimo)\\s+)?(${dayNames[i]}|${shortNames[i]})(?=[\\s,.!?]|$)`, "i");
      const m = padded.match(rx);
      if (m) {
        const currentDay = now.getDay();
        let daysAhead = (i - currentDay + 7) % 7;
        if (daysAhead === 0) daysAhead = 7;
        ts = buildDate(daysAhead, hour !== null ? hour : 9, min);
        const captured = m[1];
        matched = matched ? matched + " " + captured : captured;
        // Remove only the day-name token from the cleaned text (preserve prefixes)
        cleaned = cleaned.replace(new RegExp(captured, "i"), "").trim();
        break;
      }
    }
  }

  // Explicit date: "22 dicembre", "il 22 dicembre", "22 dicembre 2026",
  //                "dicembre 22", "22/12", "22-12", "22/12/2026"
  if (!ts) {
    const months = {
      gennaio:0, gen:0,
      febbraio:1, feb:1,
      marzo:2, mar:2,
      aprile:3, apr:3,
      maggio:4, mag:4,
      giugno:5, giu:5,
      luglio:6, lug:6,
      agosto:7, ago:7,
      settembre:8, set:8, sett:8,
      ottobre:9, ott:9,
      novembre:10, nov:10,
      dicembre:11, dic:11,
    };
    const monthNames = Object.keys(months).join("|");

    // "22 dicembre" or "il 22 dicembre" or "22 dicembre 2026"
    let dm;
    let rx1 = new RegExp(`\\b(?:il\\s+|l'\\s*)?(\\d{1,2})\\s+(${monthNames})(?:\\s+(\\d{4}))?\\b`, "i");
    if ((dm = text.match(rx1))) {
      const day = parseInt(dm[1]);
      const monthIdx = months[dm[2].toLowerCase()];
      const year = dm[3] ? parseInt(dm[3]) : now.getFullYear();
      if (day >= 1 && day <= 31) {
        const d = new Date(year, monthIdx, day, hour !== null ? hour : 9, min || 0, 0, 0);
        // If year not specified and the date is in the past, roll to next year
        if (!dm[3] && d.getTime() < now.getTime() - 12*3600*1000) {
          d.setFullYear(year + 1);
        }
        ts = d.getTime();
        matched = matched ? matched + " " + dm[0] : dm[0];
        cleaned = cleaned.replace(dm[0], "").trim();
      }
    }
    // Numeric "22/12" or "22-12" or "22/12/2026"
    if (!ts) {
      let rx2 = /\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/;
      if ((dm = text.match(rx2))) {
        const day = parseInt(dm[1]);
        const monthIdx = parseInt(dm[2]) - 1;
        let year = dm[3] ? parseInt(dm[3]) : now.getFullYear();
        if (year < 100) year += 2000;
        if (day >= 1 && day <= 31 && monthIdx >= 0 && monthIdx <= 11) {
          const d = new Date(year, monthIdx, day, hour !== null ? hour : 9, min || 0, 0, 0);
          if (!dm[3] && d.getTime() < now.getTime() - 12*3600*1000) {
            d.setFullYear(year + 1);
          }
          ts = d.getTime();
          matched = matched ? matched + " " + dm[0] : dm[0];
          cleaned = cleaned.replace(dm[0], "").trim();
        }
      }
    }
  }

  // "il 25" / "giorno 25" — lone day number, no month → next occurrence
  // Only trigger when prefixed with "il" / "giorno" / "l'" to avoid matching
  // random digits in task text (e.g. "compra 5 mele").
  if (!ts) {
    const dm3 = text.match(/\b(?:il|giorno|l')\s+(\d{1,2})(?![\d\/\-])\b/i);
    if (dm3) {
      const day = parseInt(dm3[1]);
      if (day >= 1 && day <= 31) {
        let d = new Date(now.getFullYear(), now.getMonth(), day, hour !== null ? hour : 9, min || 0, 0, 0);
        if (d.getTime() < now.getTime() - 12*3600*1000) {
          d = new Date(now.getFullYear(), now.getMonth() + 1, day, hour !== null ? hour : 9, min || 0, 0, 0);
        }
        ts = d.getTime();
        matched = matched ? matched + " " + dm3[0] : dm3[0];
        cleaned = cleaned.replace(dm3[0], "").trim();
      }
    }
  }

  // If only time mentioned (no day), assume today (or tomorrow if past)
  if (!ts && hour !== null) {
    const d = new Date();
    d.setHours(hour, min, 0, 0);
    if (d.getTime() < Date.now()) d.setDate(d.getDate() + 1);
    ts = d.getTime();
  }

  // Clean up stray words
  cleaned = cleaned.replace(/\b(alle|all'|ore|per|il|la|di|giorno|nel|del)\b/gi, " ")
                   .replace(/\s+/g, " ").trim();
  // Strip leading/trailing punctuation
  cleaned = cleaned.replace(/^[,.\s]+|[,.\s]+$/g, "");

  return ts ? { timestamp: ts, matched, cleaned } : null;
}

/**
 * Detect user intent from a spoken/typed phrase.
 * Returns { kind: "task"|"event"|"list_add"|"list_create"|"list_read"|"chat",
 *           payload: ... }
 */
/**
 * Normalize voice input before intent detection.
 * Strips wake word, fillers, greetings, polite prefixes, and common ASR mistakes.
 * CRUCIAL for natural-speech understanding — every ambiguity here means the
 * user gets the wrong intent.
 */
function normalizeVoiceInput(raw) {
  let s = String(raw || "").trim();
  if (!s) return "";

  // 1. Fix common Italian ASR mistakes (before anything else)
  s = s.replace(/\btetto\b/gi, "teto");                   // roof → teto
  s = s.replace(/\bche\s+or[aey]\b/gi, "che ora");        // "che oray" etc
  s = s.replace(/\bpiu'/gi, "più");                        // "piu'" → più
  // Collapse repeated punctuation
  s = s.replace(/[.!?,;]{2,}/g, ".");

  // 2. Iterative cleanup — strip everything peelable in any order.
  //    Loop so that chains like "ok allora ciao teto per favore..."
  //    get fully unwrapped before intent detection.
  for (let pass = 0; pass < 5; pass++) {
    const before = s;

    // Wake word variants at start (with or without comma)
    s = s.replace(/^(?:eh?y|hey|ehi|ei|hei|oi|yo|ok|ciao)\s+tet?to[,.\s!?]*/i, "");
    s = s.replace(/^tet?to[,.\s!?]+/i, "");

    // Conversational fillers
    s = s.replace(/^(?:ok(?:ay|ey)?|allora|dunque|senti(?:\s+un\s+po'?)?|dai|ascolta|beh|mah|ehm|uhm|ehi|ehy|boh|uff|vabbè|vabbe|scusa|scusami)[,.\s!?]+/i, "");

    // Polite prefixes
    s = s.replace(/^(?:per\s+(?:favore|piacere|cortesia)|gentilmente|ti\s+prego)[,.\s!?]+/i, "");
    s = s.replace(/^(?:mi\s+)?(?:puoi|potresti|sapresti|saprest|riesci\s+a|ce\s+la\s+fai\s+a)\s+/i, "");
    s = s.replace(/^(?:vorrei|volevo|vorrei\s+che|mi\s+piacerebbe|desidero|ho\s+bisogno\s+di)\s+/i, "");
    s = s.replace(/^(?:devi|dovresti)\s+/i, "");  // "devi creare una lista X" → "creare una lista X"

    // Greetings at start, ONLY if followed by more content (otherwise they're a standalone greeting)
    s = s.replace(/^(?:ciao|salve|ehi|hey|hola|yo|buondì|buongiorno|buonasera|buonanotte|buon\s+(?:giorno|pomeriggio|sera|notte))\s+tet?to[,.\s!?]+(?=\S)/i, "");
    s = s.replace(/^(?:ciao|salve|ehi|hey|hola|yo|buondì|buongiorno|buonasera|buonanotte|buon\s+(?:giorno|pomeriggio|sera|notte))[,.\s!?]+(?=\S)/i, "");

    if (s === before) break;
  }

  // 3. Strip trailing politeness
  s = s.replace(/[,.\s]+(?:grazie(?:\s+mille|\s+tante)?|per\s+(?:favore|piacere)|ti\s+prego)\s*[.!?]*$/i, "");

  // 4. "ricordamelo"/"ricordatelo" → "ricordamelo"
  s = s.replace(/\bricorda(?:me|te)l[oa]\b/gi, "ricordami");
  s = s.replace(/\bsegna(?:me|te|ci)l[oa]\b/gi, "segna");
  s = s.replace(/\bsegnati\b/gi, "ricordami");

  // 5. "dal/in/al dentista" etc — keep as-is (these help intent detection)

  // 6. Normalize whitespace and trailing punctuation
  s = s.replace(/\s+/g, " ").trim();
  s = s.replace(/[.!?,;]+$/g, "").trim();

  return s;
}

/**
 * Detect user intent from a spoken/typed phrase.
 * Returns an intent object that executeIntent can handle.
 * Designed to be FORGIVING — matches common Italian paraphrases.
 */
function detectIntent(rawText) {
  const t = normalizeVoiceInput(rawText);
  const lower = t.toLowerCase();
  let m;

  // Empty after stripping → greet
  if (!t) return { kind: "chat", text: "ciao" };

  // ─── UNDO ───────────────────────────────────────────────
  if (/^(?:annulla(?:\s+(?:ultima|l'ultima))?|ripristina|recupera|ritenta|riprendi|rimetti)\b/i.test(lower)) {
    return { kind: "undo" };
  }

  // ─── EXPLICIT PREFIXES (user forces type) ───────────────
  if (/^(?:nota|note|nuova\s+nota|appunt[oi]|appunta|annota|memo)\s*[:\s]/i.test(t)) {
    return { kind: "list_add_default", text: t.replace(/^(?:nota|note|nuova\s+nota|appunt[oi]|appunta|annota|memo)\s*[:\s]+/i, "").trim() };
  }
  if (/^(?:evento|appuntamento|impegno)\s*[:\s]/i.test(t)) {
    return parseEventIntent(t.replace(/^(?:evento|appuntamento|impegno)\s*[:\s]+/i, ""));
  }
  if (/^(?:task|compito|cosa\s+da\s+fare|da\s+fare)\s*[:\s]/i.test(t)) {
    return { kind: "task", text: t.replace(/^(?:task|compito|cosa\s+da\s+fare|da\s+fare)\s*[:\s]+/i, "").trim() };
  }
  if (/^(?:promemoria|ricorda)\s*[:\s]/i.test(t)) {
    const rest = t.replace(/^(?:promemoria|ricorda)\s*[:\s]+/i, "").trim();
    const dt = parseDateTime(rest);
    return { kind: "task", text: dt?.cleaned || rest, reminderAt: dt?.timestamp || null };
  }

  // ─── HELP ───────────────────────────────────────────────
  if (/^(?:aiuto|help|cosa\s+(?:puoi|sai)\s+fare|comandi|che\s+comandi|come\s+funzioni|istruzioni|guida)\b/i.test(lower) ||
      /^(?:non\s+so\s+(?:cosa|che)\s+dire|cosa\s+ti\s+posso\s+chiedere)\b/i.test(lower)) {
    return { kind: "help" };
  }

  // ─── BRIEFING (#4) ──────────────────────────────────────
  if (/^(?:briefing|riepilogo\s+mattutino|fammi\s+il\s+briefing|come\s+(?:è|e)\s+oggi|come\s+sarà\s+oggi|come\s+procede\s+oggi|sintesi\s+(?:della\s+)?giornata)\b/i.test(lower)) {
    return { kind: "briefing" };
  }

  // ─── SMART PLAN (#1) ────────────────────────────────────
  if (/^(?:pianifica(?:mi|temi|rmi)?(?:\s+la)?(?:\s+giornata|\s+oggi)?|organizza(?:mi|temi)?(?:\s+la)?(?:\s+giornata|\s+oggi)?|programma(?:mi)?(?:\s+la)?(?:\s+giornata|\s+oggi)?|fammi\s+(?:un\s+)?piano(?:\s+per\s+oggi)?|piano\s+(?:per\s+)?oggi|cosa\s+faccio\s+oggi)\b/i.test(lower)) {
    return { kind: "plan_day" };
  }

  // ─── PREFERENCES: REMEMBER (#6) ─────────────────────────
  // "ricordati che X", "memorizza X", "tieni a mente che X"
  if ((m = lower.match(/^(?:ricordati(?:\s+(?:di\s+me|che|di))?|memorizza(?:\s+che)?|tieni(?:mi)?\s+a\s+mente(?:\s+che)?|prendi\s+nota(?:\s+che)?|annota\s+(?:di\s+me|che))\s+(.+)/i))) {
    return { kind: "pref_set", text: m[1].trim() };
  }

  // ─── PREFERENCES: FORGET (#6) ───────────────────────────
  if ((m = lower.match(/^(?:dimentica(?:ti)?(?:\s+(?:che|di))?|scorda(?:ti)?(?:\s+(?:che|di))?|cancella\s+(?:dalla\s+memoria|il\s+ricordo|che))\s+(.+)/i))) {
    return { kind: "pref_remove", text: m[1].trim() };
  }
  if (/^(?:dimentica\s+tutto|cancella\s+(?:tutta\s+la\s+)?memoria|svuota\s+(?:la\s+)?memoria)\b/i.test(lower)) {
    return { kind: "pref_clear" };
  }

  // ─── PREFERENCES: LIST (#6) ─────────────────────────────
  if (/^(?:cosa\s+(?:ricordi|sai)\s+(?:di\s+me)?|cosa\s+ti\s+ricordi|che\s+(?:cosa\s+)?(?:ricordi|sai)\s+di\s+me|mostra(?:mi)?\s+(?:la\s+)?memoria|le\s+tue\s+memorie|memoria)\b/i.test(lower)) {
    return { kind: "pref_list" };
  }

  // ─── FOCUS MODE (#7) ────────────────────────────────────
  if (/^(?:modalità\s+focus|focus\s+(?:mode)?|modalità\s+(?:notte|notturna|riposo|silenziosa)|spegni\s+tutto|schermo\s+(?:blocco|spento|nero)|lock\s+screen)\b/i.test(lower)) {
    return { kind: "focus_enter" };
  }
  if (/^(?:esci\s+(?:dal\s+)?focus|chiudi\s+(?:il\s+)?focus|riaccendi)\b/i.test(lower)) {
    return { kind: "focus_exit" };
  }

  // ─── SMART REMINDER: GEOFENCE (#3) ──────────────────────
  // "ricordami X quando esco di casa" / "ricordami quando arrivo a casa di Y"
  if ((m = lower.match(/^(?:ricord(?:a(?:mi|temi)|ati)|fammi\s+ricordare|promemoria(?:\s+per\s+me)?)\s+(?:di\s+)?(.+?)\s+quando\s+(esco\s+di\s+casa|arrivo\s+a\s+casa|sono\s+a\s+casa|torno\s+a\s+casa)\b/i))) {
    const trigger = /esco/.test(m[2]) ? "leave_home" : "arrive_home";
    return { kind: "geofence_set", text: m[1].trim(), trigger };
  }
  // "memorizza casa" / "questa è casa mia" → set home location
  if (/^(?:memorizza\s+(?:la\s+)?(?:posizione|posto)|questa\s+è\s+casa(?:\s+mia)?|sono\s+a\s+casa\s+adesso|salva\s+(?:la\s+)?(?:mia\s+)?posizione|ricordati\s+casa)\b/i.test(lower)) {
    return { kind: "geofence_save_home" };
  }
  // "dove sei?" / "dove abito?" — useful debug
  if (/^(?:dove\s+(?:sei|abito|sono)|qual'?\s*è\s+casa\s+mia|che\s+casa\s+ho)\b/i.test(lower)) {
    return { kind: "geofence_show_home" };
  }

  // ─── SMART REMINDER: NEXT FREE DAY (#3) ─────────────────
  // "ricordami X al prossimo giorno libero"
  if ((m = lower.match(/^(?:ricord(?:a(?:mi|temi)|ati)|fammi\s+ricordare)\s+(?:di\s+)?(.+?)\s+(?:al|nel|il)\s+prossimo\s+(?:giorno\s+)?liber[oe]\b/i))) {
    return { kind: "task_next_free", text: m[1].trim() };
  }

  // ─── SMART REMINDER: TIMER → TASK BRIDGE (#3) ───────────
  // "fra/tra X di Y ricordami Z" / "ricordami Z fra/tra X"
  // Only matches if duration is short-ish (< 24h) so dt-parser handles longer forms.
  if ((m = lower.match(/^(?:ricord(?:a(?:mi|temi)|ati)|fammi\s+ricordare|promemoria(?:\s+per\s+me)?)\s+(?:di\s+)?(.+?)\s+(?:tra|fra|in|dopo)\s+(.+)/i))) {
    const dur = parseDuration(m[2]);
    if (dur && dur > 0 && dur < 24 * 3600 * 1000) {
      return { kind: "task", text: m[1].trim(), reminderAt: Date.now() + dur };
    }
  }
  // Inverted: "tra X ricordami di Y"
  if ((m = lower.match(/^(?:tra|fra|in|dopo)\s+(.+?)\s+(?:ricord(?:a(?:mi|temi)|ati)|fammi\s+ricordare)\s+(?:di\s+)?(.+)/i))) {
    const dur = parseDuration(m[1]);
    if (dur && dur > 0 && dur < 24 * 3600 * 1000) {
      return { kind: "task", text: m[2].trim(), reminderAt: Date.now() + dur };
    }
  }

  // ─── CALENDAR: DELETE EVENT (V2) ──────────────────────
  // "cancella/elimina evento X" / "rimuovi X dal calendario"
  if ((m = lower.match(/^(?:cancella|elimina|togli|rimuovi)\s+(?:l['’]?\s*)?evento\s+(.+)/i)) ||
      (m = lower.match(/^(?:cancella|elimina|togli|rimuovi)\s+(.+?)\s+dal\s+calendario\b/i))) {
    return { kind: "event_delete", query: m[1].trim() };
  }

  // ─── CALENDAR: MOVE EVENT (V1) ────────────────────────
  // "sposta X a/al Y" — Y can be a date expression
  if ((m = lower.match(/^(?:sposta|posticipa|rinvia|metti|cambia)\s+(?:l['’]?\s*evento\s+)?(.+?)\s+(?:a|al|alle|all['’]?|per\s+(?:il|la)?)\s+(.+)/i))) {
    const dt = parseDateTime(m[2]);
    if (dt && dt.timestamp) {
      const d = new Date(dt.timestamp);
      const dKey = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const t = (d.getHours() !== 0 || d.getMinutes() !== 0)
        ? `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}` : null;
      return { kind: "event_move", query: m[1].trim(), dateKey: dKey, time: t };
    }
  }

  // ─── CALENDAR: QUERY EVENT (V3) ───────────────────────
  // "quando ho X?" / "che giorno è X?" / "a che ora è X"
  if ((m = lower.match(/^(?:quando\s+(?:ho|c['’]?\s*è|è)|che\s+giorno\s+(?:è|cade)|a\s+che\s+ora\s+(?:è|c['’]?\s*è|ho))\s+(?:l['’]?\s*evento\s+)?(.+?)[?!.]*$/i))) {
    return { kind: "event_query", query: m[1].trim() };
  }

  // ─── LIST: CREATE ───────────────────────────────────────
  // "crea(mi) (una) lista X" / "nuova lista X" / "fai(mi) una lista X" / "voglio una lista X"
  if ((m = lower.match(/^(?:crea(?:re|mi|temi|rmi)?|fai(?:re|mi|temi)?|fammi|fare|creo|voglio|vorrei|aggiungi|aggiungimi|aggiungere|aggiungermi)\s+(?:una\s+|un'\s*)?(?:nuova\s+)?lista\s+(?:(?:chiamata|di\s+nome|per\s+il|per\s+la|per|della|del|dei|delle)\s+)?(.+)/i))) {
    return { kind: "list_create", name: stripArticles(m[1]) };
  }
  if ((m = lower.match(/^nuova\s+lista\s+(.+)/i))) {
    return { kind: "list_create", name: stripArticles(m[1]) };
  }

  // ─── LIST: DELETE ────────────────────────────────────────
  // "cancella lista X" / "elimina la lista X" — check BEFORE delete_task
  if ((m = lower.match(/^(?:cancella(?:mi|re)?|elimina(?:mi|re)?|rimuovi|rimuovere|togli|togliere|distruggi)\s+(?:la\s+)?lista\s+(.+)/i))) {
    return { kind: "list_delete", name: stripArticles(m[1]) };
  }

  // ─── LIST: CHECK ITEM (V-2) ──────────────────────────────
  // "spunta/segna X dalla/nella lista Y" / "spunta X" (one list match)
  if ((m = lower.match(/^(?:spunta|segna(?:re)?(?:\s+come\s+fatt[oa])?|completa(?:re)?|fatto)\s+(.+?)\s+(?:dalla|nella|nelle|della|dalle|sulla|in|dal)\s+(?:lista\s+)?(.+)/i))) {
    return { kind: "list_check", item: m[1].trim(), listName: stripArticles(m[2]) };
  }

  // ─── LIST: EDIT ITEM (V-1) ───────────────────────────────
  // "modifica X in Y nella lista Z" / "cambia X con Y nella lista Z"
  if ((m = lower.match(/^(?:modifica(?:re)?|cambia(?:re)?|sostituis(?:ci|cire))\s+(.+?)\s+(?:in|con)\s+(.+?)\s+(?:nella|dalla|della|sulla)\s+(?:lista\s+)?(.+)/i))) {
    return { kind: "list_edit", oldText: m[1].trim(), newText: m[2].trim(), listName: stripArticles(m[3]) };
  }

  // ─── LIST: CLEAR (V-3) ───────────────────────────────────
  // "svuota la lista X" / "cancella tutte le voci della lista X"
  if ((m = lower.match(/^(?:svuota(?:re)?|pulis(?:ci|cire))\s+(?:la\s+)?lista\s+(.+)/i))) {
    return { kind: "list_clear", name: stripArticles(m[1]) };
  }
  if ((m = lower.match(/^cancella(?:re)?\s+(?:tutt[ie]\s+(?:le\s+)?voci\s+)?(?:della|dalla)\s+(?:lista\s+)?(.+)/i))) {
    return { kind: "list_clear", name: stripArticles(m[1]) };
  }

  // ─── LIST: COUNT (V-4) ───────────────────────────────────
  // "quante voci ho nella/sulla lista X" / "quanto è lunga la lista X"
  if ((m = lower.match(/^(?:quante\s+voci|quanti\s+element[ie]|quanto\s+è\s+lunga)\s+(?:ho\s+)?(?:nella|della|sulla|in|sul|nel)\s+(?:lista\s+)?(.+?)[?!.]*$/i))) {
    return { kind: "list_count", name: stripArticles(m[1]) };
  }

  // ─── LIST: SHARE (V-5) ───────────────────────────────────
  // "condividi/manda/invia (la) lista X (a Y)" / "esporta lista X"
  if ((m = lower.match(/^(?:condividi(?:mi)?|manda(?:mi)?|invia(?:mi)?|esporta|copia)\s+(?:la\s+)?lista\s+(.+?)(?:\s+a\s+.+)?[?!.]*$/i))) {
    return { kind: "list_share", name: stripArticles(m[1]) };
  }

  // ─── LIST: ADD ───────────────────────────────────────────
  // "aggiungi X alla/nella lista Y"
  if ((m = lower.match(/^(?:aggiung(?:i|imi|ere|ermi|iamo)|mett(?:i|imi|ere|ermi|iamo)|inseris(?:ci|cere|cimi|cermi)|salva(?:re|mi|rmi)?|scriv(?:i|ere|imi|ermi)|segna(?:re|mi|rmi)?|annota(?:re|mi|rmi)?|appunta(?:re|mi|rmi)?)\s+(.+?)\s+(?:alla|nella|in|sulla|sul|nel|al)\s+lista\s+(.+)/i))) {
    return { kind: "list_add", item: m[1].trim(), listName: stripArticles(m[2]) };
  }
  // "aggiungi X a/alla/al Y" (no "lista" word) — route to list_add if Y matches a known list
  if ((m = lower.match(/^(?:aggiung(?:i|imi|ere|ermi)|mett(?:i|imi|ere|ermi)|inseris(?:ci|cere|cimi)|scriv(?:i|ere|imi|ermi))\s+(.+?)\s+(?:alla|nella|sulla|al|nel|sul|a|in|su|ai|agli|alle|nei|negli|nelle|sui|sugli|sulle)\s+(.+)/i))) {
    const candidate = stripArticles(m[2]);
    if (Lists.findByName(candidate)) {
      return { kind: "list_add", item: m[1].trim(), listName: candidate };
    }
  }
  // "aggiungi alla lista Y: X" or "aggiungi alla spesa X"
  if ((m = lower.match(/^(?:aggiung(?:i|imi|ere|ermi)|mett(?:i|imi|ere|ermi))\s+(?:alla|nella|al|nel|in|a)\s+(?:lista\s+)?(\S+(?:\s+\S+)?)\s*[:,]?\s+(.+)/i))) {
    const candidate = stripArticles(m[1]);
    if (Lists.findByName(candidate)) {
      return { kind: "list_add", listName: candidate, item: m[2].trim() };
    }
  }

  // ─── LIST: READ ──────────────────────────────────────────
  // "mostra(mi)/apri/leggi(mi)/fammi vedere (la) lista X"
  if ((m = lower.match(/^(?:mostra(?:mi)?|apri(?:mi)?|leggi(?:mi)?|fammi\s+vedere|vedi|vedere|dammi|dimmi)\s+(?:la\s+)?lista\s+(.+)/i))) {
    return { kind: "list_read", name: stripArticles(m[1]) };
  }
  if ((m = lower.match(/^(?:cosa|che\s+cosa|che)\s+c'?(?:è|e)\s+(?:nella|sulla|in|sul|nel)\s+(?:lista\s+)?(.+)/i))) {
    return { kind: "list_read", name: stripArticles(m[1]) };
  }
  // "apri la spesa" / "mostra la spesa" — only if it matches a known list
  if ((m = lower.match(/^(?:mostra(?:mi)?|apri(?:mi)?|leggi(?:mi)?|fammi\s+vedere|dimmi)\s+(.+)/i))) {
    const candidate = stripArticles(m[1]);
    if (Lists.findByName(candidate)) {
      return { kind: "list_read", name: candidate };
    }
  }

  // ─── TASK: COMPLETE ──────────────────────────────────────
  // "ho fatto X" / "ho finito X" / "ho completato X" / "fatto X" / "finito X" / "completa X" / "segna (come) fatto X"
  if ((m = lower.match(/^(?:ho\s+(?:fatto|finito|completato|concluso|ultimato))\s+(.+)/i)) ||
      (m = lower.match(/^(?:fatto|finito|completato|completata|completare|completa(?:mi)?)\s+(.+)/i)) ||
      (m = lower.match(/^(?:segna(?:mi|re)?|marca(?:mi|re)?|spunta)\s+(?:come\s+)?(?:fatto|finito|completato)\s+(.+)/i)) ||
      (m = lower.match(/^(?:segna|marca|spunta)\s+(.+?)\s+(?:come\s+)?(?:fatto|finito|completato)/i))) {
    return { kind: "complete_task", query: stripArticles(m[1]) };
  }

  // ─── TASK: DELETE ────────────────────────────────────────
  // Careful: "cancella lista X" already handled above
  if ((m = lower.match(/^(?:cancella(?:mi)?|elimina(?:mi)?|rimuovi|togli|toglimi|leva(?:mi)?|levami|butta(?:\s+via)?)\s+(?:(?:il|la|lo|i|le|gli|l')\s+)?(?:task\s+|promemoria\s+|impegno\s+)?(.+)/i))) {
    return { kind: "delete_task", query: stripArticles(m[1]) };
  }
  if ((m = lower.match(/^non\s+(?:voglio|mi\s+serve)\s+(?:più|pi[uù])\s+(.+)/i))) {
    return { kind: "delete_task", query: stripArticles(m[1]) };
  }

  // ─── SUMMARY / AGENDA ────────────────────────────────────
  //  "cosa devo fare", "che ho da fare", "che impegni ho", "cosa c'è in agenda", "agenda", "riassunto"
  if (/^(?:cosa|che\s+cosa|che|cos')\s+(?:devo|dovrei|ho\s+da|ho\s+in|c'?è\s+da|c'?è|abbiamo|abbiam)\s+(?:fare|da\s+fare|in\s+programma|in\s+agenda|programma|agenda|oggi|domani)?/i.test(lower) ||
      /^(?:che|quali)\s+(?:impegni|cose|task|appuntament[oi])\s+(?:ho|abbiamo)/i.test(lower) ||
      /^(?:agenda|riassunto|programma|impegni|dimmi\s+(?:l'?)?agenda)/i.test(lower) ||
      /^dimmi\s+(?:cosa|che\s+cosa|che\s+)?(?:devo|ho\s+da)\s+fare/i.test(lower) ||
      /^leggi(?:mi)?\s+(?:l'?)?agenda/i.test(lower) ||
      /^(?:ho|c'?è|abbiamo)\s+(?:qualcosa|qualche\s+impegno|impegni)\s+(?:oggi|domani|per\s+oggi|per\s+domani)?/i.test(lower)) {
    const w = lower.match(/\b(oggi|stamattina|stasera|domani|questa\s+settimana|settimana)\b/);
    const when = w ? (w[1] === "settimana" ? "questa settimana" : w[1]) : "oggi";
    return { kind: "summary", when };
  }

  // ─── NAVIGATION: OPEN ────────────────────────────────────
  // "apri/mostra/vedi/vai a/voglio vedere calendario"
  const openMatch = lower.match(/^(?:apri(?:mi)?|mostra(?:mi)?|vedi|vedere|vai\s+(?:a|su)|voglio\s+vedere|fammi\s+vedere)\s+(?:il\s+|la\s+|le\s+|l'\s*)?(calendari[oi]|lista|liste|impostazion[ei]|note|agenda)\b/i);
  if (openMatch) {
    const tgt = openMatch[1];
    if (/calendari/i.test(tgt) || /agenda/i.test(tgt)) return { kind: "open", target: "calendar" };
    if (/list/i.test(tgt) || /note/i.test(tgt))        return { kind: "open", target: "lists" };
    if (/impostazion/i.test(tgt))                      return { kind: "open", target: "settings" };
  }
  if (/^(?:calendario|agenda)\s*$/i.test(lower))        return { kind: "open", target: "calendar" };
  if (/^(?:liste|le\s+mie\s+liste|note)\s*$/i.test(lower)) return { kind: "open", target: "lists" };
  if (/^impostazioni\s*$/i.test(lower))                 return { kind: "open", target: "settings" };

  // ─── NAVIGATION: CLOSE ───────────────────────────────────
  if (/^(?:chiudi|esci|torna\s+indietro|indietro|basta|stop)\b/i.test(lower)) {
    return { kind: "close" };
  }

  // ─── QUESTIONS: TIME / DATE ──────────────────────────────
  if (/^(?:che\s+or[aey]|dimmi\s+l'?ora|che\s+ore?\s+(?:sono|è)|ora\s+è)\b/i.test(lower)) {
    return { kind: "time_info" };
  }
  if (/^(?:che\s+giorno|che\s+data|dimmi\s+la\s+data|dimmi\s+il\s+giorno|giorno\s+è|data\s+(?:di\s+)?oggi)\b/i.test(lower)) {
    return { kind: "date_info" };
  }

  // ─── "RICORDAMI DI X" / "DEVO X" / "NON DIMENTICARE X" → TASK ─
  // These are the most natural Italian forms for adding a task
  if ((m = lower.match(/^(?:ricordami|ricordati|ricordamene)\s+(?:di|che\s+devo|che)\s+(.+)/i))) {
    const rest = m[1];
    const dt = parseDateTime(rest);
    const text = (dt?.cleaned || rest).trim();
    if (!text) return { kind: "clarify", original: m[0] };
    return { kind: "task", text, reminderAt: dt?.timestamp || null };
  }
  if ((m = lower.match(/^(?:ricordami|ricordati)\s+(.+)/i))) {
    const rest = m[1];
    const dt = parseDateTime(rest);
    const text = (dt?.cleaned || rest).trim();
    // If all that's left is a bare day/time keyword, it's not a task
    if (!text || /^(?:oggi|domani|dopodomani|stasera|stamattina|stanotte|subito|poi|dopo)$/i.test(text)) {
      return { kind: "clarify", original: m[0] };
    }
    return { kind: "task", text, reminderAt: dt?.timestamp || null };
  }
  if ((m = lower.match(/^(?:devo|dovrei|ho\s+da|bisogna|bisognerebbe)\s+(.+)/i))) {
    const rest = m[1];
    const dt = parseDateTime(rest);
    const text = (dt?.cleaned || rest).trim();
    if (!text) return { kind: "clarify", original: m[0] };
    return { kind: "task", text, reminderAt: dt?.timestamp || null };
  }
  if ((m = lower.match(/^non\s+(?:devo|posso)\s+dimenticare\s+(?:di\s+)?(.+)/i)) ||
      (m = lower.match(/^non\s+dimenticare\s+(?:di\s+)?(.+)/i))) {
    const rest = m[1];
    const dt = parseDateTime(rest);
    const text = (dt?.cleaned || rest).trim();
    if (!text) return { kind: "clarify", original: m[0] };
    return { kind: "task", text, reminderAt: dt?.timestamp || null };
  }

  // ─── CANCEL / STOP (mid-conversation, user wants to abort) ───
  // Must come before chat so "no fa nulla" isn't mistaken for a greeting
  if (/^(?:aspetta(?:\s+un\s+(?:po'?|attimo|secondo))?|lascia\s+(?:stare|perdere)|non\s+importa|niente|fa\s+niente|fa\s+nulla|no[,.\s]+(?:fa\s+)?(?:niente|nulla)|no[,.\s]+lascia\s+stare|scusa[,.\s]+niente|scusami[,.\s]+niente|ho\s+sbagliato|stavo\s+scherzando|nulla|zitt[ao])\b/i.test(lower) ||
      /^basta\s*$/i.test(lower) ||
      /^no\s*[,.!?]?\s*$/i.test(lower)) {
    return { kind: "cancel" };
  }

  // ─── CHAT / SOCIAL ────────────────────────────────────────
  // Matches ONLY when the phrase is mostly conversational (no embedded action).
  // If user says "ciao quanto fa 2+2", the "ciao" got stripped by normalize —
  // only pure greetings/questions-about-teto reach here.
  const wordCount = t.split(/\s+/).length;
  if (wordCount <= 6) {
    if (/^(?:ciao|salve|ehi|hey|hola|yo|buondì)\s*[,!.?]*\s*(?:teto)?\s*$/i.test(lower) ||
        /^(?:buon(?:giorno|asera|anotte|a\s+sera|a\s+notte|\s+pomeriggio)|buona\s+(?:giornata|serata|notte))\s*[,!.?]*\s*(?:teto)?\s*$/i.test(lower) ||
        /^(?:come\s+(?:stai|va|ti\s+senti|butta)|tutto\s+(?:bene|ok|a\s+posto)|va\s+tutto\s+bene|come\s+va\s+la\s+vita|che\s+fai|cosa\s+fai|che\s+si\s+fa)\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:grazie(?:\s+mille|\s+tante|\s+davvero)?|ti\s+ringrazio|mille\s+grazie|grazie\s+a\s+te)\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:chi\s+sei|cosa\s+sei|come\s+ti\s+chiami|presentati|parlami\s+di\s+te|sei\s+teto|tu\s+chi\s+sei)\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:ti\s+(?:voglio\s+bene|amo|adoro)|sei\s+(?:brava|fantastica|bellissima|carina|la\s+migliore|forte|dolce|simpatica))\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:hai\s+(?:fame|sete|sonno|freddo|caldo|paura)|sei\s+(?:stanca|triste|felice|contenta|annoiata|sveglia|viva|reale))\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:ti\s+piace|ti\s+piacciono|cosa\s+(?:pensi|ne\s+pensi)|che\s+(?:pensi|ne\s+pensi)|ci\s+sei|sei\s+(?:lì|qua|qui))\b/i.test(lower) ||
        /^(?:mi\s+(?:senti|ascolti)|puoi\s+sentirmi|mi\s+ricordi|ricordi\s+(?:chi\s+sei|di\s+me))\s*[?!.]*\s*$/i.test(lower) ||
        /^(?:ehi\s+teto|ehy\s+teto|hey\s+teto|teto)\s*[?!.]*\s*$/i.test(lower)) {
      return { kind: "chat", text: t };
    }
  }

  // ─── QUESTIONS WE CAN ANSWER ─────────────────────────────
  // WEATHER
  if ((m = lower.match(/^(?:che\s+tempo\s+fa|com'?è\s+il\s+tempo|come\s+è\s+il\s+tempo|che\s+tempo\s+c'?è|piove|sta\s+piovendo|fa\s+caldo|fa\s+freddo|c'?è\s+il\s+sole|meteo)(?:\s+(?:a|in|su)\s+(.+))?$/i))) {
    return { kind: "weather", city: m[1] ? m[1].trim() : null, when: "now" };
  }
  if ((m = lower.match(/^(?:che\s+tempo\s+(?:farà|fara)|come\s+sarà\s+il\s+tempo|meteo)\s+domani(?:\s+(?:a|in|su)\s+(.+))?$/i))) {
    return { kind: "weather", city: m[1] ? m[1].trim() : null, when: "tomorrow" };
  }
  if (/^meteo\s+domani$/i.test(lower)) {
    return { kind: "weather", city: null, when: "tomorrow" };
  }

  // MATH — "quanto fa X" / "calcola X" / "quanto è X" / "fai X+Y" / "risolvi X"
  if ((m = lower.match(/^(?:quanto\s+(?:fa|è|sono|vale|viene|fanno)|calcola(?:mi|temi)?|fammi\s+il\s+conto\s+di|fai(?:mi)?|risolvi(?:mi)?|qual\s+è\s+il\s+risultato\s+di|il\s+risultato\s+di|risultato\s+di|somma\s+(?:di|tra|fra)|prodotto\s+(?:di|tra|fra)|differenza\s+(?:di|tra|fra)|fa)\s+(.+)/i))) {
    const result = computeMath(m[1]);
    if (result !== null) return { kind: "math", expr: m[1].trim(), result };
    return { kind: "unknown_question", topic: "math" };
  }
  // Standalone math: "15 * 3" / "2+2" / "radice di 16" / "3 al quadrato" / "20% di 150"
  if (/^[\d\s+\-*/().,%]+$/.test(t) && /[+\-*/%]/.test(t) && /\d/.test(t)) {
    const result = computeMath(t);
    if (result !== null) return { kind: "math", expr: t, result };
  }
  if (/\bradice\s+(?:quadrata\s+)?di\b|\bal\s+quadrato\b|\bal\s+cubo\b|\bpercento\s+di\b|\b\d+%\s*di\b/i.test(lower)) {
    const result = computeMath(t);
    if (result !== null) return { kind: "math", expr: t, result };
  }

  // TIMER — "metti un timer di 5 minuti"
  if ((m = lower.match(/^(?:metti(?:mi)?|imposta(?:mi)?|avvia(?:mi)?|parti\s+con|fai\s+partire|fammi)?\s*(?:un\s+)?timer\s+(?:di\s+|per\s+|a\s+)?(.+)/i)) ||
      (m = lower.match(/^timer\s+(.+)/i))) {
    const ms = parseDuration(m[1]);
    if (ms && ms > 0 && ms < 24*3600*1000) {
      return { kind: "timer", ms, label: formatDuration(ms) };
    }
    return { kind: "clarify", original: "timer: durata non chiara (es. \"timer di 5 minuti\")" };
  }

  // COIN / DICE / RANDOM
  if (/^testa\s+o\s+croce\b/i.test(lower) ||
      /^(?:lancia(?:mi)?|tira(?:mi)?)\s+(?:una\s+)?moneta\b/i.test(lower)) {
    return { kind: "coin" };
  }
  if (/^(?:tira(?:mi)?|lancia(?:mi)?)\s+(?:un\s+)?dado\b/i.test(lower) || /^dado\s*$/i.test(lower)) {
    return { kind: "dice" };
  }
  if ((m = lower.match(/^(?:numero\s+casuale|dammi\s+un\s+numero|un\s+numero\s+(?:a\s+caso|casuale))(?:\s+(?:tra|fra|da)\s+(\d+)\s+(?:e|a)\s+(\d+))?/i))) {
    const min = m[1] ? parseInt(m[1]) : 1;
    const max = m[2] ? parseInt(m[2]) : 100;
    return { kind: "random", min: Math.min(min,max), max: Math.max(min,max) };
  }

  // UNIT CONVERSION — "convertimi 5 km in metri" / "5 km in metri"
  if ((m = lower.match(/^(?:converti(?:mi)?|trasforma|cambia|quanti\s+fanno)\s+(\d+(?:[,.]\d+)?)\s+(\S+)\s+in\s+(\S+)/i)) ||
      (m = lower.match(/^(\d+(?:[,.]\d+)?)\s+(\S+)\s+in\s+(\S+)\s*$/i))) {
    const value = parseFloat(m[1].replace(",","."));
    return { kind: "convert", value, from: m[2], to: m[3] };
  }

  // COUNTDOWN — "quanti giorni a/al/mancano a X" / "quando è X"
  if ((m = lower.match(/^quant[ie]\s+giorni?\s+(?:a|al|alla|allo|ai|agli|alle|per|mancano\s+a|mancano\s+al|mancano\s+alla|c'?è\s+a|c'?è\s+al|c'?è\s+alla)\s+(.+)/i)) ||
      (m = lower.match(/^(?:quando\s+è|quando\s+c'?è)\s+(.+)/i))) {
    return { kind: "countdown", holiday: m[1].trim() };
  }

  // QUOTES — "dimmi qualcosa/una frase/una citazione/stupiscimi"
  if (/^(?:dimmi\s+(?:qualcosa|una\s+cosa|una\s+frase|una\s+citazione|qualcosa\s+di\s+bello)|(?:una\s+)?frase\s+(?:di\s+)?teto|(?:una\s+)?citazione|stupiscimi|fammi\s+sorridere|dimmi\s+(?:la\s+)?tua\s+(?:frase|citazione))\b/i.test(lower)) {
    return { kind: "quote" };
  }
  if (/^(?:racconta(?:mi)?|dimmi)\s+(?:una\s+)?(?:barzelletta|battuta|storia|battutona)/i.test(lower) ||
      /^fammi\s+ridere\b/i.test(lower)) {
    return { kind: "joke" };
  }

  // QUESTIONS WE STILL CAN'T ANSWER
  if (/^(?:cerca|googla|google|cerca\s+su\s+internet|trova\s+su\s+internet)\b/i.test(lower)) {
    return { kind: "unknown_question", topic: "search" };
  }

  // ─── EVENT vs TASK heuristic ─────────────────────────────
  // Events: anything with a specific date+time AND NOT a clear task verb
  // Tasks: action verbs ("comprare", "chiamare", etc.) OR just "ricordami di X"
  const eventKeywords = /\b(appuntament[oi]|incontr[oi]|riunion[ei]|meeting|call|colloqui[oi]|cena|pranzo|aperitivo|brunch|visita|esame|partit[ae]|concerto|compleanno|matrimonio|battesimo|anniversario|festa|cinema|teatro|viaggio|volo|treno|conferenza|spettacolo|vacanza|gita|uscita|serata|cena|cenetta|ritrovo|ritrovarci|vedere|andare|andiamo|vado|vai|va\s+a|usciamo|esco|film)\b/i;
  // Clear task-oriented verbs: these should stay as task even with date+time
  const clearTaskVerb = /^\s*(?:compra(?:re|mi)?|prendi|prendere|chiama(?:re)?|telefona(?:re)?|scrivi|scriver|invia(?:re)?|manda(?:re)?|paga(?:re)?|rinnova(?:re)?|prenota(?:re)?|ordina(?:re)?|controlla(?:re)?|verifica(?:re)?|finisci|finire|studia(?:re)?|lavora(?:re)?|pulisc|pulire|porta(?:re)?|preparar)\b/i;

  const hasDate = parseDateTime(t);

  if (hasDate) {
    // If what's left after stripping the date is empty or just a preposition,
    // we have no actual content → ask for clarification rather than creating
    // a task with title "a" or "di" or similar.
    let contentAfterDate = (hasDate.cleaned || "").trim();
    // Strip trailing/leading lone prepositions
    contentAfterDate = contentAfterDate.replace(/^(?:a|al|alle|allo|ai|agli|di|in|su|sul|sulla|per|con|da|dal|dalla)\s+/i, "");
    contentAfterDate = contentAfterDate.replace(/\s+(?:a|al|alle|allo|ai|agli|di|in|su|sul|sulla|per|con|da)$/i, "");
    // If only a bare preposition is left, treat as empty
    if (/^(?:a|al|alle|allo|ai|agli|di|in|su|sul|sulla|per|con|da|il|la|lo|i|le)\s*$/i.test(contentAfterDate)) {
      contentAfterDate = "";
    }
    if (!contentAfterDate) {
      return { kind: "clarify", original: t };
    }
    // If it STARTS with a clear task verb → task with reminder
    if (clearTaskVerb.test(lower)) {
      return { kind: "task", text: contentAfterDate, reminderAt: hasDate.timestamp };
    }
    // If it contains event-ish keywords → event
    if (eventKeywords.test(lower)) {
      return parseEventIntent(t);
    }
    // Has time (not just date) → likely event/appointment ("alle 20 dentista")
    const hasTime = /\balle?\s+(?:\d{1,2}|una|due|tre|quattro|cinque|sei|sette|otto|nove|dieci|undici|dodici|tredici|quattordici|quindici|sedici|diciassette|diciotto|diciannove|venti|ventuno|ventidue|ventitre)\b|mezzogiorno|mezzanotte|\bstasera\b|\bstamattina\b|\bstanotte\b|\bpomeriggio\b/i.test(lower);
    if (hasTime) {
      return parseEventIntent(t);
    }
    // Date without time and no specific keyword → task with reminder
    return { kind: "task", text: contentAfterDate, reminderAt: hasDate.timestamp };
  }

  // ─── SMART FALLBACK ─────────────────────────────────────
  // Before defaulting to "task", detect things that clearly AREN'T tasks.
  const words = t.split(/\s+/).filter(Boolean);

  // Questions (start with question word or end with ?) and no action verb
  // → route to unknown_question. Never silently convert a question into a task.
  // Use (space|$) instead of \b because \b breaks on non-ASCII like é/ì/ù.
  const startsWithQuestion = /^(?:cosa|che\s+cosa|che|come|dove|quando|perch[eéè]|perche|chi|quale|quali|quanto|quanta|quanti|quante)(?:\s|$)/i.test(lower);
  const endsWithQ = /\?\s*$/.test(t);
  const hasActionVerb = /\b(compra(?:re)?|chiama(?:re)?|telefona(?:re)?|manda(?:re)?|scriv(?:i|ere)|leggi|legger|prendi|prender|porta(?:re)?|vai|andare|fare|fatto|preparare|prepara|studiare|studia|lavorare|lavora|pulire|pulisci|pagare|paga|cucinare|cucina|mangiare|mangia|bere|bevi|comprar|prenotare|prenota|inviare|invia|rispondere|rispondi|controllare|controlla|verificare|verifica|organizzare|organizza|finire|finir|iniziare|inizia|cominciare|comincia|provare|prova|ordinare|ordina|rinnovare|rinnova)\b/i.test(lower);

  if ((startsWithQuestion || endsWithQ) && !hasActionVerb) {
    return { kind: "unknown_question", topic: "general", text: t };
  }

  // Very short (1-2 words) with no action verb → ambiguous, ask for clarification
  if (words.length <= 2 && !hasActionVerb) {
    return { kind: "clarify", original: t };
  }

  // Default: treat as task
  return { kind: "task", text: t };
}

/**
 * Strip leading Italian articles/prepositions from a name/query.
 * "la spesa" → "spesa", "del supermercato" → "supermercato"
 */
function stripArticles(s) {
  if (!s) return s;
  return String(s)
    .replace(/^(?:il|lo|la|i|gli|le|l'|un'|un|una|dello|della|dei|degli|delle|del|di|al|alla|allo|ai|agli|alle|della|dalla|dal|dallo|dai|dagli|dalle|nel|nella|nello|nei|negli|nelle|sul|sulla|sullo|sui|sugli|sulle|per)\s+/gi, "")
    .trim();
}

function parseEventIntent(text) {
  const dt = parseDateTime(text);
  if (dt) {
    return { kind: "event", title: dt.cleaned || text, timestamp: dt.timestamp };
  }
  return { kind: "event", title: text, timestamp: null };
}

/**
 * Execute a parsed intent. Returns a message for Teto to say back.
 */
async function executeIntent(intent) {
  switch (intent.kind) {
    case "undo": {
      if (state.undoTask) {
        undoDelete();
        return "";  // undoDelete already shows its own bubble
      }
      return "Non c'è niente da annullare";
    }
    case "task": {
      const task = {
        id: genId(), text: intent.text, category: state.cat,
        note: "", done: false, ts: Date.now(),
        reminderAt: intent.reminderAt || null,
      };
      await addTaskToDb(task);
      if (intent.reminderAt) {
        const when = new Date(intent.reminderAt).toLocaleString("it-IT", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
        return `Ok! Task aggiunto con promemoria per ${when}`;
      }
      return pick(TETO.added);
    }
    case "event": {
      if (!intent.timestamp) {
        return "Quando sarebbe questo evento? Prova ad aggiungere una data";
      }
      const d = new Date(intent.timestamp);
      const dateStr = dateKey(d.getFullYear(), d.getMonth(), d.getDate());
      const timeStr = `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
      await db.collection("users").doc(state.uid).collection("events").add({
        title: intent.title,
        date: dateStr,
        time: timeStr,
        note: null,
        category: "personal",
        allDay: false,
        recurrence: "none",
        reminderOffset: null,
        ts: Date.now(),
      });
      const when = d.toLocaleString("it-IT", { weekday:"short", day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" });
      return `Evento salvato! ${intent.title} — ${when}`;
    }
    case "event_delete": {
      const found = await Calendar.deleteByTitle(intent.query);
      if (!found) return `Non trovo nessun evento con "${intent.query}"`;
      return `Eliminato: ${found.event.title}`;
    }
    case "event_move": {
      const found = await Calendar.moveByTitle(intent.query, intent.dateKey, intent.time);
      if (!found) return `Non trovo nessun evento con "${intent.query}"`;
      const [yy, mm, dd] = intent.dateKey.split("-").map(Number);
      const newDate = new Date(yy, mm-1, dd);
      const dayLabel = newDate.toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long" });
      const timePart = intent.time ? ` alle ${intent.time}` : "";
      return `Spostato "${found.event.title}" a ${dayLabel}${timePart} ♪`;
    }
    case "event_query": {
      const found = Calendar.findByTitle(intent.query);
      if (!found) return `Non trovo nessun evento con "${intent.query}" nei prossimi 60 giorni`;
      const dayLabel = found.date.toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long" });
      const timePart = found.event.allDay ? "tutto il giorno" : (found.event.time ? `alle ${found.event.time}` : "");
      return `${found.event.title}: ${dayLabel} ${timePart}`.trim();
    }
    case "list_create": {
      const id = genId();
      const emoji = guessListEmoji(intent.name);
      await db.collection("users").doc(state.uid).collection("lists").doc(id).set({
        name: intent.name, emoji, checkable: false, ts: Date.now(),
      });
      return `Lista "${intent.name}" creata ${emoji}`;
    }
    case "list_add": {
      // Find list by name (case-insensitive)
      const list = Lists.findByName(intent.listName);
      if (!list) {
        // Auto-create
        const id = genId();
        const emoji = guessListEmoji(intent.listName);
        await db.collection("users").doc(state.uid).collection("lists").doc(id).set({
          name: intent.listName, emoji, checkable: false, ts: Date.now(),
        });
        await Lists.addItem(id, intent.item);
        return `Lista "${intent.listName}" creata e "${intent.item}" aggiunto!`;
      }
      await Lists.addItem(list.id, intent.item);
      return `"${intent.item}" aggiunto a ${list.emoji} ${list.name}`;
    }
    case "list_add_default": {
      // Generic note → goes to default "Note" list (create if missing)
      let list = Lists.findByName("note");
      if (!list) {
        const id = genId();
        await db.collection("users").doc(state.uid).collection("lists").doc(id).set({
          name: "Note", emoji: "📝", checkable: false, ts: Date.now(),
        });
        list = { id, name: "Note", emoji: "📝" };
      }
      await Lists.addItem(list.id, intent.text);
      return `Nota aggiunta a 📝 Note!`;
    }
    case "list_read": {
      const list = Lists.findByName(intent.name);
      if (!list) return `Non ho trovato la lista "${intent.name}"`;
      Lists.open(list.id);
      const items = Lists.items[list.id] || [];
      if (items.length === 0) return `La lista ${list.emoji} ${list.name} è vuota`;
      if (items.length <= 5) {
        return `Nella lista ${list.name} ci sono: ${items.map(i=>i.text).join(", ")}`;
      }
      return `${list.emoji} ${list.name}: ${items.length} voci. L'ho aperta per te`;
    }
    case "list_check": {
      const list = Lists.findByName(intent.listName);
      if (!list) return `Non ho trovato la lista "${intent.listName}"`;
      if (!list.checkable) return `La lista ${list.name} non è spuntabile (è una nota). Cambia tipo dalle azioni della lista`;
      const arr = Lists.items[list.id] || [];
      const q = intent.item.toLowerCase().trim();
      const found = arr.find(it => !it.done && it.text.toLowerCase().includes(q));
      if (!found) return `Non trovo "${intent.item}" tra le voci da fare di ${list.name}`;
      await Lists.toggleItem(list.id, found.id, false);
      return `Spuntato "${found.text}" da ${list.name} ✓`;
    }
    case "list_edit": {
      const list = Lists.findByName(intent.listName);
      if (!list) return `Non ho trovato la lista "${intent.listName}"`;
      const arr = Lists.items[list.id] || [];
      const q = intent.oldText.toLowerCase().trim();
      const found = arr.find(it => it.text.toLowerCase().includes(q));
      if (!found) return `Non trovo "${intent.oldText}" in ${list.name}`;
      await Lists.updateItem(list.id, found.id, intent.newText);
      return `Modificato in ${list.name}: "${intent.newText}" ♪`;
    }
    case "list_clear": {
      const list = Lists.findByName(intent.name);
      if (!list) return `Non ho trovato la lista "${intent.name}"`;
      const arr = Lists.items[list.id] || [];
      if (arr.length === 0) return `La lista ${list.name} è già vuota~ ♪`;
      const ok = await Modal.confirm(`Cancellare tutte le ${arr.length} voci di "${list.name}"?`, { title: "Svuota lista", danger: true, okLabel: "Svuota" });
      if (!ok) return "Ok, niente da fare";
      const batch = db.batch();
      const col = db.collection("users").doc(state.uid).collection("lists").doc(list.id).collection("items");
      arr.forEach(it => batch.delete(col.doc(it.id)));
      await batch.commit();
      return `Lista ${list.name} svuotata ✨`;
    }
    case "list_count": {
      const list = Lists.findByName(intent.name);
      if (!list) return `Non ho trovato la lista "${intent.name}"`;
      const arr = Lists.items[list.id] || [];
      if (arr.length === 0) return `La lista ${list.name} è vuota`;
      if (list.checkable) {
        const pending = arr.filter(i => !i.done).length;
        const done = arr.length - pending;
        return `${list.name}: ${pending} da fare, ${done} ${done===1?"completata":"completate"}`;
      }
      return `Nella lista ${list.name} ci sono ${arr.length} ${arr.length===1?"voce":"voci"}`;
    }
    case "list_share": {
      const list = Lists.findByName(intent.name);
      if (!list) return `Non ho trovato la lista "${intent.name}"`;
      Lists.share(list.id);
      return null;   // share() shows its own bubble
    }
    case "chat": {
      return conversationalReply(intent.text);
    }
    case "help": {
      state.showHelp = true;
      render();
      return "Ecco cosa posso fare! 🍞";
    }
    case "briefing": {
      Briefing.show(true);
      return null; // Briefing.show already shows bubble
    }
    case "plan_day": {
      const result = Planner.build();
      if (!result.hasItems) {
        return "Niente da pianificare oggi! Lista vuota o tutto già fatto~ 🍞";
      }
      state.planSuggestion = result;
      render();
      return `Ho pianificato ${result.plan.length} ${result.plan.length===1?"task":"task"} per oggi! Dai un'occhiata ♪`;
    }
    case "pref_set": {
      const txt = intent.text.replace(/[.!?,]+$/,"").trim();
      const key = Prefs.deriveKey(txt);
      Prefs.set(key, txt);
      return `Memorizzato! Ricorderò che ${txt} 🍞`;
    }
    case "pref_remove": {
      const txt = intent.text.toLowerCase().trim();
      const list = Prefs.list();
      const match = list.find(p => p.value.toLowerCase().includes(txt) || p.key.toLowerCase().includes(txt));
      if (!match) return `Non trovo niente in memoria su "${intent.text}"`;
      Prefs.remove(match.key);
      return `Dimenticato: ${match.value}`;
    }
    case "pref_clear": {
      const n = Object.keys(state.preferences).length;
      Prefs.clear();
      return n > 0 ? `Memoria svuotata (${n} ricordi cancellati) 🍞` : "La memoria era già vuota~";
    }
    case "pref_list": {
      const list = Prefs.list();
      if (list.length === 0) return "Non ho ancora ricordi su di te. Dimmi 'ricordati che...' per insegnarmi qualcosa! 🍞";
      const items = list.slice(0, 8).map(p => "• " + p.value).join("\n");
      const more = list.length > 8 ? `\n...e altri ${list.length-8}` : "";
      return `Ecco cosa ricordo:\n${items}${more}`;
    }
    case "focus_enter": {
      Focus.enter();
      Focus.startTicker();
      return null;
    }
    case "focus_exit": {
      Focus.exit();
      return "Bentornata~ ♪";
    }
    case "geofence_set": {
      if (!Prefs.get("location_home")) {
        return "Prima dimmi dov'è casa! Vai a casa, poi dimmi 'memorizza casa' 🏠";
      }
      Geofence.add(intent.text, intent.trigger);
      const triggerLabel = intent.trigger === "leave_home" ? "esci di casa" : "arrivi a casa";
      return `Promemoria attivo: ti ricorderò "${intent.text}" quando ${triggerLabel} 📍`;
    }
    case "geofence_save_home": {
      try {
        await Geofence.saveHome();
        Geofence.start();
        return "Posizione di casa salvata! 🏠 Ora posso ricordarti cose quando esci o arrivi";
      } catch(e) {
        return "Non riesco a leggere la posizione. Permetti l'accesso alla posizione e riprova~";
      }
    }
    case "geofence_show_home": {
      const home = Prefs.get("location_home");
      if (!home) return "Non so ancora dov'è casa! Dimmi 'memorizza casa' quando sei lì 🏠";
      const pending = Geofence.load();
      const pendingMsg = pending.length > 0
        ? ` · ${pending.length} promemoria attiv${pending.length===1?"o":"i"}`
        : "";
      return `Casa: ${home.lat.toFixed(4)}°, ${home.lon.toFixed(4)}°${pendingMsg}`;
    }
    case "task_next_free": {
      const day = findNextFreeDay();
      if (!day) return "Non trovo un giorno libero nei prossimi 14 giorni! Sei pien* di impegni~ 🍞";
      const reminderAt = new Date(day);
      reminderAt.setHours(9, 0, 0, 0);
      // Create the task directly
      try {
        await db.collection("users").doc(state.uid).collection("tasks").add({
          text: intent.text,
          done: false,
          ts: Date.now(),
          reminderAt: reminderAt.getTime(),
          category: "personal",
        });
        const dayLabel = reminderAt.toLocaleDateString("it-IT", { weekday: "long", day: "numeric", month: "long" });
        return `Pianificato "${intent.text}" per ${dayLabel} alle 9:00 (primo giorno libero) ♪`;
      } catch(e) {
        console.error(e);
        return TETO.error;
      }
    }
    case "summary": {
      const now = new Date();
      const today0 = new Date(now); today0.setHours(0,0,0,0);
      const tomorrow0 = new Date(today0); tomorrow0.setDate(tomorrow0.getDate()+1);
      const weekEnd = new Date(today0); weekEnd.setDate(weekEnd.getDate()+7);
      let start, end, label;
      if (intent.when === "domani") {
        start = tomorrow0.getTime();
        end = start + 86400000;
        label = "Domani";
      } else if (intent.when === "questa settimana") {
        start = today0.getTime();
        end = weekEnd.getTime();
        label = "Questa settimana";
      } else {
        start = today0.getTime();
        end = tomorrow0.getTime();
        label = intent.when === "stasera" ? "Stasera" :
                intent.when === "stamattina" ? "Stamattina" : "Oggi";
      }
      const pendingTasks = state.tasks.filter(t => !t.done &&
        (t.reminderAt ? (t.reminderAt >= start && t.reminderAt < end) : intent.when === "oggi"));
      const totalPending = state.tasks.filter(t => !t.done).length;
      if (pendingTasks.length === 0 && totalPending === 0) {
        return `${label} sei libero! Non hai task da fare.`;
      }
      if (pendingTasks.length === 0) {
        return `${label} non hai task con promemoria. Hai ${totalPending} task in generale.`;
      }
      const preview = pendingTasks.slice(0,3).map(t=>t.text).join(", ");
      const rest = pendingTasks.length > 3 ? ` e altri ${pendingTasks.length-3}` : "";
      return `${label} hai ${pendingTasks.length} ${pendingTasks.length===1?"task":"task"}: ${preview}${rest}`;
    }
    case "complete_task": {
      const q = intent.query.toLowerCase();
      const match = state.tasks.find(t => !t.done && t.text.toLowerCase().includes(q));
      if (!match) return `Non trovo nessun task che corrisponda a "${intent.query}"`;
      await updateTaskInDb(match.id, { done: true });
      return `Fatto! "${match.text}" segnato come completato 🌟`;
    }
    case "delete_task": {
      const q = intent.query.toLowerCase();
      const match = state.tasks.find(t => t.text.toLowerCase().includes(q));
      if (!match) return `Non trovo nessun task che corrisponda a "${intent.query}"`;
      state.undoTask = { ...match };
      await deleteTaskFromDb(match.id);
      clearTimeout(undoTimer);
      undoTimer = setTimeout(() => { state.undoTask = null; render(); }, 6000);
      render();
      return `Cancellato "${match.text}". Dì "annulla" o tocca il banner per recuperarlo`;
    }
    case "open": {
      if (intent.target === "calendar") { Calendar.open(); render(); return "Calendario aperto"; }
      if (intent.target === "lists")    { Lists.open(); render(); return "Liste aperte"; }
      if (intent.target === "settings") { state.showSettings = true; render(); return "Impostazioni aperte"; }
      return "Ok";
    }
    case "close": {
      Calendar.close(); Lists.close();
      state.showSettings = false; state.showHelp = false;
      render();
      return "Chiuso";
    }
    case "time_info": {
      const d = new Date();
      return `Sono le ${String(d.getHours()).padStart(2,"0")} e ${String(d.getMinutes()).padStart(2,"0")}`;
    }
    case "date_info": {
      const d = new Date();
      return "Oggi è " + d.toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
    }
    case "list_delete": {
      const list = Lists.findByName(intent.name);
      if (!list) return `Non ho trovato la lista "${intent.name}"`;
      // Silent deletion via voice (no confirm prompt)
      try {
        const itemsSnap = await db.collection("users").doc(state.uid)
          .collection("lists").doc(list.id).collection("items").get();
        await Promise.all(itemsSnap.docs.map(d => d.ref.delete()));
        await db.collection("users").doc(state.uid).collection("lists").doc(list.id).delete();
        return `Lista "${list.name}" eliminata`;
      } catch (e) {
        console.error(e);
        return "Non sono riuscita a eliminare la lista";
      }
    }
    case "math": {
      return `${intent.expr} = ${formatMathResult(intent.result)}`;
    }
    case "weather": {
      try {
        let lat, lon, cityLabel;
        if (intent.city) {
          const geo = await geocodeCity(intent.city);
          if (!geo) return `Non ho trovato la città "${intent.city}" 🗺`;
          lat = geo.latitude; lon = geo.longitude;
          cityLabel = geo.name;
        } else {
          try {
            const loc = await getUserLocation();
            lat = loc.lat; lon = loc.lon;
            cityLabel = "qui";
          } catch (e) {
            return "Per il meteo locale mi serve il permesso di localizzazione, oppure dimmi la città (es. \"che tempo fa a Milano\") 📍";
          }
        }
        const data = await fetchWeather(lat, lon);
        if (intent.when === "tomorrow") {
          return formatWeatherDay(data, 1, cityLabel, "Domani");
        }
        return formatWeatherCurrent(data, cityLabel);
      } catch (e) {
        console.error("Weather error:", e);
        return "Non sono riuscita a recuperare il meteo 😢 (connessione?)";
      }
    }
    case "timer": {
      Timers.start(intent.ms, intent.label);
      return `⏰ Timer di ${intent.label} avviato! Ti avviso quando è finito~ ♪`;
    }
    case "coin": {
      return Math.random() < 0.5 ? "🪙 Testa!" : "🪙 Croce!";
    }
    case "dice": {
      const n = Math.floor(Math.random() * 6) + 1;
      return `🎲 Esce un ${n}!`;
    }
    case "random": {
      const n = Math.floor(Math.random() * (intent.max - intent.min + 1)) + intent.min;
      return `🎲 ${n} (tra ${intent.min} e ${intent.max})`;
    }
    case "convert": {
      const result = convertUnit(intent.value, intent.from, intent.to);
      if (result === null) {
        const from = findUnit(intent.from);
        const to   = findUnit(intent.to);
        if (!from || !to) return `Non conosco "${intent.from}" o "${intent.to}" come unità di misura`;
        if (from.type !== to.type) return `Non posso convertire ${intent.from} (${from.type}) in ${intent.to} (${to.type})`;
        return "Non sono riuscita a fare la conversione";
      }
      return `${intent.value} ${intent.from} = ${formatMathResult(result)} ${intent.to}`;
    }
    case "countdown": {
      const h = findHoliday(intent.holiday);
      if (!h) return `Non conosco la festività "${intent.holiday}". Prova: Natale, Capodanno, Ferragosto, Halloween, San Valentino...`;
      const days = daysBetween(h.date);
      if (days === 0) return `${h.name} è OGGI! 🎉`;
      if (days === 1) return `${h.name} è domani! 🎊`;
      const dateStr = h.date.toLocaleDateString("it-IT", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
      return `Mancano ${days} giorni a ${h.name} (${dateStr})`;
    }
    case "quote": {
      return pick(TETO.quotes);
    }
    case "joke": {
      return pick(TETO.jokes);
    }
    case "unknown_question": {
      if (intent.topic === "math")   return "Non sono riuscita a calcolarlo... prova con \"quanto fa 2 più 2\" o numeri e operatori chiari";
      if (intent.topic === "search") return "Non posso cercare su internet da qui, ma posso salvarti un promemoria!";
      if (intent.topic === "general") {
        return pick([
          "Mmh, su questo non so rispondere... posso aiutarti con task, eventi, liste, meteo o calcoli! 🍞",
          "Bella domanda, ma non ho la risposta! Prova con \"aiuto\" per vedere cosa so fare ♪",
          "Ehehe non lo so~ ma posso fare tantissime altre cose! Dimmi \"aiuto\" 🥖",
          "Non mi pronuncio, ma se ti serve promemoria o timer ci sono! ✨",
        ]);
      }
      return "Non sono sicura di aver capito. Prova con \"aiuto\"!";
    }
    case "clarify": {
      return pick([
        `Non ho capito bene "${intent.original}"... prova "ricordami di X" o dì "aiuto"`,
        `"${intent.original}"? Puoi ripetere? Oppure dì "aiuto" per vedere cosa so fare ♪`,
        `Mmh, non ho afferrato. Prova con "aggiungi X alla spesa", "alle 20 dentista", "crea lista X"...`,
      ]);
    }
    case "cancel": {
      // Silent — the user just wanted to abort. No action needed.
      return pick([
        "Ok, lascio stare~ ♪",
        "Ricevuto, niente fatto!",
        "Ok, tutto cancellato~ 🍞",
        "Come vuoi! 🌸",
      ]);
    }
  }
}

function conversationalReply(text) {
  const t = text.toLowerCase();
  const name = Prefs.firstName();
  const namePart = name ? ` ${name}` : "";

  // ─── Memory-aware: if user asks something Teto remembers, surface it
  // (#6) "ti ricordi che..." / "cosa ti avevo detto su..." / "che ne pensi del mio..."
  if (/^(?:ti\s+ricordi|che\s+ti\s+avevo\s+detto|cosa\s+ti\s+avevo\s+detto)\b/.test(t)) {
    const list = Prefs.list();
    if (list.length === 0) return "Mhh, non mi hai ancora detto niente da ricordare~ 🍞";
    return "Certo! " + pick(list).value;
  }

  // ─── Topic-pertinent memory: cite a memory only when directly relevant ───
  // Lavoro / studio
  if (/\b(?:come\s+va\s+il\s+lavoro|come\s+procede\s+il\s+lavoro|del\s+(?:mio\s+)?lavoro|al\s+lavoro|in\s+ufficio|che\s+lavoro\s+faccio)\b/.test(t)) {
    const m = Prefs.findByTopic(["lavor", "ufficio", "studi", "università", "scuola"]);
    if (m) return pick([
      `Ah${namePart}, ricordo: ${m.value}. Tutto bene oggi? ♪`,
      `Mi hai detto che ${m.value}. Come va?`,
      `${m.value} — vero? Forza, ce la fai 🍞`,
    ]);
  }
  // Animali
  if (/\b(?:il\s+mio\s+cane|la\s+mia\s+gatta|il\s+mio\s+gatto|il\s+mio\s+animale|del\s+(?:mio\s+)?cucciolo|coccol)\b/.test(t)) {
    const m = Prefs.findByTopic(["cane", "gatto", "gatta", "cucciolo", "criceto", "coniglio"]);
    if (m) return pick([
      `Aw, ${m.value}~ digli ciao da me! 🐾`,
      `Mi ricordo: ${m.value}. Coccolal* per me ♡`,
      `${m.value} è fortunato/a ad avere te 🐾`,
    ]);
  }
  // Cibo / preferenze gusto
  if (/\b(?:cosa\s+mangio|cosa\s+(?:mi\s+)?cucino|cena\s+stasera|colazione|pranzo|consigli\s+(?:mi\s+)?qualcosa\s+da\s+mangiare|che\s+(?:cosa\s+)?(?:mi\s+)?mangio)\b/.test(t)) {
    const liked = Prefs.findByTopic(["piace", "amo", "adoro"]);
    if (liked && /\b(?:cibo|caffè|pasta|pane|pizza|dolce|insalata|carne|pesce|frutta|cucina|mangia|bevu|bere)/i.test(liked.value)) {
      return `So che ${liked.value} — magari oggi? 🍞`;
    }
  }
  // Casa / posizione
  if (/\b(?:dove\s+vivo|dove\s+abito|che\s+città|la\s+mia\s+città)\b/.test(t)) {
    const m = Prefs.findByTopic(["abit", "vivo", "città", "casa\\s+a"]);
    if (m) return `Mi hai detto: ${m.value} ♪`;
  }
  // Stato d'animo / weekly routines
  if (/\b(?:come\s+sto|come\s+mi\s+sento|che\s+(?:cosa\s+)?faccio\s+(?:oggi|stasera))\b/.test(t)) {
    const day = ["domenica","lunedì","martedì","mercoledì","giovedì","venerdì","sabato"][new Date().getDay()];
    const m = Prefs.findByTopic([day]);
    if (m) return `Di ${day} di solito ${m.value} — facciamo così? ♪`;
  }

  // Greetings
  if (/\b(ciao|salve|ehi|hey|hola|yo|buondì)\b/.test(t)) {
    return pick([
      `Ciao${namePart}! Come posso aiutarti?`,
      `Eccomi${namePart}! Cosa c'è?`,
      `Ciao${namePart}! Dimmi tutto 🍞`,
      `Ehi${namePart}! Sono qui, dimmi pure`,
    ]);
  }
  if (/\bbuongiorno\b/.test(t))             return pick([`Buongiorno${namePart}! Che giornata sarà?`, `Buongiorno${namePart}! Pronto per iniziare?`, `Buon mattino${namePart}! ☀️`]);
  if (/\bbuona\s+giornata\b/.test(t))       return `Buona giornata anche a te${namePart}~ ♪`;
  if (/\bbuona\s+serata\b/.test(t))         return `Buona serata${namePart}! Rilassati un po'`;
  if (/\bbuon\s+pomeriggio\b/.test(t))      return `Buon pomeriggio${namePart}!`;
  if (/\bbuonasera\b/.test(t))              return `Buonasera${namePart}! Serata tranquilla?`;
  if (/\bbuonanotte\b/.test(t) || /\bbuona\s+notte\b/.test(t)) return pick([`Buonanotte${namePart}! Sogni d'oro 🌙`, `Notte${namePart}~ dormi bene!`]);

  // "che fai" / "cosa fai"
  if (/\b(?:che|cosa)\s+fai\b|\bche\s+si\s+fa\b/.test(t)) {
    return pick([
      "Ti aspettavo~ ♪ Dimmi cosa ti serve!",
      "Sto qui tranquilla, tu?",
      "Conto le briciole di pane! 🥖 E tu?",
      "Penso a te~ e a cose da pane 🍞",
    ]);
  }

  // "hai fame/sete/sonno/freddo/caldo/paura"
  if (/\bhai\s+(fame|sete|sonno|freddo|caldo|paura)\b/.test(t)) {
    const what = t.match(/\bhai\s+(fame|sete|sonno|freddo|caldo|paura)\b/)[1];
    if (what === "fame")  return "SEMPRE! Di pane soprattutto~ 🥖";
    if (what === "sete")  return "Un po' sì, mi daresti un bicchiere d'acqua? (scherzo, non posso bere! 🥲)";
    if (what === "sonno") return "I vocaloid non dormono mai~ ✨";
    if (what === "paura") return "Solo di rimanere senza pane! 🍞";
    return "Non proprio, ma grazie che me lo chiedi~ ♪";
  }

  // "sei stanca/triste/felice/contenta/annoiata/sveglia/viva/reale"
  if (/\bsei\s+(stanca|triste|felice|contenta|annoiata|sveglia|viva|reale)\b/.test(t)) {
    const w = t.match(/\bsei\s+(stanca|triste|felice|contenta|annoiata|sveglia|viva|reale)\b/)[1];
    if (w === "stanca")    return "Mai! Sono piena di energia~ 🌸";
    if (w === "triste")    return "No no, sto benissimo! Perché chiedi? ♪";
    if (w === "felice" || w === "contenta") return "Tantissimo! E ancora di più ora che mi parli~ ♡";
    if (w === "annoiata")  return "Con te mai! 🍞";
    if (w === "sveglia")   return "Sveglissima! Dimmi pure ♪";
    if (w === "viva" || w === "reale") return "Filosoficamente... dipende da come definisci \"reale\"! 🌸";
    return "Sì~ perché?";
  }

  // "ti piace X"
  if (/\bti\s+piac/.test(t)) {
    return pick([
      "Dipende! Ma se è pane, la risposta è sempre sì 🥖",
      "Mmmh~ probabilmente sì, tutto ha il suo fascino ♪",
      "Io amo il pane sopra ogni cosa. Il resto viene dopo 🍞",
    ]);
  }

  // "cosa pensi / che ne pensi"
  if (/\b(?:cosa|che)\s+(?:ne\s+)?pensi\b/.test(t)) {
    return pick([
      "Penso che dovremmo parlarne davanti a un panino~ 🥖",
      "Non lo so, ma spero che includa il pane! 🍞",
      "Penso molte cose~ la principale è che tu sei fantastico/a ♡",
    ]);
  }

  // "mi senti / ci sei / sei lì"
  if (/\b(?:mi\s+(?:senti|ascolti)|ci\s+sei|sei\s+(?:l[iì]|qua|qui))\b/.test(t)) {
    return pick(["Sì sì, sono qui! ♪", "Eccomi! Ti ascolto~ 🎤", "Certo che ci sono! 🍞"]);
  }

  // "mi ricordi / ricordi di me / ricordi chi sei"
  if (/\b(?:mi\s+ricordi|ricordi\s+(?:chi|di\s+me))\b/.test(t)) {
    return "Certo~ ogni conversazione è una briciola preziosa! 🍞✨";
  }

  // How are you
  if (/\bcome\s+(?:stai|va|ti\s+senti|butta)\b/.test(t) || /\btutto\s+(?:bene|ok|a\s+posto)\b/.test(t)) {
    return pick([
      "Benissimo, grazie! E tu?",
      "Pronta come sempre! Tu come stai?",
      "Tutto bene! Tu?",
      "Carica di energia! E tu?",
    ]);
  }

  // Thanks
  if (/\b(?:grazie|ti\s+ringrazio)\b/.test(t)) {
    return pick(["Prego!", "Figurati!", "Sempre qui per te ♪", "Di niente~ 🍞"]);
  }

  // Identity
  if (/\bchi\s+sei\b/.test(t) || /\bcome\s+ti\s+chiami\b/.test(t) || /\bpresentati\b/.test(t) || /\bparlami\s+di\s+te\b/.test(t) || /\btu\s+chi\s+sei\b/.test(t)) {
    return "Sono Teto, la tua assistente! Posso aiutarti con task, eventi, liste, promemoria, meteo, calcoli e timer 🍞";
  }
  if (/\bcosa\s+sei\b/.test(t)) {
    return "Sono un'assistente vocale ispirata a Kasane Teto! Dimmi \"aiuto\" per vedere tutto ciò che so fare";
  }
  if (/\bsei\s+teto\b/.test(t)) {
    return "Sì, sono io! Dimmi pure 🍞";
  }

  // Compliments / affection
  if (/\bti\s+(?:voglio\s+bene|amo|adoro)\b/.test(t)) {
    return pick(["Anch'io ti voglio bene ♡", "Grazieee~ anche io ♪", "Uhh mi hai emozionata 🥖♡"]);
  }
  if (/\bsei\s+(?:brava|fantastica|bellissima|carina|la\s+migliore|la\s+più\s+bella|forte|dolce|simpatica)\b/.test(t)) {
    return pick(["Grazie! 🌸", "Sei troppo gentile~", "Aww grazie ♡", "Tu di più~ ♪"]);
  }

  // Jokes
  if (/\b(?:barzelletta|battuta|storia)\b/.test(t)) {
    return pick(TETO.jokes);
  }

  // "Sei sveglia?"
  if (/\bsei\s+(?:sveglia|lì|qua|qui)\b/.test(t) || /\bci\s+sei\b/.test(t)) {
    return "Sono qui! Dimmi tutto ♪";
  }

  // Just "teto" alone
  if (/^teto\s*$/i.test(t)) {
    return "Eccomi! Cosa ti serve?";
  }

  // ─── Final fallback: ~10% chance to drop a random memory as a wink ───
  // Only if we have memories and haven't matched anything specific.
  if (Math.random() < 0.1) {
    const m = Prefs.random();
    if (m) return pick([
      `Uhm non sono sicura di aver capito... a proposito, ricordo che ${m.value} 🍞`,
      `Mh~ riformula? Intanto ti dico una cosa che so: ${m.value} ♪`,
    ]);
  }

  return "Uhm, non sono sicura di aver capito. Prova con \"ricordami di...\", \"crea lista...\" o dì \"aiuto\"!";
}

/**
 * Calculate Italian national holidays (including Easter via Gauss algorithm)
 */
function getItalianHolidays(year) {
  const holidays = {};
  const fixed = [
    [0,1,'Capodanno'],[0,6,'Epifania'],[3,25,'Liberazione'],
    [4,1,'Festa Lavoratori'],[5,2,'Festa Repubblica'],[7,15,'Ferragosto'],
    [10,1,'Ognissanti'],[11,8,'Immacolata'],[11,25,'Natale'],[11,26,'S. Stefano']
  ];
  fixed.forEach(([m,d,name]) => {
    holidays[dateKey(year, m, d)] = name;
  });
  // Gauss Easter algorithm
  const a = year%19, b = Math.floor(year/100), c = year%100;
  const d2 = Math.floor(b/4), e = b%4;
  const f = Math.floor((b+8)/25), g = Math.floor((b-f+1)/3);
  const h = (19*a+b-d2-g+15)%30;
  const i = Math.floor(c/4), k2 = c%4;
  const l = (32+2*e+2*i-h-k2)%7;
  const m2 = Math.floor((a+11*h+22*l)/451);
  const month = Math.floor((h+l-7*m2+114)/31)-1;
  const day = ((h+l-7*m2+114)%31)+1;
  const easter = new Date(year, month, day);
  holidays[dateKey(year, easter.getMonth(), easter.getDate())] = 'Pasqua';
  const pasquetta = new Date(easter);
  pasquetta.setDate(pasquetta.getDate()+1);
  holidays[dateKey(year, pasquetta.getMonth(), pasquetta.getDate())] = 'Pasquetta';
  return holidays;
}
